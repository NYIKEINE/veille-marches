<style>
  :root {
    --rail: #0F141E;
    --rail-line: #222b3a;
    --ink: #1B2130;
    --paper: #FAFAF8;
    --surface: #FFFFFF;
    --muted: #6A7180;
    --muted-soft: #9AA0AC;
    --line: #E6E7EB;
    --accent: #26567F;
    --accent-soft: #EAF1F7;
    --up: #1E7A54;
    --down: #C23B33;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* ---------- Rail ---------- */
  .rail {
    background: var(--rail);
    color: #E8EAF0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rail-line);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .rail-head {
    padding: 26px 24px 20px;
    border-bottom: 1px solid var(--rail-line);
  }

  .mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .mark svg { display: block; }

  .rail-title {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: .2px;
    margin: 0;
    color: #F6F7FA;
  }
  .rail-sub {
    margin: 4px 0 0;
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .rail-list {
    overflow-y: auto;
    padding: 12px 0 24px;
    flex: 1;
  }

  .month-label {
    padding: 18px 24px 8px;
    font-size: 10.5px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .entry {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #C9CEDA;
    padding: 11px 24px;
    cursor: pointer;
    font-family: var(--sans);
    border-left: 2px solid transparent;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .entry:hover { background: rgba(255,255,255,.04); color: #fff; }
  .entry:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .entry.active {
    background: rgba(38,86,127,.22);
    border-left-color: #5B9BD1;
    color: #fff;
  }
  .entry .d-day {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .entry .d-meta {
    font-size: 12px;
    color: var(--muted-soft);
    margin-top: 2px;
  }
  .entry.active .d-meta { color: #AEC4DA; }

  /* ---------- Reading pane ---------- */
  .pane {
    padding: 0;
    overflow-x: hidden;
  }
  .pane-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 40px 96px;
  }

  .doc-kicker {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .doc-date {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
    margin: 0 0 8px;
    text-wrap: balance;
    letter-spacing: -.3px;
  }
  .doc-note {
    font-size: 13px;
    color: var(--muted);
    padding-bottom: 26px;
    margin-bottom: 34px;
    border-bottom: 1px solid var(--line);
  }

  /* rendered markdown */
  .md { font-family: var(--serif); font-size: 18px; line-height: 1.72; color: #262d3d; }
  .md h1 { font-size: 26px; line-height: 1.2; margin: 40px 0 12px; font-weight: 600; }
  .md h2 {
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 40px 0 4px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .md h3 { font-size: 19px; margin: 28px 0 6px; font-weight: 600; }
  .md p { margin: 14px 0; }
  .md ul { margin: 12px 0; padding-left: 4px; list-style: none; }
  .md li {
    position: relative;
    padding-left: 26px;
    margin: 9px 0;
  }
  .md li::before {
    content: "";
    position: absolute;
    left: 4px;
    top: .72em;
    width: 7px;
    height: 7px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
  }
  .md strong { font-weight: 700; color: var(--ink); }
  .md em { font-style: italic; }
  .md a { color: var(--accent); text-underline-offset: 2px; word-break: break-word; }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 30px 0; }
  .md blockquote {
    margin: 20px 0;
    padding: 12px 18px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 15px;
    font-family: var(--sans);
    font-style: normal;
    color: #3a4759;
  }
  .md blockquote p { margin: 4px 0; }
  .md pre {
    background: #0F141E;
    color: #D7DCE6;
    padding: 16px 18px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Consolas, monospace;
    margin: 18px 0;
  }

  .empty {
    color: var(--muted);
    font-family: var(--sans);
    text-align: center;
    padding: 120px 20px;
  }

  /* mobile nav (hidden on desktop) */
  .mnav { display: none; }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .rail { display: none; }
    .mnav {
      display: block;
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--rail);
      color: #fff;
      padding: 16px 18px 12px;
    }
    .mnav .rail-title { font-size: 18px; }
    .mnav .rail-sub { margin-bottom: 12px; }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      flex: 0 0 auto;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--rail-line);
      color: #D4D9E3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pane-inner { padding: 34px 22px 80px; }
    .md { font-size: 17px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<div class="app">
  <aside class="rail">
    <div class="rail-head">
      <div class="mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="24" height="24" rx="6" stroke="#5B9BD1" stroke-width="1.3"/>
          <path d="M5 17.5 L10 12 L13.5 15 L21 7" stroke="#5B9BD1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="21" cy="7" r="2" fill="#5B9BD1"/>
        </svg>
        <div>
          <h1 class="rail-title">Marchés &amp; Finance</h1>
          <p class="rail-sub">Comptes rendus</p>
        </div>
      </div>
    </div>
    <nav class="rail-list" id="railList" aria-label="Liste des comptes rendus"></nav>
  </aside>

  <nav class="mnav" aria-label="Navigation mobile">
    <h1 class="rail-title">Marchés &amp; Finance</h1>
    <p class="rail-sub">Comptes rendus</p>
    <div class="chips" id="chips"></div>
  </nav>

  <main class="pane">
    <div class="pane-inner" id="pane"></div>
  </main>
</div>

<script>
  /* ====================================================================
     DONNÉES — généré automatiquement par build-site.mjs.
     Ne pas modifier à la main : lancer le script de génération à la place.
     ==================================================================== */
  const REPORTS = __REPORTS__;

  /* ---------- mini rendu Markdown ---------- */
  function inline(s) {
    return s
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function mdToHtml(md) {
    const lines = md.replace(/\r\n/g, "\n").split("\n");
    let out = "", list = false, quote = [], code = false, codeBuf = [];
    const closeList = () => { if (list) { out += "</ul>"; list = false; } };
    const flushQuote = () => {
      if (quote.length) {
        out += "<blockquote>" + quote.map(q => "<p>" + inline(q) + "</p>").join("") + "</blockquote>";
        quote = [];
      }
    };
    const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    for (const raw of lines) {
      const line = raw.replace(/\s+$/, "");
      if (/^```/.test(line)) {
        if (!code) { closeList(); flushQuote(); code = true; codeBuf = []; }
        else { out += "<pre>" + codeBuf.map(esc).join("\n") + "</pre>"; code = false; }
        continue;
      }
      if (code) { codeBuf.push(raw); continue; }
      if (/^>\s?/.test(line)) { closeList(); quote.push(line.replace(/^>\s?/, "")); continue; }
      flushQuote();
      if (line.trim() === "") { closeList(); continue; }
      if (/^###\s+/.test(line)) { closeList(); out += "<h3>" + inline(line.replace(/^###\s+/, "")) + "</h3>"; continue; }
      if (/^##\s+/.test(line))  { closeList(); out += "<h2>" + inline(line.replace(/^##\s+/, "")) + "</h2>"; continue; }
      if (/^#\s+/.test(line))   { closeList(); out += "<h1>" + inline(line.replace(/^#\s+/, "")) + "</h1>"; continue; }
      if (/^---+\s*$/.test(line)) { closeList(); out += "<hr>"; continue; }
      if (/^[-*]\s+/.test(line)) {
        if (!list) { out += "<ul>"; list = true; }
        out += "<li>" + inline(line.replace(/^[-*]\s+/, "")) + "</li>";
        continue;
      }
      closeList();
      out += "<p>" + inline(line) + "</p>";
    }
    closeList(); flushQuote();
    if (code && codeBuf.length) out += "<pre>" + codeBuf.map(esc).join("\n") + "</pre>";
    return out;
  }

  /* ---------- dates FR ---------- */
  const MOIS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  const JOURS = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
  function parse(d) { const [y,m,j] = d.split("-").map(Number); return new Date(y, m-1, j); }
  function longDate(d) { const dt = parse(d); return JOURS[dt.getDay()] + " " + dt.getDate() + " " + MOIS[dt.getMonth()] + " " + dt.getFullYear(); }
  function dayNum(d) { return parse(d).getDate(); }
  function monthKey(d) { const dt = parse(d); return MOIS[dt.getMonth()] + " " + dt.getFullYear(); }

  /* ---------- état + rendu ---------- */
  const data = [...REPORTS].sort((a,b) => b.date.localeCompare(a.date));
  let current = 0;

  function renderList() {
    const rail = document.getElementById("railList");
    const chips = document.getElementById("chips");
    rail.innerHTML = ""; chips.innerHTML = "";
    let lastMonth = "";
    data.forEach((r, i) => {
      const mk = monthKey(r.date);
      if (mk !== lastMonth) {
        const h = document.createElement("div");
        h.className = "month-label";
        h.textContent = mk;
        rail.appendChild(h);
        lastMonth = mk;
      }
      const b = document.createElement("button");
      b.className = "entry" + (i === current ? " active" : "");
      b.innerHTML = '<div class="d-day">' + longDate(r.date) + '</div><div class="d-meta">' + r.titre + '</div>';
      b.onclick = () => select(i);
      rail.appendChild(b);

      const c = document.createElement("button");
      c.className = "chip" + (i === current ? " active" : "");
      c.textContent = dayNum(r.date) + " " + monthKey(r.date).split(" ")[0];
      c.onclick = () => select(i);
      chips.appendChild(c);
    });
  }

  function renderPane() {
    const pane = document.getElementById("pane");
    if (!data.length) { pane.innerHTML = '<div class="empty">Aucun compte rendu pour le moment.</div>'; return; }
    const r = data[current];
    pane.innerHTML =
      '<div class="doc-kicker">Compte rendu des marchés</div>' +
      '<h2 class="doc-date">' + longDate(r.date) + '</h2>' +
      '<div class="doc-note">' + (r.titre || "") + '</div>' +
      '<div class="md">' + mdToHtml(r.md) + '</div>';
    window.scrollTo(0, 0);
  }

  function select(i) { current = i; renderList(); renderPane(); }

  renderList();
  renderPane();
</script>
