<style>
  :root {
    --rail: #0F141E;
    --rail-line: #222b3a;
    --ink: #1B2130;
    --paper: #FAFAF8;
    --surface: #FFFFFF;
    --muted: #6A7180;
    --muted-soft: #9AA0AC;
    --line: #E6E7EB;
    --accent: #26567F;
    --accent-soft: #EAF1F7;
    --up: #1E7A54;
    --down: #C23B33;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* ---------- Rail ---------- */
  .rail {
    background: var(--rail);
    color: #E8EAF0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rail-line);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .rail-head {
    padding: 26px 24px 20px;
    border-bottom: 1px solid var(--rail-line);
  }

  .mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .mark svg { display: block; }

  .rail-title {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: .2px;
    margin: 0;
    color: #F6F7FA;
  }
  .rail-sub {
    margin: 4px 0 0;
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .rail-list {
    overflow-y: auto;
    padding: 12px 0 24px;
    flex: 1;
  }

  .month-label {
    padding: 18px 24px 8px;
    font-size: 10.5px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .entry {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #C9CEDA;
    padding: 11px 24px;
    cursor: pointer;
    font-family: var(--sans);
    border-left: 2px solid transparent;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .entry:hover { background: rgba(255,255,255,.04); color: #fff; }
  .entry:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .entry.active {
    background: rgba(38,86,127,.22);
    border-left-color: #5B9BD1;
    color: #fff;
  }
  .entry .d-day {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .entry .d-meta {
    font-size: 12px;
    color: var(--muted-soft);
    margin-top: 2px;
  }
  .entry.active .d-meta { color: #AEC4DA; }

  /* ---------- Reading pane ---------- */
  .pane {
    padding: 0;
    overflow-x: hidden;
    background: var(--paper);
    transition: background .25s ease;
  }
  /* Fond de page distinct selon le type de contenu */
  .pane[data-type="crypto"]  { background: #EEF3F9; }  /* revue de presse hebdo : bleu très clair */
  .pane[data-type="flash"]   { background: #FCF3E7; }  /* flash urgent : ambre doux */
  .pane[data-type="dossier"] { background: #F1EFF7; }  /* dossier thématique : lavande très clair */
  .pane-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 40px 96px;
  }

  .doc-kicker {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .doc-date {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
    margin: 0 0 8px;
    text-wrap: balance;
    letter-spacing: -.3px;
  }
  .doc-note {
    font-size: 13px;
    color: var(--muted);
    padding-bottom: 26px;
    margin-bottom: 34px;
    border-bottom: 1px solid var(--line);
  }

  /* rendered markdown */
  .md { font-family: var(--serif); font-size: 18px; line-height: 1.72; color: #262d3d; }
  .md h1 { font-size: 26px; line-height: 1.2; margin: 40px 0 12px; font-weight: 600; }
  .md h2 {
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 40px 0 4px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .md h3 { font-size: 19px; margin: 28px 0 6px; font-weight: 600; }
  .md p { margin: 14px 0; }
  .md ul { margin: 12px 0; padding-left: 4px; list-style: none; }
  .md li {
    position: relative;
    padding-left: 26px;
    margin: 9px 0;
  }
  .md li::before {
    content: "";
    position: absolute;
    left: 4px;
    top: .72em;
    width: 7px;
    height: 7px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
  }
  .md strong { font-weight: 700; color: var(--ink); }
  .md em { font-style: italic; }
  .md a { color: var(--accent); text-underline-offset: 2px; word-break: break-word; }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 30px 0; }
  .md blockquote {
    margin: 20px 0;
    padding: 12px 18px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 15px;
    font-family: var(--sans);
    font-style: normal;
    color: #3a4759;
  }
  .md blockquote p { margin: 4px 0; }
  .md pre {
    background: #0F141E;
    color: #D7DCE6;
    padding: 16px 18px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Consolas, monospace;
    margin: 18px 0;
  }

  .empty {
    color: var(--muted);
    font-family: var(--sans);
    text-align: center;
    padding: 120px 20px;
  }

  /* mobile nav (hidden on desktop) */
  .mnav { display: none; }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .rail { display: none; }
    .mnav {
      display: block;
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--rail);
      color: #fff;
      padding: 16px 18px 12px;
    }
    .mnav .rail-title { font-size: 18px; }
    .mnav .rail-sub { margin-bottom: 12px; }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      flex: 0 0 auto;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--rail-line);
      color: #D4D9E3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pane-inner { padding: 34px 22px 80px; }
    .md { font-size: 17px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<script>
  /* ====================================================================

  const REPORTS = [{"date":"2026-07-13","type":"dossier","titre":"Régulation Crypto : la réforme de la SEC qui veut changer les règles du jeu","md":"Depuis des années, la crypto vit aux États-Unis dans un flou juridique inconfortable. Personne ne savait vraiment quelles règles s'appliquaient, et le gendarme de la Bourse américaine, la SEC, avançait surtout à coups de procès. En juillet 2026, cette page pourrait se tourner. La SEC prépare une réforme baptisée \"Regulation Crypto\", présentée comme l'un des changements les plus importants de la politique américaine sur les actifs numériques depuis leur naissance. Voici de quoi il s'agit, pourquoi ce serait un signal fort, et ce que contient concrètement le projet.\n\n## De quoi on parle exactement\n\nLa SEC (Securities and Exchange Commission) est l'équivalent américain de notre Autorité des marchés financiers. C'est elle qui décide si un actif est un \"titre financier\", ce qui déclenche une montagne d'obligations d'enregistrement et de contrôle.\n\nJusqu'ici, la crypto tombait dans une zone grise. La SEC considérait que beaucoup de projets vendaient en réalité des titres financiers déguisés, et poursuivait les entreprises au cas par cas. Résultat : une insécurité permanente, des acteurs qui préféraient s'installer ailleurs, et une innovation qui fuyait le territoire américain.\n\nLe projet \"Regulation Crypto\", porté par le président actuel de la SEC Paul Atkins, propose une autre approche : au lieu de sanctionner après coup, écrire des règles claires à l'avance. L'objectif affiché par Atkins est de \"créer des règles claires pour la levée de capital avec des actifs cryptographiques\" et de faire des États-Unis la capitale mondiale de la crypto.\n\n## Pourquoi ce serait un signal fort\n\nC'est le cœur de la question. Une réforme technique, en soi, ne fait pas bouger un marché. Mais celle-ci a une portée particulière, pour trois raisons.\n\n**Elle change la posture de l'État, pas juste une règle.** On passe d'un régulateur qui punit à un régulateur qui encadre. Pour un secteur qui a passé des années sur la défensive, c'est un renversement de climat. Quand le principal adversaire d'hier tend la main, les investisseurs institutionnels, banques et fonds, qui attendaient de la clarté pour entrer, n'ont soudain plus la même excuse pour rester à l'écart.\n\n**Elle vient des États-Unis, qui donnent le tempo.** Le marché crypto mondial suit largement la réglementation américaine. Une clarification à Washington ne reste jamais locale : elle envoie un signal à toute la planète financière sur la légitimité de la classe d'actifs.\n\n**Elle rouvre la porte au financement.** En facilitant la levée de fonds des jeunes entreprises crypto sur le sol américain (voir plus bas), la réforme cherche à faire revenir l'innovation, les talents et les capitaux qui étaient partis vers des juridictions plus accueillantes. Un afflux de projets et d'argent est, historiquement, un moteur de fond pour tout l'écosystème.\n\nEn clair, ce n'est pas la réforme elle-même qui ferait monter le Bitcoin du jour au lendemain, c'est ce qu'elle signifie : la fin d'une hostilité, le début d'un cadre. Les marchés achètent rarement une loi, ils achètent un changement de direction.\n\n## Les différents points de la réforme\n\nLe projet s'articule autour de plusieurs volets. Voici les principaux, tels qu'ils ressortent des informations disponibles.\n\n- **Des \"safe harbors\" (zones de sécurité).** C'est l'idée centrale. Un safe harbor est une protection formelle : tant qu'une entreprise respecte certaines conditions, elle est à l'abri des poursuites de la SEC. On définit un espace où l'on a le droit d'innover sans craindre la sanction.\n\n- **Des exemptions temporaires d'enregistrement.** Les développeurs qui lancent un projet crypto pourraient, pendant une période donnée, être dispensés des lourdes obligations d'enregistrement normalement imposées aux titres financiers, incompatibles avec la façon dont fonctionnent ces projets.\n\n- **Une levée de fonds facilitée, avec des seuils chiffrés.** C'est le point le plus concret. Les jeunes entreprises éligibles, valorisées à moins de 5 millions de dollars pendant leurs quatre premières années, pourraient lever jusqu'à 75 millions de dollars via des contrats d'investissement crypto qualifiés. Autrement dit, un chemin balisé pour se financer légalement.\n\n- **Un cadre pour la finance décentralisée (DeFi).** La DeFi, ces protocoles financiers qui fonctionnent sans intermédiaire, était particulièrement mal traitée par le droit existant. Le projet prévoit des exemptions adaptées à sa nature.\n\n- **Un cadre pour les titres tokenisés.** La tokenisation consiste à représenter un actif réel (une action, une obligation) sous forme de jeton sur une blockchain. La réforme veut lui donner des règles propres, un sujet que les grandes institutions financières suivent de très près.\n\n- **Une protection liée à la décentralisation.** Un safe harbor est prévu pour les projets qui, au départ pilotés par une équipe, se sont depuis suffisamment décentralisés. C'est une reconnaissance d'un principe défendu de longue date : un réseau vraiment décentralisé, comme Ethereum, ne devrait pas être traité comme un titre financier contrôlé par une société.\n\nCes règles s'inscrivent dans un chantier plus large : la SEC a inscrit à son agenda 2026 trois grands textes, couvrant l'offre d'actifs crypto, les obligations des courtiers (protection des clients et exigences de capital), et la structure même des marchés crypto.\n\n## Ce qu'il faut garder en tête (l'honnêteté d'abord)\n\nTrois nuances importantes, pour ne pas se laisser emporter par l'enthousiasme des titres.\n\nD'abord, **ce n'est qu'un projet, pas une loi en vigueur.** Au moment où ces lignes sont écrites, le texte est en cours d'examen à la Maison Blanche (au bureau chargé des affaires réglementaires). La proposition est attendue en juillet 2026, mais elle sera ensuite soumise à une période de commentaires publics avant toute adoption définitive. Entre l'annonce et l'application réelle, il peut se passer des mois, et le texte peut changer.\n\nEnsuite, **cette réforme n'est pas seule.** En parallèle, le Congrès négocie une grande loi, le CLARITY Act, sur la structure des marchés crypto, actuellement bloquée au Sénat. Les deux dossiers se répondent, et c'est l'ensemble qui dessinera le futur cadre américain, pas la seule initiative de la SEC.\n\nEnfin, **un cadre plus clair n'est pas une garantie de hausse.** Il réduit l'incertitude, ce qui est sain, mais il encadre aussi plus strictement. La clarté profite aux acteurs sérieux et complique la vie des projets fragiles. C'est une bonne nouvelle pour la maturité du secteur, pas un feu vert pour spéculer les yeux fermés.\n\n## Le calendrier à surveiller\n\n- **Juillet 2026** : publication attendue de la proposition \"Regulation Crypto\" par la SEC.\n- **Ensuite** : période de commentaires publics, puis éventuelle adoption. Comptez plusieurs mois.\n- **En parallèle** : le sort du CLARITY Act au Sénat, avec une échéance politique qui se resserre à l'approche de l'été.\n\nLe vrai signal à guetter n'est pas l'annonce elle-même, largement anticipée, mais le détail du texte une fois publié : les seuils exacts, les conditions des safe harbors, et le traitement réservé à la DeFi. C'est là que se jouera la portée réelle de la réforme.\n\n---\n\n*Dossier construit à partir de sources croisées : CoinDesk (politique et déclarations de la SEC), et le suivi de l'agenda réglementaire 2026 de la SEC. Les seuils chiffrés (5 millions de valorisation, 75 millions de levée) sont confirmés par au moins deux sources concordantes. Ce dossier est une explication d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-13","type":"crypto","titre":"Revue de presse crypto de la semaine","md":"## L'histoire de la semaine\n\nAprès deux mois où l'argent n'a fait que sortir, la crypto a repris un peu son souffle cette semaine. Le Bitcoin, tombé fin juin à son plus bas depuis près de deux ans, a réussi à se redresser, et pour la première fois depuis huit semaines les fonds indiciels américains ont vu revenir plus d'argent qu'il n'en partait. Rien de spectaculaire, mais un vrai changement de ton. En toile de fond, tout le monde regarde Washington : le régulateur américain prépare une réforme importante, et une grande loi sur les cryptos joue sa survie au Sénat dans les prochains jours. La semaine a donc été celle d'une accalmie fragile, suspendue à des décisions politiques.\n\n## Bitcoin et Ethereum\n\nIl faut d'abord remettre les chiffres dans leur histoire. Le Bitcoin avait atteint un sommet à environ 126 000 dollars en octobre 2025. Depuis, il a perdu près de la moitié de sa valeur. Fin juin 2026, il est descendu vers 58 000 à 60 000 dollars, son plus bas niveau depuis vingt et un mois, avant de rebondir. Le 7 juillet, CoinDesk le voyait repasser au-dessus de 64 000 dollars, porté par des chiffres de l'emploi américain plus mous que prévu, ce qui a rassuré les investisseurs sur le fait que la banque centrale américaine ne durcirait pas encore le ton. Dans les jours qui ont suivi, il est retombé dans le bas des 60 000 dollars. Autrement dit : un rebond réel, mais qui reste fragile et sans élan franc.\n\nUn détail que je te signale parce qu'il est parlant. Le \"Coinbase Premium\", qui mesure si les Américains paient le Bitcoin plus cher que le reste du monde, est resté négatif cinquante jours d'affilée selon CoinDesk. En clair, la demande américaine reste faible. C'est un des points qui empêchent le rebond de se transformer en vraie reprise.\n\nCôté sentiment, l'indice de la peur et de l'avidité (le \"Fear and Greed\") est tombé début juillet à 11 sur 100, donc en zone de peur extrême, contre 15 la veille. C'est un signal à double lecture. D'un côté, il traduit une vraie anxiété. De l'autre, historiquement, ces niveaux de peur extrême ont souvent marqué des points bas, quand tout le monde a déjà vendu. À surveiller donc, sans en faire une boule de cristal.\n\nL'Ethereum, la deuxième cryptomonnaie, a suivi le même mouvement de fond, avec une note un peu plus positive du côté des fonds indiciels (voir ci-dessous).\n\n## Régulation et institutions\n\nC'est le vrai moteur de la semaine, et la zone où il faut être le plus prudent sur les sources, parce que c'est là que circulent le plus d'informations exagérées ou déformées.\n\nDeux dossiers avancent en parallèle à Washington.\n\nLe premier vient du gendarme de la Bourse américaine, la SEC. Selon CoinDesk, l'agence pourrait proposer dès ce mois de juillet une réforme baptisée \"Regulation Crypto\". L'idée est de créer des zones de tolérance et des exemptions pour certaines activités en chaîne, comme la finance décentralisée et les titres tokenisés, et de faciliter la levée de fonds des jeunes entreprises du secteur, qui pourraient réunir jusqu'à 75 millions de dollars via des contrats d'investissement crypto. Si elle se confirme, ce serait l'un des changements les plus importants de la politique américaine sur les actifs numériques depuis des années. Attention toutefois : à ce stade il s'agit d'un projet, pas d'une règle adoptée.\n\nLe second dossier est le CLARITY Act, une grande loi censée clarifier qui régule quoi dans la crypto américaine. Et là, l'histoire est moins rose que certains titres le laissent croire. Au 4 juillet, selon plusieurs sources concordantes, la loi était bloquée au Sénat : pas de vote programmé, et trois désaccords qui coincent encore. Un premier sur une clause d'éthique concernant les cryptos détenues par des responsables publics, un deuxième sur la protection de la finance décentralisée, un troisième sur la rémunération des stablecoins. La sénatrice Cynthia Lummis pousse pour un vote en juillet, et une nouvelle version du texte, fusionnant les travaux de deux commissions, pourrait être présentée dès la semaine du 15 juillet. Les sénateurs rentrent de congé le 13 juillet et n'ont qu'une vingtaine de jours de travail avant les vacances d'août. La fenêtre est donc étroite.\n\n## Ce qu'il faut relativiser\n\nC'est la partie la plus utile de cette revue, alors je te la donne sans détour.\n\nD'abord, sur les fonds indiciels. Certains sites ont titré sur une \"semaine record de fuite de 8,2 milliards de dollars\". Ce chiffre existe, mais il désigne le cumul de huit semaines de sorties, pas une seule semaine. Or justement, cette semaine, la tendance s'est inversée. Confondre le cumul et la semaine donne une image faussement catastrophique. La lecture juste, croisée entre plusieurs sources sérieuses : huit semaines de sorties, puis un premier retour d'argent d'environ 200 millions de dollars, la première semaine positive en deux mois, avec BlackRock en tête du mouvement. Les fonds Ethereum ont même connu leur meilleure semaine depuis fin avril, avec environ 84 millions de dollars d'entrées.\n\nEnsuite, méfie-toi des articles de \"prédiction de prix\" qui pullulent en ce moment, annonçant un Bitcoin à 70 000 ou 74 000 dollars en juillet. Ce sont des opinions et des modèles, pas des faits. Les niveaux réels de la semaine sont restés bien en dessous. Ces sites vivent du clic, pas de l'information.\n\nEnfin, un mot d'honnêteté sur les chiffres eux-mêmes. Selon les sources et le jour, on a vu le Bitcoin cité entre 54 000 et 64 000 dollars sur la première quinzaine de juillet. C'est normal, le prix bouge et chaque article fige un instant. J'ai retenu la fourchette et les sources les plus fiables plutôt qu'un chiffre unique faussement précis.\n\n## La semaine qui vient\n\nTrois rendez-vous à surveiller, par ordre d'importance.\n\nLe plus important : le CLARITY Act. Une nouvelle version du texte pourrait tomber dès la semaine du 15 juillet, et le calendrier du Sénat est serré avant les vacances d'août. Toute avancée, ou tout blocage, peut faire bouger le marché.\n\nEnsuite, la réforme \"Regulation Crypto\" de la SEC, qui pourrait être proposée ce mois-ci. Une annonce concrète serait un signal fort pour le secteur.\n\nEnfin, en fin de mois, la décision de la banque centrale américaine sur ses taux. C'est le grand rendez-vous macro qui, plus que tout le reste, dicte l'humeur du Bitcoin depuis un an. Les chiffres de l'emploi ayant été mous, le marché espère un ton plus souple.\n\n---\n\n*Revue construite à partir de sources croisées : CoinDesk pour les prix, les flux et la régulation, les données publiques de flux ETF, l'indice Fear and Greed, et le suivi du CLARITY Act au Sénat. Les informations à source unique ou invérifiables ont été écartées ou signalées comme telles. Cette revue est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-13","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe lundi 13 juillet, les marchés européens rouvrent après un week-end où rien n'a bougé mais où chacun s'est préparé mentalement au grand rendez-vous du lendemain. La semaine est courte pour les Français, puisque Paris sera fermée mardi pour la fête nationale, et cette anomalie du calendrier accentue le sentiment d'être dans un couloir étroit entre deux moments d'apesanteur. Le décor du jour reste dominé par trois forces qui n'ont pas changé de sens depuis vendredi.\n\nLa première, c'est **l'obsession quasi hypnotique pour le CPI américain de mardi**. Les investisseurs ne parlent presque plus que de ce chiffre. Consensus autour de 3,9 % en glissement annuel, coeur autour de 2,9 %, et une marge de tolérance très serrée. Le moindre écart d'un dixième pourrait redessiner la trajectoire des taux pour tout le second semestre, et donc celle des actions, de la crypto et de l'or dans la foulée. Aujourd'hui, personne n'ose miser. Les volumes seront probablement légers, et les prix devraient s'immobiliser dans des couloirs de plus en plus étroits jusqu'à l'ouverture de Wall Street.\n\nLa deuxième force, c'est **une Fed qui tient sa ligne dure**. Le CME FedWatch continue de renvoyer une carte sans concession, 68,5 % de probabilité de statu quo à la réunion du 29 juillet et surtout 31,5 % de probabilité de hausse, contre zéro pour une baisse. Pas de sauvetage possible cette fois. La banque centrale a fait le choix explicite de ne pas céder tant que l'inflation n'est pas revenue vers 2 %, et le nouveau président Kevin Warsh, qui témoignera devant le Congrès dès mardi, incarne cette rigueur. Son premier discours public depuis sa prestation de serment sera scruté au mot près.\n\nLa troisième force, plus discrète, c'est **l'accalmie géopolitique fragile qui tient bon**. Le week-end n'a pas apporté de nouvelle escalade entre les États-Unis et l'Iran, les négociations diplomatiques se poursuivent officiellement, et le pétrole reste ancré sous les 76 dollars. Cette accalmie est une bénédiction discrète pour l'inflation américaine et donc pour la Fed, mais chacun sait qu'une seule étincelle au Moyen-Orient pourrait renvoyer les marchés dans un scénario tout autre. Le calme d'aujourd'hui ne se prête donc à aucune illusion.\n\nL'image générale, celle d'une salle d'attente, se prolonge. Elle vit son avant-dernier jour, et la tension monte doucement.\n\n## 2. CAC 40, l'ultime jour de positionnement avant l'apesanteur\n\nLa Bourse de Paris rouvre ce lundi matin à partir des **8 348 points** de la clôture de vendredi, dans un climat plutôt neutre. La semaine passée s'est terminée sur un petit gain de 0,3 %, mais surtout sur une balançoire nerveuse dominée par la chute brutale de mercredi liée aux tensions iraniennes puis par le rebond de jeudi et vendredi. Le CAC 40 clôturait la semaine à peu près sur son point de départ, ce qui traduit parfaitement l'indécision des opérateurs.\n\nL'analyse technique reste **parfaitement neutre** sur TradingView, avec des oscillateurs et des moyennes mobiles qui envoient chacun leur signal d'endormissement. C'est le graphique d'un marché qui attend, ni acheteur ni vendeur. Les niveaux à surveiller aujourd'hui n'ont pas bougé :\n\n- **Résistance immédiate** : 8 350 à 8 400 points, verrou à casser pour espérer viser 8 500 puis 8 700\n- **Support majeur** : 8 300 points, à ne pas franchir vers le bas\n- **Extension baissière** : 8 100 puis 8 000, et en cas de vraie panique 7 950 voire 7 640\n\nLe point stratégique du jour, c'est cette configuration très particulière du **calendrier**. Puisque Paris ferme mardi pour le 14 juillet, toutes les positions prises ce lundi devront tenir jusqu'au mercredi matin 15, en subissant entre-temps la publication du CPI américain. Les gestionnaires prudents auront donc plutôt tendance à alléger leur exposition ce soir à la clôture, préférant ne pas dormir sur un chiffre imprévisible. On peut donc s'attendre à des volumes qui décélèrent dans l'après-midi et à une clôture sans grande direction, voire à un léger biais négatif si la prudence l'emporte. Mercredi matin, à l'inverse, l'ouverture pourrait se faire avec un gap important dans un sens ou dans l'autre selon le CPI de la veille.\n\nCôté valeurs, la semaine est studieuse mais pas encore rythmée par les grandes publications semestrielles, qui n'arrivent réellement qu'à partir du 23 juillet. Thermador Groupe publie aujourd'hui, plus par tradition que par impact. Le regard se porte davantage vers **les résultats des grandes banques américaines dès mardi** (JPMorgan, Bank of America, Wells Fargo, Goldman Sachs, Citigroup), qui donneront le ton pour les valeurs financières européennes. BNP Paribas, Société Générale et Crédit Agricole pourraient bien vivre une séance de mercredi assez animée si les banques US surprennent d'une manière ou d'une autre.\n\n## 3. Crypto, Bitcoin retombe dans son couloir d'attente\n\nBitcoin s'échange ce lundi matin autour de **63 700 dollars**, en léger recul par rapport aux 64 500 dollars affichés dimanche. Ce petit décrochage n'a rien d'inquiétant, il traduit simplement le retour du sentiment prudent alors que la semaine s'ouvre et que l'incertitude du CPI se rapproche. Ethereum stagne autour de 1 780 dollars, sans autonomie de mouvement. La journée devrait être calme, avec des volumes qui ne se réveilleront vraiment qu'à l'annonce de l'inflation américaine mardi.\n\nBonne surprise du week-end écoulé, **les flux ETF Bitcoin ont retrouvé le vert vendredi 10 juillet**, avec 90,4 millions de dollars d'entrées nettes sur les fonds cotés américains, dont 86,8 millions pour le seul iShares Bitcoin Trust de BlackRock. C'est le premier signe encourageant depuis plusieurs jours de sorties, et cela suit le rebond du 3 juillet où 221 millions étaient rentrés en une seule séance. Le tableau global reste toutefois abîmé, avec **5,4 milliards de dollars de sorties nettes cumulées depuis janvier**, mais un frémissement se dessine. Si le CPI de mardi rassure, ces flux pourraient franchement repartir à la hausse. Si le CPI déçoit, le regain sera balayé aussi vite qu'il est venu.\n\nTechniquement, TradingView renvoie toujours un signal **neutre à la journée mais vente à la semaine et au mois**. Bitcoin reste enfermé sous la moyenne mobile 200 jours qui joue son rôle de plafond, et les niveaux d'intérêt continuent de dessiner un range parfaitement lisible :\n\n- **Support psychologique** : 60 000 dollars\n- **Support majeur** : 58 000 dollars, zone décisive à défendre absolument\n- **Résistance immédiate** : 65 600 à 66 250 dollars\n- **Résistance suivante** : 70 000 dollars\n\nLes traders sur TradingView se partagent entre deux scénarios. Ceux qui voient un rebond visent 66 000 puis 69 600 dollars si Bitcoin réussit à casser 64 353. Ceux qui restent baissiers guettent un retour vers 61 633 en cas de rejet sur la résistance. La zone technique clé du jour se joue donc entre 62 000 et 64 000 dollars, où tout mouvement significatif pourrait donner le ton avant mardi.\n\n### 🚦 Feu de circulation Bitcoin, 13 juillet 2026\n\n```\n🟠  Flux ETF          → Retour timide au vert vendredi 10 avec +90 M$, mais 5,4 Md$ de fuite cumulés depuis janvier\n🔴  Fear & Greed      → 26, inchangé par rapport à hier, la peur reste ancrée\n🔴  Fed               → Warsh témoigne mardi, 68,5 % de statu quo mais 31,5 % de hausse pour le 29 juillet\n🟠  Dollar (DXY)      → Stable autour de 101, ni frein ni relais pour le Bitcoin\n🟠  Technique         → Neutre à la journée, vente à la semaine et au mois, MA 200 jours toujours en plafond\n🟠  Supports          → BTC dans le range 60-66 k$, sous la MA 200 jours qui verrouille au-dessus\n🔴  Catalyseur 7j     → CPI US mardi, ventes de détail jeudi, Michigan vendredi, semaine potentiellement explosive\n\nVERDICT DU JOUR : 3 rouges, 4 oranges, 0 vert. Environnement toujours défavorable au Bitcoin,\nmais un cran moins tendu que dimanche grâce au retour des flux ETF au vert. Le tableau reste\nlourd, mais la corde se détend d'un demi-tour. Bitcoin devrait rester enfermé dans son range\n60-66 k$ tant que le CPI n'a pas parlé. Un chiffre d'inflation en dessous des attentes mardi\nsuffirait à faire basculer plusieurs indicateurs vers le vert dans les jours qui suivent.\n```\n\n**Une bascule modérée en positif depuis hier.** Le tableau passe de 4 rouges/3 oranges/0 vert à 3 rouges/4 oranges/0 vert. Ce n'est pas encore le signal d'amélioration franc (il aurait fallu 2 indicateurs qui basculent au vert), mais le retour des flux ETF est un début. Reste à voir s'il tient au-delà de mardi.\n\n## 4. Or, le métal patient reste dans son couloir\n\nL'or s'échange ce lundi matin autour de **4 121 dollars l'once**, presque identique à sa clôture de vendredi à 4 123 dollars. Une semaine entière s'est écoulée avec un métal jaune enfermé dans une fourchette étroite entre 4 100 et 4 125 dollars, une amplitude ridicule pour un actif habituellement bien plus nerveux. Cette discipline silencieuse est la parfaite illustration de l'ambiance générale, celle d'un marché qui refuse de bouger avant d'avoir vu le CPI.\n\nLe paradoxe évoqué ce week-end reste entier. L'or a perdu 26 % depuis son sommet de janvier à 5 598 dollars, mais **les grandes banques comme JP Morgan et Wells Fargo maintiennent une cible de 6 000 à 6 300 dollars d'ici la fin de l'année**. Comment tenir ces deux affirmations en même temps ? Simplement parce que deux forces contraires agissent en permanence. D'un côté, la Fed américaine reste ferme et les rendements réels élevés freinent l'or, parce qu'un placement sans risque rapporte de nouveau quelque chose de tangible. De l'autre, **les banques centrales continuent d'acheter, avec la Chine en tête**, qui a ajouté 14,93 tonnes en juin, son vingtième mois consécutif d'accumulation. Une main achète, l'autre vend, et le prix hésite. Cette semaine décidera peut-être laquelle l'emporte.\n\nTechniquement, TradingView renvoie un **signal de vente à la journée**, avec des moyennes mobiles orientées à la baisse et des oscillateurs neutres. Les niveaux à retenir pour aujourd'hui :\n\n- **Résistance à casser** : 4 125 puis 4 157 dollars, seuil à franchir pour viser 4 200 puis 4 236\n- **Support majeur** : 4 090 puis 4 060 dollars\n- **Support ultime** : 4 025 puis 4 000 dollars, seuil psychologique dont la cassure changerait le paysage\n- **Range attendu de la semaine** : 4 059 à 4 157 dollars\n\nLe débat entre analystes reste vif. Les baissiers voient une correction possible vers 4 060 en cas de rejet sur la zone 4 195 à 4 220 dollars, tandis que les haussiers estiment que la structure de fond reste porteuse tant que les 4 100 tiennent, avec un objectif à 4 240 puis 4 256 dollars. Comme pour le Bitcoin, le déclencheur unique de la semaine sera le CPI de mardi, avec **l'indice du Michigan sur les anticipations d'inflation de vendredi** qui pourrait offrir un second temps fort moins commenté mais tout aussi lourd de conséquences.\n\n## 5. Synthèse stratégique, la corde se tend un cran de plus\n\nVus côte à côte, les trois marchés continuent d'écrire la même histoire, celle d'une salle d'attente collective qui vit sa dernière journée d'immobilité. **Le CPI de mardi est devenu le catalyseur unique** qui synchronise CAC 40, Bitcoin et or dans une même paralysie tactique. Les histoires locales (résultats français, flux crypto, achats d'or chinois) sont mises en veilleuse le temps qu'un seul chiffre décide de la couleur de la semaine.\n\nLes points d'inflexion à surveiller aujourd'hui n'ont pas changé et méritent d'être répétés. Pour le CAC 40, la clôture de ce lundi soir vaudra positionnement, puisque Paris devra ensuite attendre l'ouverture du mercredi 15 pour digérer le CPI. Pour Bitcoin, il faut d'abord tenir 60 000 dollars et rester dans le range 60-66 k$ jusqu'à mardi soir. Pour l'or, la double échéance CPI mardi plus Michigan vendredi encadre toute la semaine.\n\nUn scénario cohérent se dessinerait ainsi. Si le CPI décélère nettement en dessous de 3,8 %, on aurait un rebond simultané sur les trois marchés dans la seconde moitié de semaine, avec un CAC 40 qui viserait 8 500 points, un Bitcoin qui pourrait retester 68 000 dollars et un or qui casserait 4 157. Si le CPI déçoit au-dessus de 4,1 %, l'or bénéficierait probablement du regain d'incertitude comme valeur refuge, tandis que le CAC 40 et Bitcoin plongeraient de concert vers leurs supports majeurs, 8 100 pour Paris et 58 000 pour Bitcoin. Le troisième cas, celui où l'inflation ressort exactement en ligne avec le consensus, prolongerait tout simplement la léthargie actuelle et repousserait la vraie décision au FOMC du 29 juillet.\n\nChercher à anticiper l'issue serait un pari aveugle. Les vrais mouvements se joueront dans les vingt-quatre heures qui suivront la publication de mardi.\n\n## 6. Calendrier de la semaine du 13 au 17 juillet\n\n**Rappel décalage horaire** : Nouméa est à UTC+11 sans heure d'été, Paris est à UTC+2 en juillet, donc Nouméa = Paris + 9 heures. Le CPI américain de mardi tombe à 14h30 à Paris, soit 23h30 à Nouméa.\n\n**Lundi 13 juillet** (aujourd'hui), la journée est presque vide côté statistiques. Aucune publication américaine ou européenne majeure. C'est une journée de positionnement pour ceux qui veulent ajuster leurs paris avant le grand rendez-vous du lendemain. Chez les entreprises, seul Thermador Groupe publie en France. Les volumes seront probablement légers, et les mouvements de faible amplitude.\n\n**Mardi 14 juillet**, c'est le jour pivot de la semaine, et probablement du mois. La Bourse de Paris est fermée pour la fête nationale, mais Wall Street tourne comme d'habitude. **Le CPI américain de juin tombe à 14h30 heure de Paris** (23h30 à Nouméa), et c'est **LE rendez-vous à ne pas manquer**. Consensus autour de 3,9 % en glissement annuel, coeur autour de 2,9 %, ce qui signifie que tout chiffre supérieur à 4,1 % passera pour un mauvais signal, et tout chiffre inférieur à 3,8 % sera lu comme une bonne nouvelle. Dans la foulée, le nouveau président de la Fed **Kevin Warsh sera auditionné par la Chambre des représentants**, son premier grand discours depuis sa prestation de serment le 22 mai. Et avant l'ouverture des marchés américains, **la saison des résultats des grandes banques US démarre** avec JPMorgan (consensus BPA 5,59 dollars), Bank of America, Wells Fargo, Goldman Sachs et Citigroup. On suivra aussi les résultats européens de BP, Rio Tinto et Ericsson.\n\n**Mercredi 15 juillet**, la Chine ouvre le bal très tôt avec son **PIB du deuxième trimestre**, attendu entre 4,6 et 4,9 % en glissement annuel, contre 5,0 % au premier trimestre. Un chiffre décevant plomberait immédiatement le secteur du luxe européen, donc le CAC 40 via LVMH, Kering et Hermès. Dans la même journée, le PPI américain et l'indice manufacturier Empire State à 14h30 (23h30 à Nouméa), la décision de la Banque du Canada à 15h45, et la publication d'ASML avant l'ouverture européenne, qui donnera le pouls du secteur semi-conducteurs mondial. Aux États-Unis, on suivra Johnson & Johnson, Morgan Stanley et BlackRock. **C'est aussi le jour où Paris rouvre après la fête nationale et digère le CPI de la veille, potentiellement avec un gap important à l'ouverture**.\n\n**Jeudi 16 juillet**, la journée est chargée du côté du consommateur américain. À 14h30 heure de Paris (23h30 à Nouméa), **ventes de détail de juin, indice Philly Fed manufacturier, et inscriptions au chômage hebdomadaires**. Ces chiffres compléteront le puzzle CPI de la veille et confirmeront ou infirmeront la santé du consommateur. En Europe, publication de Publicis en semestriels, et Sodexo tient sa journée investisseurs. Après clôture US, Netflix publie, plus périphérique pour nos marchés mais souvent utilisé comme baromètre du sentiment tech.\n\n**Vendredi 17 juillet**, la semaine se ferme sur deux données à surveiller. À 11h, la publication finale de l'**inflation harmonisée en zone euro**. À 16h heure de Paris (1h du matin samedi à Nouméa), la **confiance des consommateurs Michigan préliminaire**, avec une attention particulière sur les anticipations d'inflation, qui peuvent faire bouger l'or plus fortement qu'on ne le croit.\n\n**Le rendez-vous à ne pas manquer cette semaine** est donc sans hésitation le **CPI américain du mardi 14 juillet à 14h30 Paris (23h30 Nouméa)**. Tout le reste, publications d'entreprises, décisions de banques centrales, statistiques secondaires, s'ordonne autour de cette échéance et ne prendra son sens qu'après.\n\n---\n\n*Sources principales : Boursorama, Investing.com, TradingView, CoinGlass, alternative.me, CME FedWatch, Trading Economics, Kitco, ABC Bourse, Bourse Direct, Zonebourse, LiteFinance, CryptoBriefing, Kiplinger.*"},{"date":"2026-07-12","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe dimanche matin à Nouméa, les places boursières dorment encore mais l'histoire de la semaine, elle, est déjà écrite. Trois forces continuent de tendre la corde vers un même moment, mardi 14 juillet à 14h30 heure de Paris, quand tombera le CPI américain de juin. À J moins deux, les investisseurs du monde entier révisent leur copie, et le week-end n'aura pas changé grand-chose au décor.\n\nLa première force, c'est **cette obsession collective pour le CPI**. Le consensus reste autour de 3,9 % en glissement annuel, en léger recul par rapport aux 4,2 % de mai. Depuis vendredi, aucune nouvelle donnée n'est venue bouger les anticipations. Un chiffre en dessous de 3,8 % serait accueilli comme une délivrance et rouvrirait la porte à une baisse de taux à l'automne. Un chiffre au-dessus de 4,1 % ferait basculer la Fed dans une posture encore plus dure, et la deuxième partie de l'été s'annoncerait alors très raide pour les actifs risqués.\n\nLa deuxième force, c'est une **Fed qui reste inflexible**. Le week-end n'a apporté aucun discours nouveau, mais les paroles de Waller la semaine dernière continuent de résonner. Les marchés à terme n'anticipent plus aucune baisse de taux à la réunion du 29 juillet, et 84 % des traders parient sur un simple maintien. Le compte à rebours vers la décision se joue désormais sur deux publications, le CPI de mardi et les ventes de détail de jeudi. Autant dire que la banque centrale américaine ne sera pas au secours des marchés cet été.\n\nLa troisième force, plus étouffée, c'est **l'apaisement géopolitique qui tient bon pour l'instant**. Depuis la flambée de mercredi dernier autour des tensions avec l'Iran, aucune nouvelle escalade n'a été rapportée durant le week-end. Le pétrole reste sous les 76 dollars, ce qui allège la pression inflationniste et rassure sur la trajectoire des prix. Mais cette accalmie est fragile. Un tir mal placé au Moyen-Orient et le CPI de mardi deviendrait presque secondaire.\n\nL'image générale reste donc celle d'une salle d'attente. Les marchés ne parient pas, ils veillent.\n\n## 2. CAC 40, la Bourse de Paris en apnée avant un mardi férié\n\nLa Bourse de Paris a fermé la semaine à **8 338,97 points** vendredi 10 juillet, en hausse anecdotique de 0,15 %. Le weekend n'a évidemment rien changé à ce chiffre, mais il a laissé le temps aux investisseurs de digérer une semaine qui aura ressemblé à une balançoire. Le rebond de jeudi (+0,90 %) et la petite avancée de vendredi ont partiellement effacé la chute brutale de mercredi (-2,18 %) provoquée par la reprise des tensions avec l'Iran. Sur la semaine complète, le CAC 40 termine à l'équilibre, ce qui traduit exactement le vrai sentiment des opérateurs, l'indécision.\n\nSur le plan technique, TradingView continue de renvoyer un **signal parfaitement neutre**. Ni achat, ni vente, juste une pause dans laquelle les moyennes mobiles s'aplatissent et les oscillateurs s'endorment. Le tableau des niveaux à surveiller reste identique à hier :\n\n- **Résistance immédiate** : 8 350 à 8 400 points, verrou à casser pour espérer viser 8 500 puis 8 700\n- **Support majeur** : 8 300 points, testé plusieurs fois depuis début juillet, la ligne à ne pas franchir vers le bas\n- **Extension baissière** : 8 100 puis 8 000, et en cas de vraie panique 7 950 voire 7 640\n\nUn point particulier à retenir pour la semaine qui vient, la Bourse de Paris sera fermée mardi 14 juillet pour la fête nationale. Le CPI américain tombera donc pendant la fermeture, ce qui signifie que Paris devra digérer le chiffre à l'ouverture du **mercredi 15 juillet, avec potentiellement un gap significatif dans un sens ou dans l'autre**. Cette particularité rend la journée de lundi 13 particulièrement observée, puisque les positions prises ce jour-là devront résister à quarante-huit heures d'incertitude.\n\nCôté valeurs, l'agenda de la semaine est encore léger avant l'accélération de la saison des semestriels à partir du 23 juillet. Publicis publiera jeudi, Sodexo tiendra sa journée investisseurs. Les mégacapitalisations habituelles resteront donc à l'écoute des flux et des chiffres macro, plus qu'à celle des annonces d'entreprises. ArcelorMittal reste la belle histoire du moment après son bond de 6,42 % vendredi, tandis que Thales continue de subir des prises de bénéfices sur le secteur défense.\n\n## 3. Crypto, Bitcoin sous surveillance rapprochée\n\nBitcoin s'échange ce dimanche autour de **64 500 dollars**, en très légère hausse par rapport à la clôture de vendredi. Le weekend est habituellement calme pour la crypto, et cette fois ne fait pas exception. Ethereum reste englué autour de 1 780 dollars, sans mouvement autonome. Le petit rebond de la fin de semaine dernière (+3 % environ sur sept jours) est un souffle, pas un signal. Les vrais tests arrivent lundi et mardi.\n\nLe grand récit du moment reste **l'hémorragie des flux qui quittent les fonds cotés Bitcoin américains**. Après les 84,9 millions de dollars sortis mardi 8 juillet, 95,3 millions mercredi 9 et plus de 180 millions jeudi 10 en cumulé BTC et ETH, l'appétit institutionnel s'est franchement refroidi. Sur l'ensemble de 2026, les fonds cotés Bitcoin cumulent maintenant **5,4 milliards de dollars de sorties nettes**. Le début du mois avait laissé entrevoir un rebond avec 221 puis 265 millions d'entrées début juillet, mais l'élan n'a tenu que quelques jours. La semaine qui commence sera cruciale pour savoir si les flux repartent en positif ou confirment la fuite.\n\nL'analyse technique reflète cette hésitation. TradingView renvoie un signal **neutre à la journée mais vente à la semaine et au mois**. Bitcoin reste bloqué sous la moyenne mobile 200 jours à 65 192 dollars, qui redevient un plafond dès que le prix s'en approche. Les niveaux à surveiller n'ont pas changé :\n\n- **Support psychologique** : 60 000 dollars\n- **Support majeur** : 58 000 dollars, zone décisive\n- **Résistance immédiate** : 65 600 à 66 250 dollars, plafond technique\n- **Résistance suivante** : 70 000 dollars\n\nL'expiration d'options Bitcoin de 1,5 milliard de dollars s'est passée vendredi soir sans casser les repères techniques, ce qui est plutôt une bonne nouvelle. Mais la véritable épreuve reste le CPI de mardi. Un chiffre en dessous des attentes, et Bitcoin pourrait retester rapidement 66 000 puis 68 000 dollars. Un chiffre au-dessus, et le retour vers 60 000 puis 58 000 deviendra le scénario privilégié.\n\n### 🚦 Feu de circulation Bitcoin, 12 juillet 2026\n\n```\n🔴  Flux ETF          → Sorties nettes trois jours d'affilée sur la semaine écoulée, 5,4 Md$ de fuite depuis janvier\n🔴  Fear & Greed      → 28, la peur reste ancrée, mais la marge se réduit vers la zone neutre\n🔴  Fed               → Discours de Waller inchangé, 0 % de probabilité de baisse et 25 % de hausse en juillet\n🟠  Dollar (DXY)      → Stable autour de 101, ni frein ni relais pour le Bitcoin\n🟠  Technique         → Neutre à la journée, vente à la semaine et au mois, MA 200 jours en plafond à 65 192\n🟠  Supports          → BTC dans le range 58-66 k$, sous la MA 200 jours qui verrouille au-dessus\n🔴  Catalyseur 7j     → CPI US mardi, ventes de détail jeudi, Michigan vendredi, semaine explosive\n\nVERDICT DU JOUR : 4 rouges, 3 oranges, 0 vert. Environnement toujours défavorable au Bitcoin.\nLe climat reste tendu à l'approche du CPI de mardi. Rien ne s'est amélioré ni détérioré ce\nweek-end, mais la corde continue de se tendre. Bitcoin va probablement rester enfermé dans\nson range 60-66 k$ tant que la Fed n'aura pas parlé, et un chiffre d'inflation trop chaud\nmardi ferait basculer le tableau vers un scénario clairement baissier.\n```\n\n**Aucune bascule à signaler par rapport à hier.** Le tableau reste identique, quatre rouges, trois oranges, zéro vert. C'est un statu quo, mais un statu quo tendu, comme un ressort comprimé qui attend le déclencheur du mardi 14 juillet.\n\n## 4. Or, le métal patient\n\nL'or clôture le weekend en dormant. Il s'échange autour de **4 111 dollars l'once** depuis vendredi soir, quasiment inchangé par rapport à la clôture officielle. Sur la semaine complète, le métal jaune est resté cantonné dans une fourchette étroite entre 4 100 et 4 125 dollars, une amplitude ridiculement faible pour un actif habituellement plus nerveux. Cette discipline traduit exactement la même chose que pour les actions et la crypto, une attente disciplinée avant le grand rendez-vous de mardi.\n\nLe paradoxe est intéressant. L'or a perdu 26 % depuis son sommet historique de janvier à 5 598 dollars l'once, mais les grandes banques comme JP Morgan et Wells Fargo maintiennent une cible ambitieuse à 6 000 voire 6 300 dollars d'ici la fin de l'année. Comment expliquer ce grand écart entre le prix actuel et les prévisions à six mois ? Simplement par une tension entre deux forces contraires. D'un côté, la Fed américaine ferme et les rendements réels encore élevés freinent l'or, parce que placer son argent sans risque rapporte de nouveau quelque chose de tangible. De l'autre, **les banques centrales continuent d'acheter, et particulièrement la Chine**, qui a ajouté 14,93 tonnes en juin, son plus gros achat mensuel depuis octobre 2023 et son vingtième mois consécutif d'accumulation. Pendant que Pékin engrange, les fonds cotés or de Wall Street subissent des retraits, avec plus d'un milliard de dollars sortis du seul SPDR Gold Shares sur les cinq derniers jours. Une main achète, l'autre vend, et le prix hésite.\n\nTechniquement, TradingView reste sur un **signal neutre**, avec des oscillateurs endormis et des moyennes mobiles orientées légèrement à la vente. Les niveaux à retenir :\n\n- **Résistance à casser** : 4 125 dollars puis 4 157, seuil à franchir pour viser 4 200 puis 4 300\n- **Support majeur** : 4 059 puis 4 025 dollars\n- **Support ultime** : 4 000 dollars, seuil psychologique, sa cassure changerait tout\n- **Range attendu semaine prochaine** : 4 059 à 4 157 dollars\n\nLe dollar continue de faire le spectateur neutre autour de 101 sur le DXY. Il ne pousse pas l'or ni ne le freine. Les vrais catalyseurs de la semaine sont donc ailleurs, dans le CPI de mardi d'abord, puis dans les anticipations d'inflation du Michigan de vendredi. Le second temps fort de la semaine sera moins commenté mais tout aussi lourd de conséquences pour l'or, parce qu'il touche directement à la psychologie du consommateur américain sur les prix futurs.\n\n## 5. Synthèse stratégique, la corde continue de se tendre\n\nQuand on regarde les trois marchés côte à côte ce dimanche, la même image continue de s'imposer, celle d'une salle d'attente collective. Depuis quatre jours maintenant, CAC 40, Bitcoin et or vivent tous à l'ombre du CPI américain de mardi. Cette **synchronisation par le catalyseur** est un phénomène classique de fin de cycle d'attente, quand la macroéconomie américaine prend le pas sur toutes les autres histoires locales. Les banques françaises, les flux crypto, les achats d'or par la Chine, tout cela est mis en veilleuse le temps qu'un chiffre décide de la couleur de la semaine suivante.\n\nLes points d'inflexion à surveiller n'ont pas bougé et méritent d'être répétés. Pour le CAC 40, la journée de lundi 13 juillet est celle du positionnement, puisque Paris devra ensuite attendre l'ouverture du mercredi 15 pour digérer le CPI, avec potentiellement un gap important. Pour Bitcoin, il faut d'abord tenir 60 000 dollars lundi et mardi, puis absorber le CPI mardi soir. Pour l'or, la double échéance CPI mardi plus indice du Michigan vendredi encadre toute la semaine.\n\nUn scénario cohérent se dessinerait ainsi. Si le CPI décélère nettement en dessous de 3,8 %, on aurait un rebond simultané sur les trois marchés dans la seconde moitié de semaine, avec un CAC 40 qui viserait 8 500 points, un Bitcoin qui pourrait retester 68 000 dollars et un or qui casserait 4 157. Si le CPI déçoit au-dessus de 4,1 %, l'or bénéficierait probablement du regain d'incertitude comme valeur refuge, tandis que le CAC 40 et Bitcoin plongeraient de concert vers leurs supports majeurs, 8 100 pour Paris et 58 000 pour Bitcoin. Le troisième cas, celui où l'inflation ressort exactement en ligne avec le consensus, prolongerait tout simplement la léthargie actuelle.\n\nChercher à anticiper l'issue serait un pari aveugle. Les vrais mouvements se joueront dans les vingt-quatre heures qui suivront la publication de mardi.\n\n## 6. Calendrier de la semaine du 13 au 17 juillet\n\n**Rappel décalage horaire** : Nouméa est à UTC+11 sans heure d'été, Paris est à UTC+2 en juillet, donc Nouméa = Paris + 9 heures. Le CPI américain de mardi tombe à 14h30 à Paris, soit 23h30 à Nouméa.\n\n**Lundi 13 juillet**, la journée est presque vide côté statistiques. Aucune publication américaine ou européenne majeure. C'est une journée de positionnement pour ceux qui veulent ajuster leurs paris avant le grand rendez-vous du lendemain. Chez les entreprises, seul Thermador Groupe publie en France. Côté crypto, plusieurs déblocages de tokens sont à surveiller, notamment sur Aptos avec 11,3 millions de jetons libérés, Arbitrum et LayerZero.\n\n**Mardi 14 juillet**, c'est le jour pivot de la semaine, et probablement du mois. La Bourse de Paris est fermée pour la fête nationale, mais Wall Street tourne comme d'habitude. **Le CPI américain de juin tombe à 14h30 heure de Paris** (23h30 à Nouméa), et c'est **LE rendez-vous à ne pas manquer**. Consensus autour de 3,9 % en glissement annuel, ce qui signifie que tout chiffre supérieur à 4,1 % passera pour un mauvais signal, et tout chiffre inférieur à 3,8 % sera lu comme une bonne nouvelle. Dans la foulée, le gouverneur de la Fed Kevin Warsh sera auditionné par la Chambre des représentants. Et avant l'ouverture des marchés américains, **la saison des résultats des grandes banques US démarre** avec JPMorgan (consensus BPA 5,59 dollars), Bank of America, Wells Fargo, Goldman Sachs et Citigroup. Le marché attend une saison solide, portée par les marges d'intérêt et la qualité du crédit.\n\n**Mercredi 15 juillet**, la Chine ouvre le bal à 4h du matin heure de Paris (14h à Nouméa) avec son **PIB du deuxième trimestre**, attendu entre 4,6 et 4,9 % en glissement annuel, contre 5,0 % au premier trimestre. Un chiffre décevant plomberait immédiatement le secteur du luxe européen, donc le CAC 40 via LVMH, Kering et Hermès. Dans la même journée, le PPI américain et l'indice manufacturier Empire State à 14h30, la décision de la Banque du Canada à 15h45 (statu quo attendu), et surtout la publication d'ASML avant l'ouverture européenne, qui donnera le pouls du secteur semi-conducteurs mondial. Aux États-Unis, on suivra Johnson & Johnson, Morgan Stanley et BlackRock. **C'est aussi le jour où Paris rouvre après la fête nationale et digère le CPI de la veille, potentiellement avec un gap important à l'ouverture**.\n\n**Jeudi 16 juillet**, la journée est chargée du côté du consommateur américain. À 14h30, **ventes de détail de juin, indice Philly Fed manufacturier, et inscriptions au chômage hebdomadaires**. Ces chiffres compléteront le puzzle CPI de la veille et confirmeront ou infirmeront la santé du consommateur. En Europe, publication de Publicis en semestriels, et Sodexo tient sa journée investisseurs. Après clôture US, on suivra les résultats de Netflix, plus périphériques pour nos marchés mais souvent utilisés comme baromètre du sentiment tech.\n\n**Vendredi 17 juillet**, la semaine se ferme sur deux données à surveiller. À 11h, la publication finale de l'**inflation harmonisée en zone euro**. À 16h, la **confiance des consommateurs Michigan préliminaire**, avec une attention particulière sur les anticipations d'inflation, qui peuvent faire bouger l'or plus fortement qu'on ne le croit.\n\n**Le rendez-vous à ne pas manquer cette semaine** est donc sans hésitation le **CPI américain du mardi 14 juillet à 14h30 Paris (23h30 Nouméa)**. Tout le reste, publications d'entreprises, décisions de banques centrales, statistiques secondaires, s'ordonne autour de cette échéance et ne prendra son sens qu'après.\n\n---\n\n*Sources principales : Boursorama, Investing.com, TradingView, CoinGlass, alternative.me, CME FedWatch, Trading Economics, Kitco, BLS, ABC Bourse, Bourse Direct, Zonebourse, LiteFinance, FXStreet.*"},{"date":"2026-07-11","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe samedi, les marchés sont à l'arrêt mais l'histoire se joue déjà. Trois forces dominent le tableau et convergent toutes vers un même point d'arrivée : mardi prochain, 14h30 heure de Paris.\n\nLa première force, c'est la **fixation absolue sur le CPI américain de juin**. Toute la semaine, les investisseurs ont retenu leur souffle, et cette attente explique pourquoi les marchés ont refusé de trancher. Petite précision par rapport à hier, la publication tombe bien le **mardi 14 juillet**, jour de la fête nationale française, et non le mercredi 15 comme je l'avais évoqué. Le CPI est attendu autour de 3,9 % en glissement annuel, en léger repli sur les 4,2 % de mai. Une décélération franche redonnerait de l'oxygène à tout le monde, actions, or et Bitcoin compris. Un chiffre décevant, à l'inverse, ferait basculer la Fed dans une posture encore plus dure.\n\nLa deuxième force, c'est justement une **Fed qui parle fort, et pas dans le sens que les marchés voudraient entendre**. Le comité qui décide des taux est aujourd'hui coupé en deux, neuf membres pour resserrer la politique monétaire contre huit qui préfèrent temporiser. Le gouverneur Waller a répété cette semaine que l'inflation redevenait la préoccupation numéro un, et le marché obligataire ne parie plus du tout sur une baisse des taux à la prochaine réunion du 29 juillet. Autrement dit, la banque centrale américaine ne viendra pas au secours des marchés cet été.\n\nLa troisième force est plus discrète mais tout aussi structurante, c'est **l'apaisement géopolitique de fin de semaine**. Après la flambée de mercredi, où la reprise des hostilités verbales entre Washington et Téhéran avait fait chuter le CAC de plus de 2 %, la tension est retombée d'un cran. Le pétrole est redescendu sous 76 dollars, ce qui allège la pression inflationniste et rassure sur la trajectoire des taux, sans pour autant supprimer le risque de fond au Moyen-Orient.\n\nCette combinaison, attente monétaire, banque centrale ferme et détente relative, dessine des marchés qui refusent le pari tranché. Ils patientent.\n\n## 2. CAC 40, la consolidation prudente\n\nLa Bourse de Paris a terminé la semaine sur une note ténue. Vendredi 10 juillet, le CAC 40 a clôturé à **8 338,97 points**, en hausse de 0,15 %, soit à peine 12 points de plus que la veille. Sur la semaine, le bilan est proche de l'équilibre, légèrement négatif. Le rebond de jeudi (+0,90 %) et la petite avancée de vendredi n'ont pas suffi à effacer la chute brutale de mercredi, où l'indice avait plongé de 2,18 % dans la foulée du regain de tension avec l'Iran. Autrement dit, Paris a joué aux montagnes russes toute la semaine et se réveille ce samedi sans avoir vraiment tranché.\n\nSur le plan technique, TradingView renvoie un **signal parfaitement neutre**. Les oscillateurs sont endormis, les moyennes mobiles ne pointent nulle part. Ce n'est pas un signal de vente, ce n'est pas un signal d'achat, c'est un signal d'attente. Les niveaux clés à garder en tête :\n\n- **Résistance immédiate** : 8 350 à 8 400 points, verrou qu'il faut casser pour espérer viser 8 500 puis 8 700\n- **Support majeur** : 8 300 points, plusieurs fois testé en juillet, la ligne à ne pas franchir vers le bas\n- **Extension baissière** : 8 100 puis 8 000, et en cas de vraie panique 7 950 voire 7 640\n\nLe scénario haussier suppose que le CPI de mardi surprenne à la baisse et que les résultats des banques françaises, qui arrivent à partir du 23 juillet, confirment le solide début d'année anticipé par Bank of America. À l'inverse, une réaccélération du CPI ou une ré-escalade au Moyen-Orient rouvrirait la porte à un retour vers 8 100.\n\nCôté actualités valeurs, la belle histoire de la semaine s'appelle **ArcelorMittal**, qui a bondi de 6,42 % vendredi après un relèvement d'avis de JPMorgan. La déception, c'est **Thales**, en repli pour la quatrième séance consécutive dans un mouvement de prise de bénéfices sur le secteur défense. Les mégacapitalisations habituelles, LVMH, TotalEnergies, Airbus, BNP Paribas, Sanofi, n'ont pas fait parler d'elles cette semaine, mais Oddo BHF les garde toutes dans ses actions favorites 2026. Enfin, chez Alstom, les actionnaires ont retoqué l'indemnité de départ de l'ancien patron, signe que les assemblées générales redeviennent des lieux de vraie contestation.\n\nBonne nouvelle indirecte pour la semaine qui vient, la BCE devrait rester au repos le 23 juillet, après la petite hausse surprise de juin. L'inflation en zone euro a ralenti à 1,8 % en juin contre 2,4 % en mai. Le compteur monétaire européen est en pause.\n\n## 3. Crypto, le Bitcoin sur un fil\n\nBitcoin s'échange ce samedi matin autour de **64 153 dollars**, en hausse de 1,5 % sur les dernières vingt-quatre heures et de près de 3 % sur la semaine. Le mouvement paraît rassurant sur le papier, mais il ne raconte qu'une petite partie de l'histoire. Ethereum accompagne sans conviction, autour de 1 780 dollars, sans mouvement autonome digne d'attention.\n\nCe léger rebond est un souffle, pas un signal. La grande histoire de ces derniers jours reste celle **des flux qui quittent les fonds cotés Bitcoin américains**. Le mardi 8 juillet a vu partir 84,9 millions de dollars, le mercredi 9 juillet encore 95,3 millions, et jeudi 10 juillet les sorties agrégées Bitcoin et Ethereum ont dépassé 180 millions. Ce qui semblait être un retour institutionnel début juillet, avec 221 puis 265 millions d'entrées, s'est éteint dès la seconde semaine. Sur l'ensemble de 2026, les fonds cotés Bitcoin cumulent maintenant 5,4 milliards de dollars de sorties nettes. L'appétit institutionnel s'est refroidi.\n\nL'analyse technique reflète cette hésitation. TradingView renvoie un signal **neutre à la journée** mais **vente à la semaine et au mois**. Bitcoin reste bloqué sous la moyenne mobile 200 jours à 65 192 dollars, qui redevient un plafond dès que le prix s'en approche. Les niveaux à surveiller :\n\n- **Support psychologique** : 60 000 dollars\n- **Support majeur** : 58 000 dollars, zone décisive\n- **Résistance immédiate** : 65 600 à 66 250 dollars, plafond technique\n- **Résistance suivante** : 70 000 dollars\n\nDeux catalyseurs concentrent l'attention pour les prochains jours. Aujourd'hui même arrive une **expiration d'options Bitcoin de 1,5 milliard de dollars**, avec un point d'équilibre à 62 000 dollars, ce qui pourrait attirer le prix vers ce niveau dans la journée. Et mardi, le fameux CPI américain fera trembler la bougie hebdomadaire.\n\n### 🚦 Feu de circulation Bitcoin, 11 juillet 2026\n\n```\n🔴  Flux ETF          → Sorties nettes trois jours d'affilée, 5,4 Md$ de fuite depuis janvier\n🔴  Fear & Greed      → 26, peur toujours dominante malgré un léger réchauffement (23 hier)\n🔴  Fed               → Waller ferme, 0 % de probabilité de baisse et 25 % de hausse en juillet\n🟠  Dollar (DXY)      → Autour de 100,9, dollar stable, plus de vent porteur pour BTC\n🟠  Technique         → Signal neutre à la journée mais vente à la semaine et au mois\n🟠  Supports          → BTC dans le range 58-66 k$, sous la MA 200 jours qui bloque au-dessus\n🔴  Catalyseur 7j     → Options expiry 1,5 Md$ aujourd'hui, CPI US mardi, unlocks à foison\n\nVERDICT DU JOUR : 4 rouges, 3 oranges, 0 vert. Environnement toujours défavorable au Bitcoin.\nLe climat ne s'améliore pas, il change simplement de nature. Là où hier c'était le signal\ntechnique qui pesait le plus, aujourd'hui c'est le calendrier des sept prochains jours qui\ninquiète, entre l'expiration d'options ce soir et le CPI de mardi.\n```\n\n⚠️ **Alerte de bascule** : par rapport à hier, deux indicateurs se sont dégradés (le dollar est passé du vert à l'orange, et le catalyseur 7 jours est passé de l'orange au rouge à l'approche du CPI et de l'expiration d'options). Un seul indicateur s'est amélioré, le signal technique, qui est passé du rouge à l'orange grâce au petit rebond de la journée. Le total reste à 4 rouges, mais Bitcoin ne dispose plus d'aucun indicateur au vert. Ce n'est pas une bascule brutale, mais l'équilibre penche encore un cran de plus vers la prudence.\n\n## 4. Or, le métal qui souff r en ce moment. Il fait figure de spectateur neutre à 101 environ. Le vrai catalyseur, encore et toujours, reste le CPI de mardi, avec un second temps fort vendredi si les anticipations d'inflation du Michigan surprennent à la hausse.\n\n## 5. Synthèse stratégique, ce que dessinent les corrélations\n\nQuand on met les trois marchés côte à côte, la même image se dessine, celle d'une salle d'attente. CAC 40, Bitcoin et or vivent tous à l'ombre du même événement, ce chiffre d'inflation américain qui tombera mardi. Ce phénomène, qu'on appelle en salle de marché la synchronisation par le catalyseur, est instructif. Il signifie que l'univers macro pèse plus lourd cette semaine que les fondamentaux propres à chaque classe d'actifs. Les banques françaises, les flux crypto, la géopolitique du Moyen-Orient, tout cela est mis en veilleuse le temps qu'un chiffre décide de la couleur de la semaine suivante.\n\nLes points d'inflexion à surveiller sont donc particulièrement lisibles. Pour le CAC 40, le premier signal viendra du CPI mais Paris sera fermée le mardi 14 juillet, ce qui signifie que la Bourse intégrera le chiffre seulement à l'ouverture du mercredi 15, avec potentiellement un gap significatif. Pour Bitcoin, il faut d'abord passer l'expiration d'options de ce soir sans casser 60 000 dollars, puis absorber le CPI mardi. Pour l'or, la double échéance CPI mardi plus indice du Michigan vendredi encadre toute la semaine.\n\nUn scénario cohérent se dessinerait ainsi, si le CPI décélère nettement, on aurait un rebond simultané sur les trois marchés dans la seconde moitié de semaine. Si le CPI déçoit, l'or bénéficierait probablement du regain d'incertitude, tandis que le CAC 40 et Bitcoin plongeraient de concert. Le troisième cas, celui où l'inflation ressort exactement en ligne avec le consensus, prolongerait tout simplement la léthargie actuelle. Une chose est certaine, chercher à anticiper l'issue serait un pari aveugle. Les vrais mouvements se joueront dans les vingt-quatre heures qui suivront la publication.\n\n## 6. Calendrier de la semaine du 13 au 17 juillet\n\n**Rappel décalage horaire** : Nouméa est à UTC+11 sans heure d'été, Paris est à UTC+2 en juillet, donc Nouméa = Paris + 9 heures. Le CPI américain de mardi tombe à 14h30 à Paris, soit 23h30 à Nouméa.\n\n**Lundi 13 juillet**, la journée est presque vide côté statistiques. Aucune publication américaine ou européenne majeure. C'est une journée de positionnement pour ceux qui veulent ajuster leurs paris avant le grand rendez-vous du lendemain. Chez les entreprises, seul Thermador Groupe publie en France. Côté crypto, plusieurs déblocages de tokens sont à surveiller, notamment sur Aptos avec 11,3 millions de jetons libérés, Arbitrum et LayerZero.\n\n**Mardi 14 juillet**, c'est le jour pivot de la semaine, et probablement du mois. La Bourse de Paris est fermée pour la fête nationale, mais Wall Street tourne comme d'habitude. **Le CPI américain de juin tombe à 14h30 heure de Paris** (23h30 à Nouméa), et c'est **LE rendez-vous à ne pas manquer**. Consensus autour de 3,9 % en glissement annuel, ce qui signifie que tout chiffre supérieur à 4,1 % passera pour un mauvais signal, et tout chiffre inférieur à 3,8 % sera lu comme une bonne nouvelle. Dans la foulée, le gouverneur de la Fed Kevin Warsh sera auditionné par la Chambre des représentants. Et avant l'ouverture des marchés américains, **la saison des résultats des grandes banques US démarre** avec JPMorgan (consensus BPA 5,59 dollars), Bank of America, Wells Fargo, Goldman Sachs et Citigroup. Le marché attend une saison solide, portée par les marges d'intérêt et la qualité du crédit.\n\n**Mercredi 15 juillet**, la Chine ouvre le bal à 4h du matin heure de Paris (14h à Nouméa) avec son **PIB du deuxième trimestre**, attendu entre 4,6 et 4,9 % en glissement annuel, contre 5,0 % au premier trimestre. Un chiffre décevant plomberait immédiatement le secteur du luxe européen, donc le CAC 40 via LVMH, Kering et Hermès. Dans la même journée, le PPI américain et l'indice manufacturier Empire State à 14h30, la décision de la Banque du Canada à 15h45 (statu quo attendu), et surtout la publication d'ASML avant l'ouverture européenne, qui donnera le pouls du secteur semi-conducteurs mondial. Aux États-Unis, on suivra Johnson & Johnson, Morgan Stanley et BlackRock.\n\n**Jeudi 16 juillet**, la journée est chargée du côté du consommateur américain. À 14h30, **ventes de détail de juin, indice Philly Fed manufacturier, et inscriptions au chômage hebdomadaires**. Ces chiffres compléteront le puzzle CPI de la veille et confirmeront ou infirmeront la santé du consommateur. En Europe, publication de Publicis en semestriels, et Sodexo tient sa journée investisseurs. Après clôture US, on suivra les résultats de Netflix, plus périphériques pour nos marchés mais souvent utilisés comme baromètre du sentiment tech.\n\n**Vendredi 17 juillet**, la semaine se ferme sur deux données à surveiller. À 11h, la publication finale de l'**inflation harmonisée en zone euro**. À 16h, la **confiance des consommateurs Michigan préliminaire**, avec une attention particulière sur les anticipations d'inflation, qui peuvent faire bouger l'or plus fortement qu'on ne le croit.\n\n**Le rendez-vous à ne pas manquer cette semaine** est donc sans hésitation le **CPI américain du mardi 14 juillet à 14h30 Paris (23h30 Nouméa)**. Tout le reste, publications d'entreprises, décisions de banques centrales, statistiques secondaires, s'ordonne autour de cette échéance et ne prendra son sens qu'après.\n\n---\n\n*Sources principales : Boursorama, Investing.com, TradingView, CoinGlass, alternative.me, CME FedWatch, Trading Economics, Kitco, BLS, ABC Bourse, Bourse Direct, Zonebourse.*"},{"date":"2026-07-10","type":"daily","titre":"CAC 40 · Crypto · Or","md":"CAC 40, Crypto, Or\n\n---\n\n## 1. Le fil conducteur du jour\n\nAprès trois séances passées à retenir son souffle, le marché a fini par relâcher hier un peu de pression. Trois forces se croisent ce m ravail. STMicroelectronics a bondi de 7,2 % sur les bons chiffres de son concurrent SK Hynix, Soitec a suivi avec un gain de 5,9 %, et l'ensemble des équipementiers a repris des couleurs. Les industriels exposés au pétrole comme Airbus et Safran ont respiré, tandis que TotalEnergies rendait une partie de ses gains dans la foulée de la baisse du brut. Les financières restent, elles, prudentes. Elles paient encore la nervosité sur les taux longs et n'ont participé que du bout des lèvres à la reprise. Le luxe reste également en retrait, dans un mouvement de consolidation qui a maintenant plusieurs semaines de continuité.\n\nSur le plan technique, TradingView renvoie une image plus mesurée qu'il y a 48 heures. La structure de fond reste haussière, avec un canal ascendant intact sur le moyen terme et une moyenne mobile à 50 jours toujours défendue en dessous. Le signal court terme est en revanche neutre, et la vigilance reste de mise. Les niveaux à garder en tête :\n\n- **Résistance immédiate** : 8 430 points, le premier verrou à casser en clôture pour valider la reprise\n- **Résistance intermédiaire** : 8 500 points, puis le sommet à 8 620\n- **Support immédiat** : 8 250 points, exactement le seuil qui a tenu ces derniers jours\n- **Support majeur** : 7 900 points, puis 7 640 en cas d'accélération baissière\n\nLe scénario haussier suppose que le CAC parvienne à recasser 8 430 dans les prochaines séances. Il ouvrirait alors la voie à un retour vers 8 620 et au-delà, avec un stop-loss cohérent sous 8 200. Le scénario baissier reprendrait la main si le support à 8 250 cédait, avec pour cible une descente vers 7 900 puis 7 640. La journée d'aujourd'hui sera une séance charnière, et la question est simple : le marché a-t-il l'appétit d'enfoncer 8 430 ou va-t-il se contenter de digérer le rebond d'hier ?\n\n## 3. Crypto, le Bitcoin coincé entre deux logiques\n\nLe Bitcoin s'échange ce matin autour de **62 200 dollars**, en très léger recul sur 24 heures mais en hausse d'environ 3 % sur la semaine. C'est un chiffre en trompe-l'œil, parce qu'il masque un vrai combat de fond entre deux forces qui s'annulent presque. D'un côté, la baisse du dollar et la détente géopolitique devraient jouer en faveur du BTC. De l'autre, les flux institutionnels racontent une histoire nettement plus sombre. Après quatre journées de collectes positives, les ETF Bitcoin américains ont enregistré hier une décollecte nette de **84,9 millions de dollars**, coupant net l'espoir d'un vrai retour de l'appétit institutionnel. La cicatrice de juin, où les investisseurs ont retiré 4,5 milliards de dollars de ces produits (le pire mois depuis leur lancement en janvier 2024), reste très fraîche. Le solde net à l'année plafonne toujours à -5,4 milliards.\n\nTechniquement, le message reste sévère. TradingView renvoie un signal **vente** franc sur les horizons journalier, hebdomadaire et mensuel. Le prix évolue sous ses moyennes mobiles principales et sous le seuil des 65 000 dollars qui faisait office de repère de tendance depuis plusieurs mois. Les niveaux qui structurent la journée :\n\n- **Résistance** : 65 000 dollars, puis la zone 69 000-71 700 où se concentre la vraie bataille technique\n- **Support** : 60 000 dollars comme seuil psychologique, puis 58 115 comme plancher testé fin juin\n\nUn rebond crédible passe par une réouverture au-dessus de 65 000, ce qui semble aujourd'hui hors de portée à court terme. Un scénario baissier plus sombre s'ouvrirait sous 60 000 dollars, avec un test possible des 58 000, exactement le territoire où les baleines avaient massivement acheté fin juin. La bataille se joue autour de ces deux bornes, et le vrai déclencheur est agendé pour mardi prochain.\n\n### 🚦 Feu de circulation Bitcoin, 10 juillet 2026\n\n```\n🔴  Flux ETF          → Sorties nettes de 84,9 M$ hier, la série de 4 jours de collecte est cassée\n🔴  Fear & Greed      → 22 (peur extrême), la nervosité domine toujours le marché\n🔴  Fed               → Minutes hawkish, biais \" me temps.\n\nLe luxe a plié le premier. LVMH abandonne 0,9 %, Hermès chute de 1,7 % et Kering perd 1,3 %, dans un mouvement qui ressemble à une prise de bénéfices sur le compartiment qui avait le mieux tenu jusqu'ici. Les financières, plus vulnérables à toute remontée des taux longs, encaissent plus durement encore : BNP Paribas cède 2,1 %, Crédit Agricole recule de 1,6 % et Société Générale s'enfonce de 2,4 %. Airbus perd 2,6 %, Safran 2,8 %, et Schneider Electric dévisse de 3,7 % après des critiques d'investisseurs jugeant sa dernière acquisition trop coûteuse. Le seul îlot d'oxygène vient de TotalEnergies, qui grimpe de 0,9 % dans le sillage de la remontée du pétrole. C'est peu, très peu, pour tenir un indice à flot.\n\nSur le plan technique, TradingView renvoie un signal mixte, plutôt neutre à vendeur, l'indice étant en train de tester ce qu'on appelle une zone de rejet historique autour de 8 200-8 300 points. Les niveaux à garder en tête :\n\n- **Résistance immédiate** : la zone 8 300 points, verrou clé pour espérer un rebond durable\n- **Résistance intermédiaire** : 8 500 points, puis le sommet à 8 620\n- **Support immédiat** : autour de 8 250 points, exactement là où l'indice évolue ce matin\n- **Support majeur** : 7 900 points, puis 7 640, puis 7 350 en cas d'accélération baissière\n\nLe scénario haussier suppose que le CAC parvienne à recasser 8 300 en clôture. Il ouvrirait alors la voie à un retour vers 8 500 puis 8 700, avec un stop-loss pertinent sous 8 100. Le scénario baissier, plus probable si les tensions géopolitiques persistent, ouvrirait une descente vers 7 900 puis 7 600. La journée d'aujourd'hui sera un test grandeur nature : si le support des 8 250 cède en séance, la mécanique baissière pourrait s'accélérer.\n\n## 3. Crypto, le Bitcoin en apnée\n\nLe Bitcoin s'échange ce matin autour de **62 000 dollars**, dans un range étroit qui trahit l'indécision. La semaine dernière il touchait 63 800 puis reculait vers 61 900, ce qui donne un tableau d'en
