in de juin** (consensus 0,0 % sur le mois, 6,2 % sur un an) et du **PPI core** (0,3 % / 5,2 %). Impact fort : c'est le complément du CPI d'hier et il testera la trajectoire des marges des producteurs. À **15h45**, la **Banque du Canada** annonce sa décision de taux, avec un statu quo attendu à 2,25 % (sixième maintien consécutif). À **16h00**, **Kevin Warsh témoigne au Sénat** (Banking Committee), il devrait réitérer sa ligne \"l'inflation reste trop élevée\". Impact fort. Après clôture Amsterdam, **ASML publie ses résultats du deuxième trimestre**, avec un BPA attendu autour de 7,98 dollars et des ventes entre 8,4 et 9 milliards d'euros. C'est le coup d'envoi de la saison tech après un mois de juin difficile. Côté crypto, un unlock STRK modeste de 3,9 millions de dollars.\n\n**Jeudi 16 juillet.** Journée qui commence tôt à Nouméa. À **4h du matin (Paris)**, la Chine publie son **PIB du deuxième trimestre**, ses **ventes de détail** et sa **production industrielle** de juin (consensus 4,6 à 4,9 % sur un an). **Impact fort** pour le luxe européen, le cuivre et la demande mondiale. À **14h30 (Paris)**, **ventes de détail américaines de juin** (attendues à +0,2 %) : test crucial de la résilience du consommateur américain après les tarifs douaniers. Impact fort. Toujours à 14h30, inscriptions hebdomadaires au chômage (218 000 attendues) et **Philly Fed** de juillet. Avant clôture Taipei, **TSMC publie son deuxième trimestre** (revenus attendus entre 39 et 40 milliards de dollars) : c'est le baromètre absolu de la demande en puces IA. Après clôture US, **Netflix** publie (12,6 milliards de dollars attendus). Côté crypto, unlocks ARB (8,94 M$), MAGMA (5 M$) et VALVE (2,6 M$).\n\n**Vendredi 17 juillet.** Journée plus calme mais avec un rendez-vous à ne pas manquer. À **11h00 (Paris)**, publication du **CPI final zone euro** de juin (consensus 2,8 %, révisé à la baisse depuis 3,2 %) : confirmera la désinflation avant la BCE du 23. À 14h30, mises en chantier et permis de construire américains. À 15h15, production industrielle américaine. À **16h00 (Paris)**, **sentiment préliminaire de l'Université du Michigan de juillet** (consensus 51,0, avec des anticipations d'inflation à un an à 4,4 %). Impact fort : c'est le baromètre du moral des ménages américains.\n\n### Le rendez-vous à ne pas manquer cette semaine\n\n**Le PPI américain de cet après-midi à 14h30 (Paris), soit 00h30 jeudi à Nouméa**, couplé au témoignage de Kevin Warsh à 16h00 (Paris, soit 2h du matin à Nouméa). Ce combo va sceller la conviction du marché sur ce que fera la Fed le 29 juillet. C'est ce qui peut bouger CAC 40, crypto et or dans la journée. Si Catherine se lève tôt, elle aura déjà la réaction du marché américain en séance asiatique en début de matinée.\n\nSecond rendez-vous majeur : la **décision de la BCE jeudi 23 juillet à 14h15 (Paris), doublée du triple earnings Tesla + Alphabet + IBM la veille au soir**. C'est le combo de la semaine prochaine qui fera bouger l'ensemble des trois marchés couverts.\n\nRappel du décalage horaire : Paris = Nouméa moins dix heures en cette saison. Un événement à 14h30 Paris tombe à 0h30 (nuit de mercredi à jeudi) à Nouméa."},{"date":"2026-07-14","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe mardi 14 juillet, la France est en fête, mais les marchés eux ne prennent pas de congé. Euronext Paris reste ouverte, comme chaque année, avec des volumes qui seront simplement plus légers qu'à l'ordinaire. Et pourtant, cette journée symbolique va peut-être devenir la séance la plus déterminante du mois, parce qu'elle superpose trois événements majeurs en quelques heures, tous connectés entre eux comme les maillons d'une même chaîne. Un signal fort a déjà été envoyé pendant la nuit : **l'or a cassé son plancher psychologique des 4 000 dollars**, en clôturant lundi à 3 999,85 dollars l'once selon TradingEconomics, en recul de 2,94 % sur la journée, soit 122 dollars fondus en une séance. Un événement rare qui donne le ton de la journée.\n\nLa première force du jour, c'est **le CPI américain de juin qui tombe cet après-midi à 14 h 30 heure de Paris**, soit à minuit et demi à Nouméa. Le consensus attend une inflation en léger recul, autour de 3,8 à 3,9 % en glissement annuel contre 4,2 % en mai, portée par un pétrole qui a reculé de 10 % en juin dans le sillage de la réouverture du détroit d'Ormuz. Mais tous les regards sont en fait rivés sur le coeur d'inflation, celui qui exclut l'énergie et l'alimentation, attendu autour de 2,9 %. C'est ce chiffre-là que la Fed regarde, et un dixième de trop suffirait à changer complètement le récit.\n\nLa deuxième force, c'est **la Fed elle-même qui vient parler**. Kevin Warsh, son président depuis mai, entame aujourd'hui son premier semiannual monetary policy report devant le Congrès. Il commence à seize heures ce mardi devant la House Financial Services Committee, puis remettra le couvert mercredi devant le Senate Banking. Ses premières phrases publiques depuis la rentrée politique tombent donc précisément dans le sillage du CPI, ce qui donne à sa lecture des chiffres une puissance rare. La Fed tient son taux directeur à 3,75 % depuis la décision du 17 juin, et TradingEconomics maintient un consensus au statu quo pour le 29 juillet. Mais le marché a déjà commencé à digérer par anticipation, puisque le CME FedWatch a basculé en quelques jours seulement. Il ne donne plus que 53,5 % de probabilité pour un statu quo à la réunion du 29 juillet et **46,5 % pour une hausse de vingt-cinq points de base**, contre 31,5 % il y a une semaine à peine. Plus impressionnant encore, **la probabilité d'une hausse en septembre grimpe à près de 70 %** sur les swaps de taux, et TradingEconomics projette désormais un taux directeur à 4,25 % en 2027, soit deux hausses supplémentaires à venir. La baisse a totalement disparu du radar. En huit jours, le narratif a viré au hawkish franc.\n\nLa troisième force, c'est **la saison des résultats des banques américaines qui s'ouvre ce matin avant l'ouverture de Wall Street**. JPMorgan, Bank of America, Wells Fargo, Citigroup et Goldman Sachs publient tous aujourd'hui, avec des mouvements implicites pricés par les options entre 4,4 et 6 %. Les revenus de trading et de fusions-acquisitions vont donner le ton pour tout le secteur financier mondial, et par ricochet pour BNP Paribas, Société Générale et Crédit Agricole côté français.\n\nL'image du jour, c'est celle d'un aiguillage. En quelques heures, trois trains arrivent au même carrefour, et il suffira d'un chiffre mal orienté pour que la trajectoire des marchés bascule d'un côté ou de l'autre pour le reste du semestre.\n\n## 2. CAC 40, une séance de fête aux volumes fantômes mais aux enjeux réels\n\nLa Bourse de Paris a clôturé hier lundi à **8 320,60 points selon TradingEconomics** (8 357,98 selon d'autres sources locales, l'écart tenant à l'heure exacte du snapshot), en léger rebond de 0,31 % sur la journée après une semaine passée à -2,25 % marquée par les tensions autour des négociations américano-iraniennes. Sur le mois, l'indice recule de 0,76 %, mais il reste en hausse de 6,56 % depuis le début de l'année. Ce mardi matin, l'indice a ouvert en repli d'environ 0,3 % autour des **8 318 points**, dans le calme d'un jour férié qui vide les salles de marché parisiennes mais laisse tourner les cotations. Les futures Euro Stoxx 50 avaient pourtant repris 0,6 % ce matin dans les échanges asiatiques, sur un rebond de la tech américaine hier soir. Cette petite divergence traduit exactement l'ambiance, celle d'un marché qui préfère alléger la voilure avant le CPI plutôt que de rejouer l'optimisme de la veille.\n\nLe paysage sectoriel de lundi est intéressant à décrypter. Selon TradingEconomics, ce sont **l'énergie et le luxe qui ont porté l'indice**, avec un **TotalEnergies en hausse de 3 %** sur la remontée des cours du pétrole, tandis que les **poids lourds industriels ont perdu du terrain** dans le sillage des tensions moyen-orientales. Cette rotation sectorielle est typique d'un marché qui se replace vers les valeurs défensives et cycliques face à un choc géopolitique. Et surtout, TradingEconomics souligne que **les marchés anticipent désormais deux hausses supplémentaires de la BCE dans les douze prochains mois**, en réaction à la reprise des prix du pétrole, ce qui pèserait mécaniquement sur les banques et sur les valeurs cycliques du CAC 40. Un vent contraire supplémentaire.\n\nPoint important sur le long terme, **les modèles économétriques de TradingEconomics restent nettement baissiers sur le CAC 40**, avec une projection à **8 161 points à trois mois** et **7 579 points à douze mois**. C'est près de 9 % en dessous du niveau actuel sur un an. Cette vue reflète l'anticipation d'un cycle monétaire plus dur en zone euro combiné aux effets retardés du dollar fort sur les exportateurs français.\n\nL'analyse technique reste sur un signal **neutre à haussier**, avec une structure de court terme préservée mais **bloquée sous la barrière psychologique des 8 400 points**, verrou qu'il faudrait casser pour espérer aller chercher plus haut. Les niveaux à retenir pour la journée :\n\n- **Support immédiat** : 8 338 à 8 306 points, la zone de la clôture de vendredi\n- **Support majeur** : 8 250 puis 8 150 points, à défendre pour éviter un scénario de correction\n- **Extension baissière en cas de rupture** : 7 950 puis 7 850, avec un pire scénario à 7 580\n- **Résistance immédiate** : 8 400 points, le verrou à casser\n- **Résistance suivante** : 8 500 puis 8 575 points\n- **Plus haut annuel** : 8 642 points\n\nLe scénario haussier passe par une clôture quotidienne au-dessus de 8 400, qui ouvrirait la porte vers 8 500 puis 8 575. Le scénario baissier se déclenche sous 8 300, avec une cascade vers 7 950 et 7 850, et une invalidation seulement au-dessus de 8 300.\n\nCôté valeurs françaises, la semaine est studieuse mais pas encore rythmée par les grands rendez-vous du CAC 40, dont les publications semestrielles ne démarrent vraiment qu'à partir du 23 juillet. Publicis publiera jeudi 16 son premier semestriel du CAC, et Sodexo tiendra un Investor Day le même jour. C'est peu, mais le regard se porte de toute façon **vers les résultats des banques américaines de ce matin**, qui vont déteindre sur BNP, SocGen et Crédit Agricole dès la reprise complète de la cote mercredi.\n\nDeux publications européennes valent le déplacement, cette fois demain. **ASML** publie mercredi et les options pricent un mouvement de 8 %, ce qui suffit à électriser tout le secteur des semi-conducteurs européens. **Richemont** publie aussi mercredi et donnera un premier baromètre du luxe avant les grands noms français. LVMH, rappelons-le, a perdu 28,5 % depuis le début de l'année, et UBS maintient pourtant une cible à 640 euros. Ce mercredi pourrait donner un premier signal sur la solidité ou la fragilité de cette thèse.\n\n## 3. Crypto, Bitcoin sous la moyenne mobile qui compte\n\nBitcoin s'échange ce mardi matin autour de **62 006 dollars selon TradingEconomics** (clôture lundi 13 juillet), en repli marqué de **2,76 % sur vingt-quatre heures**, soit 1 761 dollars perdus en une séance. Le sell-off asiatique de lundi a effacé le petit rebond du week-end, avec une séance coréenne qui a plongé de 9,2 % sur fond de tensions géopolitiques et 253 millions de dollars liquidés sur les marchés dérivés crypto dans la foulée. Ethereum a suivi la même pente, à **1 764,85 dollars**, en recul de 2,26 %. Le comportement défensif observé depuis quinze jours ne se dément pas, et le repli est plus prononcé qu'attendu, ce qui indique une capitulation partielle des mains faibles avant le CPI.\n\nUn signal technique majeur est en train de se dessiner. **Bitcoin évolue actuellement au contact direct de sa moyenne mobile 200 semaines**, cette grande référence qui, historiquement, a servi de plancher absolu aux bear markets de 2015, 2018 et 2022. Fin juin, le prix a même imprimé sa première clôture hebdomadaire sous cette moyenne, ce qui ne s'était jamais produit dans une phase de bull cycle. En cas de rupture propre de la zone 62 000-63 000, le prochain grand support horizontal se situe autour de 58 000 à 60 000 dollars.\n\nTechniquement, TradingView renvoie un signal **neutre à la journée mais vente forte à la semaine et vente au mois**. Les moyennes mobiles envoient un signal Strong Sell, tandis que les oscillateurs restent neutres. Les niveaux à surveiller aujourd'hui :\n\n- **Support immédiat** : 61 463 à 61 633 dollars\n- **Support majeur** : 58 300 à 58 830 dollars, zone décisive à défendre\n- **Support de structure** : 57 200 dollars, cassure ouvre 45-50 k\n- **Résistance immédiate** : 63 100 à 63 800 dollars, test en cours\n- **Résistance clé** : 64 353 à 64 500 dollars, franchissement nécessaire pour retrouver de l'espace\n- **Résistances suivantes** : 66 017 à 67 167 puis 69 600 dollars\n\nLes traders TradingView se répartissent entre deux camps. Les haussiers guettent une cassure au-dessus de 64 500 pour viser 66 000 puis 67 200 dollars, avec des cibles étendues jusqu'à 84 000 dans les scénarios les plus optimistes. Les baissiers voient plutôt un rejet du 64 k et un retour vers 62 800 puis 61 633, avec une invalidation nette de la structure haussière si le 61 508 est perdu.\n\nCôté flux, **les ETF Bitcoin américains ont enchaîné une timide séance verte le 10 juillet avec 90,4 millions d'entrées nettes**, dont la quasi-totalité captée par BlackRock. Mais l'euphorie s'arrête là. Sur les trois dernières séances, les flux sont mixtes et n'ont pas confirmé un vrai retournement institutionnel. Le mois de juin s'était clos sur 222 millions de dollars de sorties, dans un streak de treize jours qui avait extrait 4,4 milliards de dollars du marché à son pire. La sortie de l'ornière est encore à démontrer.\n\nSur le front réglementaire, deux chantiers avancent en parallèle. **La SEC de Paul Atkins a officiellement inscrit trois initiatives à son agenda 2026 le 7 juillet**, avec une proposition attendue ce mois-ci sur les offres d'actifs numériques, les règles de capital des broker-dealers, et l'architecture de marché. C'est la première offensive rulemaking pro-active de la SEC depuis des années sur ce dossier. **Le CLARITY Act**, en revanche, reste bloqué au Sénat après le retour de recess. Toujours pas de vote de floor programmé, pas de motion de cloture déposée, et trois disputes qui verrouillent l'ensemble : la clause d'éthique visant les responsables publics défendue par Kirsten Gillibrand, la Section 604 sur la protection des développeurs DeFi, et la question du rendement autorisé sur les stablecoins, qui vaut 1,35 milliard de dollars annuels à Coinbase sur son partenariat USDC. Deadline effective, le 7 août, avant le recess d'été. Vingt jours ouvrés restants. Sans percée d'ici là, la loi passera à la trappe pour 2026.\n\n### 🚦 Feu de circulation Bitcoin, 14 juillet 2026\n\n```\n🟠  Flux ETF          → Timide retour au vert le 10 juillet avec +90 M$, mais 3 séances suivantes mixtes, pas de vraie confirmation\n🔴  Fear & Greed      → 28, toujours Fear, hier 26, sortie à peine de la zone extreme fear\n🔴  Fed               → 46,5 % de proba de hausse pour le 29 juillet, près de 70 % pour septembre, Warsh témoigne aujourd'hui\n🟠  Dollar (DXY)      → Stable à 100,93, ni frein ni relais, dollar étonnamment calme malgré le stress géopolitique\n🔴  Technique         → Daily neutre, Weekly Strong Sell, Monthly Sell, biais moyennes mobiles Strong Sell\n🔴  Supports          → BTC pour la première fois au contact de la MA 200 semaines, zone historique de plancher, moment critique\n🔴  Catalyseur 7j     → CPI US aujourd'hui + Warsh mardi et mercredi + expiration options BTC vendredi, semaine ultra binaire\n\nVERDICT DU JOUR : 5 rouges, 2 oranges, 0 vert. Environnement franchement défavorable au Bitcoin,\nen aggravation nette par rapport à hier qui affichait 3 rouges seulement. Deux indicateurs viennent\nde basculer au rouge, la Fed et la technique, tandis que le support psychologique du MA 200 semaines\ndevient la ligne de vie du marché. La journée peut soit tout renverser si le CPI vient rassurer,\nsoit précipiter une descente vers 58 000 si le core reste sticky et si Warsh en profite pour durcir\nson message devant le Congrès.\n```\n\n**⚠️ Alerte : le climat Bitcoin s'est nettement détérioré depuis hier.** Le tableau passe de 3 rouges / 4 oranges / 0 vert hier à 5 rouges / 2 oranges / 0 vert aujourd'hui. Deux indicateurs ont basculé au rouge en vingt-quatre heures. La Fed d'abord, avec la probabilité de hausse au 29 juillet qui bondit de 31,5 % à 46,5 %, soit un saut de quinze points en une semaine qui traduit un vrai changement de climat monétaire. La technique ensuite, avec un signal hebdomadaire qui est passé de Sell à Strong Sell et un signal mensuel qui s'est enfoncé de neutre à Sell. Et surtout, le support majeur du MA 200 semaines vient d'être testé pour la première fois depuis le début du cycle haussier. Le marché arrive au CPI de ce soir avec les nerfs à vif.\n\n## 4. Or, le métal jaune sur son plancher psychologique\n\nÉvénement lourd de la nuit. **L'once d'or a clôturé lundi soir à 3 999,85 dollars selon TradingEconomics**, en recul de 2,94 % sur la journée, soit 122 dollars fondus en une seule séance. Le support psychologique des 4 000 dollars, qui semblait indestructible ces derniers mois, vient de céder par le bas. Le prix flotte désormais à moitié au-dessus, à moitié en dessous, et chaque tick prend une importance particulière. Sur le mois, l'or perd désormais 7,19 %. Sur douze mois, il reste en hausse de 19,66 % malgré tout, ce qui rappelle qu'il vient de très loin. Depuis son sommet historique de janvier à 5 608 dollars, le métal jaune a désormais perdu **25 %** en six mois, ce qui est une correction majeure pour un actif habituellement plus stable.\n\nCette cassure paraît paradoxale à première vue. Le week-end a vu resurgir les tensions entre les États-Unis et l'Iran, avec des mouvements militaires signalés autour du détroit d'Ormuz et des **échanges militaires directs qui ont fait bondir le pétrole de plus de 4 %** selon TradingEconomics. On aurait pu s'attendre à un réflexe classique de fuite vers l'or comme valeur refuge. C'est exactement l'inverse qui s'est produit. Le raisonnement du marché, plus subtil, tient en une phrase. Les tensions géopolitiques font remonter le pétrole, ce qui ravive les anticipations d'inflation, ce qui renforce le scénario d'une Fed plus dure plus longtemps, ce qui fait grimper les taux réels, ce qui pèse sur l'or. Chaque maillon s'est enchaîné mécaniquement en quarante-huit heures, et le prix a suivi. TradingEconomics résume la situation en une phrase, les investisseurs anticipent une hausse de la Fed avec **près de 70 % de probabilité pour septembre**, ce qui suffit à tuer le rendement du refuge sans coupon.\n\nTechniquement, TradingView renvoie désormais un signal **de vente à la journée, neutre à la semaine, mais toujours acheteur au mois**. Le biais long terme n'est pas cassé, mais la pression court terme est réelle. Les niveaux à retenir :\n\n- **Support clé court terme** : 4 045 dollars\n- **Support psychologique** : 4 000 dollars\n- **Support critique** : 3 960 dollars, en cas de cassure la structure bascule\n- **Extension baissière** : 3 951 puis 3 893 puis 3 820 dollars\n- **Résistance immédiate** : 4 100 dollars, niveau à reconquérir en priorité\n- **Résistance suivante** : 4 138 puis 4 180 puis 4 206 dollars\n\nLe dollar joue son rôle de gros bras dans cette histoire, avec un DXY à 101,8, son plus haut de treize mois, en hausse de 3 % depuis le début d'année. Les taux à deux ans américains touchent de nouveaux sommets de 2026. Toute la chaîne monétaire se tend, et l'or n'a plus les paramètres pour respirer.\n\nCôté institutionnel, **la Chine continue d'acheter**. La People's Bank of China a ajouté 14,93 tonnes en juin, son vingtième mois consécutif d'accumulation, portant ses réserves totales à 2 346 tonnes. Sur l'année, l'accumulation cumule 40 tonnes. C'est le plus gros achat mensuel depuis 2023, mais l'or ne représente toujours pas 10 % du portefeuille de réserves chinois, donc la marge d'accumulation reste immense.\n\nLes cibles des grandes banques se sont un peu écartelées ces dernières semaines. JP Morgan tient toujours son objectif de 6 000 dollars pour la fin d'année, avec une extension possible à 6 300 en 2027. UBS a révisé à la baisse, de 5 600 vers 5 500, mais garde un scénario haussier extrême à 7 200 en cas d'escalade géopolitique majeure. Wells Fargo reste dans la fourchette 5 000 à 6 300. Mais Goldman Sachs, plus prudente, a coupé sa cible le 20 juin de 5 400 à 4 900, invoquant des flux ETF en berne et l'absence de baisse de taux attendue. **TradingEconomics est nettement plus modéré**, avec une projection à **4 203 dollars à la fin du trimestre** et **4 501 dollars à douze mois**. OCBC, à contre-courant, mise sur une baisse jusqu'à fin 2026. Le consensus reste haussier à long terme, mais le court terme joue franchement contre le métal.\n\n**Impact attendu du CPI de ce soir**, en une phrase. Un chiffre plus mou que prévu ferait respirer l'or et permettrait un rebond immédiat vers 4 100 puis 4 138. Un chiffre en ligne ou plus chaud, surtout sur le core, enfoncerait définitivement la cassure des 4 000 dollars et ouvrirait la porte vers 3 951 puis 3 893, avec un test du support critique à 3 960 qui deviendrait alors la nouvelle ligne de vie du métal. Détail piquant, TradingEconomics anticipe même un CPI de juin à 334,3 points de son indice, soit légèrement sous le consensus de 335,1. Si le modèle a raison, ce sera positif pour l'or à court terme.\n\n## 5. Synthèse stratégique, un carrefour à trois voies\n\nTrois marchés, une même journée pivot. C'est le résumé le plus court possible de cette séance du 14 juillet. Le CAC 40 profite de son férié pour tourner au ralenti, mais il est déjà positionné défensivement en repli léger, à 8 320 points. Le Bitcoin est arc-bouté sur son MA 200 semaines, à 62 006 dollars, une ligne historique qui a toujours tenu les bear markets. L'or, pour la première fois depuis longtemps, a lâché son plancher psychologique et flotte sur les 4 000 dollars exactement, à 3 999,85. Les projections à douze mois de TradingEconomics dessinent d'ailleurs un tableau cohérent, avec un CAC à 7 579 (soit -9 %), un or à 4 501 (soit +12 %) et une Fed qui reste ferme à 4,25 % en 2027. Autrement dit, un scénario de recul modéré des actions européennes, de rebond mesuré de l'or malgré le trou d'air actuel, et de politique monétaire américaine qui ne cède pas.\n\nLes trois actifs sont désormais parfaitement corrélés à un seul chiffre, celui du **core CPI américain à 14 h 30 heure de Paris**. En dessous de 2,8 % en glissement annuel, le marché déclenchera un rallye risk-on synchronisé, avec un rebond du Bitcoin qui pourrait aller chercher 65 000 dollars, un CAC 40 qui casserait 8 400 à la réouverture complète de mercredi, et un or qui reprendrait ses 4 100 pour rejouer la thèse haussière long terme. À 2,9 % en ligne avec le consensus, chaque actif restera dans son couloir en attendant Warsh. Au-dessus de 3,0 %, le scénario baissier s'active partout, avec un test des 58 000 sur le Bitcoin, un CAC qui glisserait vers 8 250, et un or qui casserait 4 000.\n\nLe paramètre secondaire, aussi puissant que le CPI lui-même, c'est **le ton de Warsh dans les heures qui suivent**. S'il choisit de donner le coup de grâce en insistant sur la stickiness du core et en évoquant explicitement une hausse de taux au 29 juillet, la journée peut se transformer en avalanche. S'il temporise et joue la carte du data-dependent, le marché aura une chance de digérer sans casse.\n\nLe point d'inflexion à surveiller pour toute la semaine est aussi le comportement des **valeurs bancaires américaines aujourd'hui**. Leurs résultats, publiés avant l'ouverture de Wall Street, vont donner un premier signal réel sur la santé du crédit américain, sur les marges nettes d'intérêt et sur les provisions. Une saison bancaire vigoureuse pourrait offrir un contre-poids à un CPI décevant, en montrant que l'économie tient bon. Une saison bancaire décevante viendrait au contraire enfoncer le clou.\n\n## 6. Surveillance des banques américaines aujourd'hui\n\nPuisque la journée bascule aussi sur les résultats des cinq grandes banques américaines, cette section leur est dédiée. **Elle est en surveillance active et sera mise à jour dans la veille de demain, quand tous les chiffres seront tombés.**\n\nLes cinq mastodontes publient ce mardi 14 juillet **avant l'ouverture de Wall Street**. Concrètement pour Catherine à Nouméa, cela veut dire vers vingt-trois heures ce soir pour Wells Fargo et JPMorgan (sept heures Eastern Time), puis vers minuit pour Citigroup et Bank of America (huit heures Eastern Time), et Goldman Sachs dans la même fenêtre. Les conférences téléphoniques suivent une à deux heures plus tard. Rien n'est encore publié à cet instant, il n'est que sept heures du matin à Nouméa, mais tout le climat de fin de journée est déjà calibré autour de ces publications.\n\n**Les consensus attendus** (source Yahoo Finance, IG, StocksAnalyzer) :\n\n| Banque | EPS consensus | Croissance YoY | Mouvement pricé par les options |\n|--------|---------------|----------------|--------------------------------|\n| JPMorgan (JPM) | 5,44 à 5,61 $ | +10 % | 4,4 % |\n| Goldman Sachs (GS) | 14,47 $ | +32 % | **6,0 %** |\n| Bank of America (BAC) | 1,12 $ (rev 30,7 Md$) | +25 % | 4,5 % |\n| Wells Fargo (WFC) | Consensus abaissé de 1 % | Pression sur les marges | 5,5 % |\n| Citigroup (C) | Révisé légèrement à la hausse | Best revenus depuis 10 ans au T1 | 5,5 % |\n\nCe qu'il faudra regarder en priorité :\n\n- **Le Net Interest Income (NII)**, c'est-à-dire la marge entre ce que la banque gagne sur les prêts et ce qu'elle paie sur les dépôts. C'est le vrai baromètre de la santé du crédit américain. Si les NII progressent, cela veut dire que les banques réussissent à répercuter le coût de l'argent sur leurs clients, que la demande de crédit tient, et que la Fed peut se permettre de rester dure sans casser la mécanique.\n- **Les provisions pour pertes sur créances**. Une hausse marquée serait le signe que les défauts commencent à monter, notamment sur les cartes de crédit et l'automobile, deux poches déjà fragiles. Une stabilité serait au contraire rassurante.\n- **Les revenus de trading et de fusions-acquisitions**, en particulier chez JPMorgan et Goldman Sachs. Ils portent la moitié de la thèse haussière des analystes cette année. Si la banque d'investissement déçoit, le titre peut aller chercher les 6 % de baisse pricés par les options.\n- **Les guidances pour le second semestre**. C'est probablement l'élément le plus important, parce qu'il conditionne la lecture pour tous les résultats bancaires européens à venir, dont BNP Paribas, Société Générale et Crédit Agricole.\n\n**État de la place avant publication.** Le KBW Nasdaq Bank Index (BKX) a clôturé lundi à **186,25 points en repli de 0,51 %**, dans une fourchette étroite entre 185,61 et 187,74. JPMorgan cotait 336,47 dollars vendredi et évoluait autour de 339,39 en pré-marché lundi, en léger repli de 1,17 %. **Le SPDR S&P Regional Banking ETF (KRE) vient d'être dégradé à Hold**, sur la thèse que le catalyseur d'assouplissement de la Fed s'est déjà joué et que le point d'entrée est moins attractif. Le secteur bancaire arrive donc en salle de conférence dans une posture prudente, ni euphorique ni paniquée, ce qui laisse une belle marge de surprise dans les deux sens.\n\n**Lecture stratégique**. Une saison bancaire vigoureuse, avec des NII qui progressent, des provisions maîtrisées et des guidances confiantes, pourrait **offrir un contre-poids à un CPI décevant**, en montrant que l'économie tient bon et que la Fed a raison de garder son ton dur sans casser la machine. Ce serait un signal réconciliateur pour le marché, qui accepterait alors des taux hauts plus longtemps comme le prix à payer d'une économie solide. Une saison bancaire décevante, à l'inverse, avec des provisions qui gonflent et des guidances prudentes, **viendrait enfoncer le clou** sur le scénario du hard landing rampant, aggraverait la pression sur les valeurs cycliques européennes dès la reprise de mercredi, et pourrait précipiter le Bitcoin sous les 60 000 dollars et l'or vers 3 900.\n\nPoint de vigilance particulier, **Wells Fargo est celle dont les analystes ont abaissé les estimations**, ce qui en fait le point faible du peloton. Une déception sur WFC lundi soir Nouméa aurait un effet démultiplié, parce qu'elle serait interprétée comme un signal sur la santé du crédit à la consommation américain.\n\nCes éléments seront réintégrés dans la veille de mercredi matin avec les chiffres réels et les premières réactions du marché.\n\n## 7. Calendrier de la semaine, une semaine en accordéon\n\n**Mardi 14 juillet**, la journée d'aujourd'hui, est de loin la plus binaire du mois. **Le CPI américain de juin sort à 14 h 30 heure de Paris**, avec un consensus à 3,8 % sur le headline et 2,9 % sur le core. À seize heures, Kevin Warsh entame son audition devant la House Financial Services Committee. Avant l'ouverture de Wall Street, JPMorgan, Bank of America, Wells Fargo, Citigroup et Goldman Sachs publient leurs résultats du deuxième trimestre. Les adjudications de bons du Trésor américains à 4, 6, 8 et 17 semaines viennent compléter le tableau. Aucun autre événement à ce niveau d'impact ne se produira cette semaine.\n\n**Mercredi 15 juillet**, la Chine entre dans la danse à quatre heures du matin heure de Paris avec la publication du **PIB du deuxième trimestre**, attendu à 4,5 % contre 5,0 % au premier trimestre, accompagné de la production industrielle, des ventes au détail et de l'investissement. Ce chiffre pèsera lourd sur les valeurs du luxe européennes, puisque LVMH, Kering et Hermès dépendent structurellement de la consommation chinoise. À 14 h 30, le **PPI américain** de juin viendra compléter le tableau inflation avec un impact modéré. À seize heures, Warsh remet le couvert, cette fois devant le Senate Banking Committee. Avant l'ouverture de Wall Street, Morgan Stanley, Johnson & Johnson, Bank of New York Mellon et surtout **ASML** publient. Les options pricent un mouvement de 8 % sur ASML, ce qui suffit à bouleverser le secteur des semi-conducteurs européens.\n\n**Jeudi 16 juillet**, la journée est chargée mais moins tendue. Publicis publie son premier semestriel du CAC 40 avant l'ouverture de Paris. À l'américaine, **TSMC** publie ses résultats du deuxième trimestre avec un consensus de croissance des revenus de 32,2 %, ce qui suffit à faire bouger toute la thématique intelligence artificielle. À 14 h 30, les **ventes au détail américaines de juin** et les inscriptions hebdomadaires au chômage donnent un signal supplémentaire sur la vigueur de la consommation. Le Philadelphia Fed Manufacturing Index sort au même moment. Après la clôture américaine, à vingt-deux heures, Netflix publie ses résultats du deuxième trimestre, avec un consensus de croissance des revenus de 14 % à 12,6 milliards de dollars, ce qui sera scruté comme baromètre du sentiment growth global.\n\n**Vendredi 17 juillet**, la journée termine sur des données plus techniques. À 14 h 30 sortent les mises en chantier de logements et permis de construire américains, ainsi que les prix à l'import et à l'export. À 15 h 15, la production industrielle et l'utilisation des capacités. À seize heures, l'**indice Michigan préliminaire** de juillet vient boucler la semaine avec ses fameuses anticipations d'inflation à cinq ans, qui pourraient offrir un second temps fort après le CPI. La séance sera aussi marquée par une **expiration mensuelle d'options Bitcoin et Ethereum sur Deribit** vers neuf heures UTC, capable d'imprimer sa marque sur la volatilité intraday de la crypto.\n\nSur le front crypto, deux dossiers sont à suivre en fond de tableau. Le CLARITY Act pourrait voir une percée dans le cadre des négociations sénatoriales qui ont repris hier, avec une deadline effective au 7 août. Et la SEC de Paul Atkins pourrait dévoiler sa proposition de Regulation Crypto d'ici la fin du mois, sans date précise à ce stade. Aucun de ces deux mouvements n'est calé à un jour précis cette semaine, mais l'un ou l'autre peut surgir à tout moment.\n\n### Le rendez-vous à ne pas manquer cette semaine\n\n**Mardi 14 juillet, 14 h 30 heure de Paris, US CPI de juin.** C'est aujourd'hui, dans quelques heures pour les Parisiens, à minuit et demi pour Nouméa. C'est le pivot de la semaine, et sans doute du mois. Il tombe en pleine audition Warsh, en pleine saison des résultats bancaires américains, dans un climat où la Fed vient de basculer à 46,5 % de probabilité de hausse, et où Bitcoin est arc-bouté sur son plancher historique. Une surprise à la hausse suffirait à basculer les trois marchés couverts dans une avalanche baissière, une surprise à la baisse suffirait à déclencher un rallye risk-on synchronisé. Aucune autre séance du mois n'a une charge binaire aussi lourde.\n\nPour Catherine à Nouméa, cela signifie que le vrai spectacle démarre à minuit et demi ce mercredi. Si tu veux voir le film à l'ouverture, jette un oeil aux futures Bitcoin et aux cours de l'or en te réveillant mercredi matin."},{"date":"2026-07-13","type":"dossier","titre":"Le CLARITY Act : la loi qui doit dire qui régule la crypto aux États-Unis","md":"Si la réforme \"Regulation Crypto\" de la SEC change l'attitude du gendarme de la Bourse, le CLARITY Act, lui, s'attaque à une question encore plus fondamentale : aux États-Unis, qui a le droit de réguler la crypto ? Depuis des années, deux agences se disputent le terrain, et cette bataille de compétences est l'une des grandes sources d'incertitude du secteur. Le CLARITY Act veut y mettre fin par une loi. Voici ce qu'il contient, pourquoi ce serait un signal fort, et pourquoi il coince encore au Sénat.\n\n## De quoi on parle exactement\n\nAux États-Unis, deux régulateurs pourraient s'occuper de la crypto, et c'est là tout le problème.\n\nD'un côté, la SEC surveille les \"titres financiers\" (les actions, les obligations). De l'autre, la CFTC (Commodity Futures Trading Commission) surveille les \"matières premières\" et leurs marchés (le pétrole, le blé, mais aussi certains actifs financiers). La grande question, jamais tranchée clairement, était : un Bitcoin, un Ethereum, un token quelconque, est-ce un titre financier (donc SEC) ou une matière première numérique (donc CFTC) ?\n\nCette ambiguïté n'est pas un détail théorique. C'est le cœur de presque tous les procès crypto de la dernière décennie. Selon la réponse, les obligations, les contrôles et les régulateurs changent du tout au tout.\n\nLe CLARITY Act, de son vrai nom Digital Asset Market Clarity Act (référence H.R. 3633), veut fixer les règles une fois pour toutes. Son objectif : tracer une frontière nette entre ce qui relève de la SEC et ce qui relève de la CFTC.\n\n## Pourquoi ce serait un signal fort\n\nTrois raisons rendent ce texte particulièrement important.\n\n**Il donne enfin une adresse à la crypto.** En désignant clairement un régulateur principal, la CFTC, pour la grande majorité des actifs numériques, la loi met fin à la guerre de tranchées entre agences. Un secteur qui sait à quelle porte frapper est un secteur où les entreprises et les investisseurs osent revenir. La CFTC est par ailleurs perçue comme plus familière des marchés de matières premières et moins hostile que la SEC, ce que le secteur voit d'un bon oeil.\n\n**Il répond à la question qui empoisonnait tout : titre ou pas titre ?** En définissant précisément ce qu'est une \"matière première numérique\", la loi retire aux tribunaux le pouvoir de décider au cas par cas. C'est la fin de l'insécurité permanente qui planait sur chaque projet.\n\n**Il porte un signal politique rare : le soutien des deux camps.** La loi a été adoptée à la Chambre des représentants en juillet 2025 par 294 voix contre 134, un score largement bipartisan. Aux États-Unis, quand démocrates et républicains votent ensemble un texte, c'est le signe d'un changement de fond, pas d'un coup politique passager. Les marchés le lisent comme une orientation durable.\n\nEn résumé, là où la réforme de la SEC change le climat, le CLARITY Act change l'architecture même de la régulation. Les deux textes se complètent (voir le dossier consacré à la Regulation Crypto de la SEC).\n\n## Les différents points du texte\n\n- **Le partage des compétences SEC / CFTC.** C'est le coeur de la loi. La CFTC obtiendrait une compétence exclusive sur les marchés au comptant des matières premières numériques, tandis que la SEC verrait son pouvoir réduit, conservé pour les actifs qui restent de vrais titres financiers (comme les contrats d'investissement).\n\n- **Une définition de la \"matière première numérique\".** Le texte définit un digital commodity comme un actif dont la valeur est \"intrinsèquement liée\" à l'usage d'une blockchain. Il en exclut explicitement les titres financiers, les produits dérivés et les stablecoins, qui gardent leur propre régime.\n\n- **La notion de blockchain \"mature\".** Les plateformes d'échange ne pourraient proposer que des actifs dont la blockchain est certifiée \"mature\", c'est-à-dire suffisamment décentralisée et robuste. Pour les blockchains encore jeunes, l'émetteur devrait se plier à des obligations d'information continues. C'est une façon de récompenser la vraie décentralisation.\n\n- **De la transparence avant toute mise sur le marché.** Avant de lister un nouvel actif, une plateforme devrait publier certaines informations : le code source, l'historique des transactions, et les \"règles économiques\" du token (combien il en existe, comment il est distribué). L'idée est de protéger l'investisseur contre les projets opaques.\n\n- **Un enregistrement provisoire.** En attendant la mise en place complète de la loi, les plateformes, courtiers et teneurs de marché pourraient s'enregistrer de façon provisoire, à condition de protéger les fonds de leurs clients et de laisser la CFTC accéder à leurs livres de comptes.\n\n- **Une porte de sortie pour lever des fonds.** La loi prévoit une exemption limitée d'enregistrement auprès de la SEC pour certaines levées de fonds, dans le même esprit que la réforme de la SEC.\n\n## Ce qui bloque encore (et c'est important)\n\nVoici la partie que les titres optimistes oublient souvent. Malgré son vote à la Chambre et son passage en commission au Sénat en mai 2026 (par 15 voix contre 9), la loi n'est toujours pas adoptée. Au 4 juillet 2026, elle attendait sur le calendrier du Sénat sans vote programmé.\n\nLa raison : au Sénat, il faut réunir 60 voix pour faire passer un texte, ce qui oblige les républicains à convaincre plusieurs démocrates. Et trois désaccords bloquent ce ralliement.\n\n- **Une clause d'éthique.** C'est le point le plus explosif. Des sénateurs démocrates exigent une disposition qui interdirait aux hauts responsables publics, président compris, de conserver des intérêts d'affaires dans le secteur crypto. Tant que cette règle anti conflit d'intérêts n'est pas ajoutée, ils refusent d'apporter leurs voix.\n- **La protection de la finance décentralisée (Section 604).** Cette section reprend un autre texte, le Blockchain Regulatory Certainty Act, qui mettrait les développeurs de logiciels non dépositaires (ceux qui ne détiennent jamais les fonds des utilisateurs) à l'abri des obligations imposées aux transmetteurs d'argent et de la lourde réglementation anti blanchiment. Le périmètre exact de cette protection fait débat.\n- **La rémunération des stablecoins.** La question paraît technique mais pèse des milliards. Il s'agit de savoir si les plateformes ont le droit de verser une forme d'intérêt sur ces jetons. Coinbase, par exemple, tire environ 1,35 milliard de dollars par an des récompenses versées sur l'USDC. Les banques traditionnelles y voient une faille qui contournerait l'interdiction, posée par une autre loi (le GENIUS Act), de rémunérer directement ces jetons.\n\nTant que ces trois points ne sont pas tranchés, la loi reste suspendue. C'est le rappel utile que rien n'est joué : un texte peut être largement soutenu et rester bloqué des mois pour des désaccords précis. Le jour d'un déblocage, la vraie question sera : lequel de ces trois noeuds a été dénoué, et à quel prix ?\n\n## Le calendrier à surveiller\n\n- **Juillet 2025** : adoption à la Chambre des représentants (294 contre 134).\n- **Mai 2026** : passage en commission bancaire du Sénat (15 contre 9).\n- **Juin 2026** : inscription au calendrier législatif du Sénat, sans date de vote.\n- **Semaine du 15 juillet 2026** : une nouvelle version du texte, fusionnant les travaux de deux commissions, pourrait être présentée. La sénatrice Cynthia Lummis pousse pour un vote rapide.\n- **Été 2026** : la fenêtre se resserre. Les sénateurs n'ont qu'une vingtaine de jours de travail avant les vacances d'août, ce qui met la pression pour aboutir ou reporter.\n\nLe signal à guetter n'est pas l'existence de la loi, déjà connue, mais un déblocage au Sénat : un accord sur les trois points litigieux, ou une date de vote enfin fixée. C'est cela qui ferait réagir le marché.\n\n---\n\n*Dossier construit à partir de sources croisées : les analyses du service de recherche du Congrès américain (CRS) et de Congress.gov pour le contenu du texte, et le suivi législatif de cabinets spécialisés pour l'état d'avancement au Sénat. Les votes chiffrés sont issus des comptes rendus officiels. Ce dossier est une explication d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-13","type":"dossier","titre":"Régulation Crypto : la réforme de la SEC qui veut changer les règles du jeu","md":"Depuis des années, la crypto vit aux États-Unis dans un flou juridique inconfortable. Personne ne savait vraiment quelles règles s'appliquaient, et le gendarme de la Bourse américaine, la SEC, avançait surtout à coups de procès. En juillet 2026, cette page pourrait se tourner. La SEC prépare une réforme baptisée \"Regulation Crypto\", présentée comme l'un des changements les plus importants de la politique américaine sur les actifs numériques depuis leur naissance. Voici de quoi il s'agit, pourquoi ce serait un signal fort, et ce que contient concrètement le projet.\n\n## De quoi on parle exactement\n\nLa SEC (Securities and Exchange Commission) est l'équivalent américain de notre Autorité des marchés financiers. C'est elle qui décide si un actif est un \"titre financier\", ce qui déclenche une montagne d'obligations d'enregistrement et de contrôle.\n\nJusqu'ici, la crypto tombait dans une zone grise. La SEC considérait que beaucoup de projets vendaient en réalité des titres financiers déguisés, et poursuivait les entreprises au cas par cas. Résultat : une insécurité permanente, des acteurs qui préféraient s'installer ailleurs, et une innovation qui fuyait le territoire américain.\n\nLe projet \"Regulation Crypto\", porté par le président actuel de la SEC Paul Atkins, propose une autre approche : au lieu de sanctionner après coup, écrire des règles claires à l'avance. L'objectif affiché par Atkins est de \"créer des règles claires pour la levée de capital avec des actifs cryptographiques\" et de faire des États-Unis la capitale mondiale de la crypto.\n\n## Pourquoi ce serait un signal fort\n\nC'est le cœur de la question. Une réforme technique, en soi, ne fait pas bouger un marché. Mais celle-ci a une portée particulière, pour trois raisons.\n\n**Elle change la posture de l'État, pas juste une règle.** On passe d'un régulateur qui punit à un régulateur qui encadre. Pour un secteur qui a passé des années sur la défensive, c'est un renversement de climat. Quand le principal adversaire d'hier tend la main, les investisseurs institutionnels, banques et fonds, qui attendaient de la clarté pour entrer, n'ont soudain plus la même excuse pour rester à l'écart.\n\n**Elle vient des États-Unis, qui donnent le tempo.** Le marché crypto mondial suit largement la réglementation américaine. Une clarification à Washington ne reste jamais locale : elle envoie un signal à toute la planète financière sur la légitimité de la classe d'actifs.\n\n**Elle rouvre la porte au financement.** En facilitant la levée de fonds des jeunes entreprises crypto sur le sol américain (voir plus bas), la réforme cherche à faire revenir l'innovation, les talents et les capitaux qui étaient partis vers des juridictions plus accueillantes. Un afflux de projets et d'argent est, historiquement, un moteur de fond pour tout l'écosystème.\n\nEn clair, ce n'est pas la réforme elle-même qui ferait monter le Bitcoin du jour au lendemain, c'est ce qu'elle signifie : la fin d'une hostilité, le début d'un cadre. Les marchés achètent rarement une loi, ils achètent un changement de direction.\n\n## Les différents points de la réforme\n\nLe projet s'articule autour de plusieurs volets. Voici les principaux, tels qu'ils ressortent des informations disponibles.\n\n- **Des \"safe harbors\" (zones de sécurité).** C'est l'idée centrale. Un safe harbor est une protection formelle : tant qu'une entreprise respecte certaines conditions, elle est à l'abri des poursuites de la SEC. On définit un espace où l'on a le droit d'innover sans craindre la sanction.\n\n- **Des exemptions temporaires d'enregistrement.** Les développeurs qui lancent un projet crypto pourraient, pendant une période donnée, être dispensés des lourdes obligations d'enregistrement normalement imposées aux titres financiers, incompatibles avec la façon dont fonctionnent ces projets.\n\n- **Une levée de fonds facilitée, avec des seuils chiffrés.** C'est le point le plus concret. Les jeunes entreprises éligibles, valorisées à moins de 5 millions de dollars pendant leurs quatre premières années, pourraient lever jusqu'à 75 millions de dollars via des contrats d'investissement crypto qualifiés. Autrement dit, un chemin balisé pour se financer légalement.\n\n- **Un cadre pour la finance décentralisée (DeFi).** La DeFi, ces protocoles financiers qui fonctionnent sans intermédiaire, était particulièrement mal traitée par le droit existant. Le projet prévoit des exemptions adaptées à sa nature.\n\n- **Un cadre pour les titres tokenisés.** La tokenisation consiste à représenter un actif réel (une action, une obligation) sous forme de jeton sur une blockchain. La réforme veut lui donner des règles propres, un sujet que les grandes institutions financières suivent de très près.\n\n- **Une protection liée à la décentralisation.** Un safe harbor est prévu pour les projets qui, au départ pilotés par une équipe, se sont depuis suffisamment décentralisés. C'est une reconnaissance d'un principe défendu de longue date : un réseau vraiment décentralisé, comme Ethereum, ne devrait pas être traité comme un titre financier contrôlé par une société.\n\nCes règles s'inscrivent dans un chantier plus large : la SEC a inscrit à son agenda 2026 trois grands textes, couvrant l'offre d'actifs crypto, les obligations des courtiers (protection des clients et exigences de capital), et la structure même des marchés crypto.\n\n## Ce qu'il faut garder en tête (l'honnêteté d'abord)\n\nTrois nuances importantes, pour ne pas se laisser emporter par l'enthousiasme des titres.\n\nD'abord, **ce n'est qu'un projet, pas une loi en vigueur.** Au moment où ces lignes sont écrites, le texte est en cours d'examen à la Maison Blanche (au bureau chargé des affaires réglementaires). La proposition est attendue en juillet 2026, mais elle sera ensuite soumise à une période de commentaires publics avant toute adoption définitive. Entre l'annonce et l'application réelle, il peut se passer des mois, et le texte peut changer.\n\nEnsuite, **cette réforme n'est pas seule.** En parallèle, le Congrès négocie une grande loi, le CLARITY Act, sur la structure des marchés crypto, actuellement bloquée au Sénat. Les deux dossiers se répondent, et c'est l'ensemble qui dessinera le futur cadre américain, pas la seule initiative de la SEC.\n\nEnfin, **un cadre plus clair n'est pas une garantie de hausse.** Il réduit l'incertitude, ce qui est sain, mais il encadre aussi plus strictement. La clarté profite aux acteurs sérieux et complique la vie des projets fragiles. C'est une bonne nouvelle pour la maturité du secteur, pas un feu vert pour spéculer les yeux fermés.\n\n## Le calendrier à surveiller\n\n- **Juillet 2026** : publication attendue de la proposition \"Regulation Crypto\" par la SEC.\n- **Ensuite** : période de commentaires publics, puis éventuelle adoption. Comptez plusieurs mois.\n- **En parallèle** : le sort du CLARITY Act au Sénat, avec une échéance politique qui se resserre à l'approche de l'été.\n\nLe vrai signal à guetter n'est pas l'annonce elle-même, largement anticipée, mais le détail du texte une fois publié : les seuils exacts, les conditions des safe harbors, et le traitement réservé à la DeFi. C'est là que se jouera la portée réelle de la réforme.\n\n---\n\n*Dossier construit à partir de sources croisées : CoinDesk (politique et déclarations de la SEC), et le suivi de l'agenda réglementaire 2026 de la SEC. Les seuils chiffrés (5 millions de valorisation, 75 millions de levée) sont confirmés par au moins deux sources concordantes. Ce dossier est une explication d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-13","type":"crypto","titre":"Revue de presse crypto de la semaine","md":"## L'histoire de la semaine\n\nAprès deux mois où l'argent n'a fait que sortir, la crypto a repris un peu son souffle cette semaine. Le Bitcoin, tombé fin juin à son plus bas depuis près de deux ans, a réussi à se redresser, et pour la première fois depuis huit semaines les fonds indiciels américains ont vu revenir plus d'argent qu'il n'en partait. Rien de spectaculaire, mais un vrai changement de ton. En toile de fond, tout le monde regarde Washington : le régulateur américain prépare une réforme importante, et une grande loi sur les cryptos joue sa survie au Sénat dans les prochains jours. La semaine a donc été celle d'une accalmie fragile, suspendue à des décisions politiques.\n\n## Bitcoin et Ethereum\n\nIl faut d'abord remettre les chiffres dans leur histoire. Le Bitcoin avait atteint un sommet à environ 126 000 dollars en octobre 2025. Depuis, il a perdu près de la moitié de sa valeur. Fin juin 2026, il est descendu vers 58 000 à 60 000 dollars, son plus bas niveau depuis vingt et un mois, avant de rebondir. Le 7 juillet, CoinDesk le voyait repasser au-dessus de 64 000 dollars, porté par des chiffres de l'emploi américain plus mous que prévu, ce qui a rassuré les investisseurs sur le fait que la banque centrale américaine ne durcirait pas encore le ton. Dans les jours qui ont suivi, il est retombé dans le bas des 60 000 dollars. Autrement dit : un rebond réel, mais qui reste fragile et sans élan franc.\n\nUn détail que je te signale parce qu'il est parlant. Le \"Coinbase Premium\", qui mesure si les Américains paient le Bitcoin plus cher que le reste du monde, est resté négatif cinquante jours d'affilée selon CoinDesk. En clair, la demande américaine reste faible. C'est un des points qui empêchent le rebond de se transformer en vraie reprise.\n\nCôté sentiment, l'indice de la peur et de l'avidité (le \"Fear and Greed\") est tombé début juillet à 11 sur 100, donc en zone de peur extrême, contre 15 la veille. C'est un signal à double lecture. D'un côté, il traduit une vraie anxiété. De l'autre, historiquement, ces niveaux de peur extrême ont souvent marqué des points bas, quand tout le monde a déjà vendu. À surveiller donc, sans en faire une boule de cristal.\n\nL'Ethereum, la deuxième cryptomonnaie, a suivi le même mouvement de fond, avec une note un peu plus positive du côté des fonds indiciels (voir ci-dessous).\n\n## Régulation et institutions\n\nC'est le vrai moteur de la semaine, et la zone où il faut être le plus prudent sur les sources, parce que c'est là que circulent le plus d'informations exagérées ou déformées.\n\nDeux dossiers avancent en parallèle à Washington.\n\nLe premier vient du gendarme de la Bourse américaine, la SEC. Selon CoinDesk, l'agence pourrait proposer dès ce mois de juillet une réforme baptisée \"Regulation Crypto\". L'idée est de créer des zones de tolérance et des exemptions pour certaines activités en chaîne, comme la finance décentralisée et les titres tokenisés, et de faciliter la levée de fonds des jeunes entreprises du secteur, qui pourraient réunir jusqu'à 75 millions de dollars via des contrats d'investissement crypto. Si elle se confirme, ce serait l'un des changements les plus importants de la politique américaine sur les actifs numériques depuis des années. Attention toutefois : à ce stade il s'agit d'un projet, pas d'une règle adoptée.\n\nLe second dossier est le CLARITY Act, une grande loi censée clarifier qui régule quoi dans la crypto américaine. Et là, l'histoire est moins rose que certains titres le laissent croire. Au 4 juillet, selon plusieurs sources concordantes, la loi était bloquée au Sénat : pas de vote programmé, et trois désaccords qui coincent encore. Un premier sur une clause d'éthique concernant les cryptos détenues par des responsables publics, un deuxième sur la protection de la finance décentralisée, un troisième sur la rémunération des stablecoins. La sénatrice Cynthia Lummis pousse pour un vote en juillet, et une nouvelle version du texte, fusionnant les travaux de deux commissions, pourrait être présentée dès la semaine du 15 juillet. Les sénateurs rentrent de congé le 13 juillet et n'ont qu'une vingtaine de jours de travail avant les vacances d'août. La fenêtre est donc étroite.\n\n## Ce qu'il faut relativiser\n\nC'est la partie la plus utile de cette revue, alors je te la donne sans détour.\n\nD'abord, sur les fonds indiciels. Certains sites ont titré sur une \"semaine record de fuite de 8,2 milliards de dollars\". Ce chiffre existe, mais il désigne le cumul de huit semaines de sorties, pas une seule semaine. Or justement, cette semaine, la tendance s'est inversée. Confondre le cumul et la semaine donne une image faussement catastrophique. La lecture juste, croisée entre plusieurs sources sérieuses : huit semaines de sorties, puis un premier retour d'argent d'environ 200 millions de dollars, la première semaine positive en deux mois, avec BlackRock en tête du mouvement. Les fonds Ethereum ont même connu leur meilleure semaine depuis fin avril, avec environ 84 millions de dollars d'entrées.\n\nEnsuite, méfie-toi des articles de \"prédiction de prix\" qui pullulent en ce moment, annonçant un Bitcoin à 70 000 ou 74 000 dollars en juillet. Ce sont des opinions et des modèles, pas des faits. Les niveaux réels de la semaine sont restés bien en dessous. Ces sites vivent du clic, pas de l'information.\n\nEnfin, un mot d'honnêteté sur les chiffres eux-mêmes. Selon les sources et le jour, on a vu le Bitcoin cité entre 54 000 et 64 000 dollars sur la première quinzaine de juillet. C'est normal, le prix bouge et chaque article fige un instant. J'ai retenu la fourchette et les sources les plus fiables plutôt qu'un chiffre unique faussement précis.\n\n## La semaine qui vient\n\nTrois rendez-vous à surveiller, par ordre d'importance.\n\nLe plus important : le CLARITY Act. Une nouvelle version du texte pourrait tomber dès la semaine du 15 juillet, et le calendrier du Sénat est serré avant les vacances d'août. Toute avancée, ou tout blocage, peut faire bouger le marché.\n\nEnsuite, la réforme \"Regulation Crypto\" de la SEC, qui pourrait être proposée ce mois-ci. Une annonce concrète serait un signal fort pour le secteur.\n\nEnfin, en fin de mois, la décision de la banque centrale américaine sur ses taux. C'est le grand rendez-vous macro qui, plus que tout le reste, dicte l'humeur du Bitcoin depuis un an. Les chiffres de l'emploi ayant été mous, le marché espère un ton plus souple.\n\n---\n\n*Revue construite à partir de sources croisées : CoinDesk pour les prix, les flux et la régulation, les données publiques de flux ETF, l'indice Fear and Greed, et le suivi du CLARITY Act au Sénat. Les informations à source unique ou invérifiables ont été écartées ou signalées comme telles. Cette revue est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-13","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe lundi 13 juillet, les marchés européens rouvrent après un week-end où rien n'a bougé mais où chacun s'est préparé mentalement au grand rendez-vous du lendemain. La semaine est courte pour les Français, puisque Paris sera fermée mardi pour la fête nationale, et cette anomalie du calendrier accentue le sentiment d'être dans un couloir étroit entre deux moments d'apesanteur. Le décor du jour reste dominé par trois forces qui n'ont pas changé de sens depuis vendredi.\n\nLa première, c'est **l'obsession quasi hypnotique pour le CPI américain de mardi**. Les investisseurs ne parlent presque plus que de ce chiffre. Consensus autour de 3,9 % en glissement annuel, coeur autour de 2,9 %, et une marge de tolérance très serrée. Le moindre écart d'un dixième pourrait redessiner la trajectoire des taux pour tout le second semestre, et donc celle des actions, de la crypto et de l'or dans la foulée. Aujourd'hui, personne n'ose miser. Les volumes seront probablement légers, et les prix devraient s'immobiliser dans des couloirs de plus en plus étroits jusqu'à l'ouverture de Wall Street.\n\nLa deuxième force, c'est **une Fed qui tient sa ligne dure**. Le CME FedWatch continue de renvoyer une carte sans concession, 68,5 % de probabilité de statu quo à la réunion du 29 juillet et surtout 31,5 % de probabilité de hausse, contre zéro pour une baisse. Pas de sauvetage possible cette fois. La banque centrale a fait le choix explicite de ne pas céder tant que l'inflation n'est pas revenue vers 2 %, et le nouveau président Kevin Warsh, qui témoignera devant le Congrès dès mardi, incarne cette rigueur. Son premier discours public depuis sa prestation de serment sera scruté au mot près.\n\nLa troisième force, plus discrète, c'est **l'accalmie géopolitique fragile qui tient bon**. Le week-end n'a pas apporté de nouvelle escalade entre les États-Unis et l'Iran, les négociations diplomatiques se poursuivent officiellement, et le pétrole reste ancré sous les 76 dollars. Cette accalmie est une bénédiction discrète pour l'inflation américaine et donc pour la Fed, mais chacun sait qu'une seule étincelle au Moyen-Orient pourrait renvoyer les marchés dans un scénario tout autre. Le calme d'aujourd'hui ne se prête donc à aucune illusion.\n\nL'image générale, celle d'une salle d'attente, se prolonge. Elle vit son avant-dernier jour, et la tension monte doucement.\n\n## 2. CAC 40, l'ultime jour de positionnement avant l'apesanteur\n\nLa Bourse de Paris rouvre ce lundi matin à partir des **8 348 points** de la clôture de vendredi, dans un climat plutôt neutre. La semaine passée s'est terminée sur un petit gain de 0,3 %, mais surtout sur une balançoire nerveuse dominée par la chute brutale de mercredi liée aux tensions iraniennes puis par le rebond de jeudi et vendredi. Le CAC 40 clôturait la semaine à peu près sur son point de départ, ce qui traduit parfaitement l'indécision des opérateurs.\n\nL'analyse technique reste **parfaitement neutre** sur TradingView, avec des oscillateurs et des moyennes mobiles qui envoient chacun leur signal d'endormissement. C'est le graphique d'un marché qui attend, ni acheteur ni vendeur. Les niveaux à surveiller aujourd'hui n'ont pas bougé :\n\n- **Résistance immédiate** : 8 350 à 8 400 points, verrou à casser pour espérer viser 8 500 puis 8 700\n- **Support majeur** : 8 300 points, à ne pas franchir vers le bas\n- **Extension baissière** : 8 100 puis 8 000, et en cas de vraie panique 7 950 voire 7 640\n\nLe point stratégique du jour, c'est cette configuration très particulière du **calendrier**. Puisque Paris ferme mardi pour le 14 juillet, toutes les positions prises ce lundi devront tenir jusqu'au mercredi matin 15, en subissant entre-temps la publication du CPI américain. Les gestionnaires prudents auront donc plutôt tendance à alléger leur exposition ce soir à la clôture, préférant ne pas dormir sur un chiffre imprévisible. On peut donc s'attendre à des volumes qui décélèrent dans l'après-midi et à une clôture sans grande direction, voire à un léger biais négatif si la prudence l'emporte. Mercredi matin, à l'inverse, l'ouverture pourrait se faire avec un gap important dans un sens ou dans l'autre selon le CPI de la veille.\n\nCôté valeurs, la semaine est studieuse mais pas encore rythmée par les grandes publications semestrielles, qui n'arrivent réellement qu'à partir du 23 juillet. Thermador Groupe publie aujourd'hui, plus par tradition que par impact. Le regard se porte davantage vers **les résultats des grandes banques américaines dès mardi** (JPMorgan, Bank of America, Wells Fargo, Goldman Sachs, Citigroup), qui donneront le ton pour les valeurs financières européennes. BNP Paribas, Société Générale et Crédit Agricole pourraient bien vivre une séance de mercredi assez animée si les banques US surprennent d'une manière ou d'une autre.\n\n## 3. Crypto, Bitcoin retombe dans son couloir d'attente\n\nBitcoin s'échange ce lundi matin autour de **63 700 dollars**, en léger recul par rapport aux 64 500 dollars affichés dimanche. Ce petit décrochage n'a rien d'inquiétant, il traduit simplement le retour du sentiment prudent alors que la semaine s'ouvre et que l'incertitude du CPI se rapproche. Ethereum stagne autour de 1 780 dollars, sans autonomie de mouvement. La journée devrait être calme, avec des volumes qui ne se réveilleront vraiment qu'à l'annonce de l'inflation américaine mardi.\n\nBonne surprise du week-end écoulé, **les flux ETF Bitcoin ont retrouvé le vert vendredi 10 juillet**, avec 90,4 millions de dollars d'entrées nettes sur les fonds 🟠  Supports          → BTC dans le range 60-66 k$, sous la MA 200 jours qui verrouille au-dessus\n🔴  Catalyseur 7j     → CPI US mardi, ventes de détail jeudi, Michigan vendredi, semaine potentiellement explosive\n\nVERDICT DU JOUR : 3 rouges, 4 oranges, 0 vert. Environnement toujours défavorable au Bitcoin,\nmais un cran moins tendu que dimanche grâce au retour des flux ETF au vert. Le tableau reste\nlourd, mais la corde se détend d'un demi-tour. Bitcoin devrait rester enfermé dans son range\n60-66 k$ tant que le CPI n'a pas parlé. Un chiffre d'inflation en dessous des attentes mardi\nsuffirait à faire basculer plusieurs indicateurs vers le vert dans les jours qui suivent.\n```\n\n**Une bascule modérée en positif depuis hier.** Le tableau passe de 4 rouges/3 oranges/0 vert à 3 rouges/4 oranges/0 vert. Ce n'est pas encore le signal d'amélioration franc (il aurait fallu 2 indicateurs qui basculent au vert), mais le retour des flux ETF est un début. Reste à voir s'il tient au-delà de mardi.\n\n## 4. Or, le métal patient reste dans son couloir\n\nL'or s'échange ce lundi matin autour de **4 121 dollars l'once**, presque identique à sa clôture de vendredi à 4 123 dollars. Une semaine entière s'est écoulée avec un métal jaune enfermé dans une fourchette étroite entre 4 100 et 4 125 dollars, une amplitude ridicule pour un actif habituellement bien plus nerveux. Cette discipline silencieuse est la parfaite illustration de l'ambiance générale, celle d'un marché qui refuse de bouger avant d'avoir vu le CPI.\n\nLe paradoxe évoqué ce week-end reste entier. L'or a perdu 26 % depuis son sommet de janvier à 5 598 dollars, mais **les grandes banques comme JP Morgan et Wells Fargo maintiennent une cible de 6 000 à 6 300 dollars d'ici la fin de l'année**. Comment tenir ces deux affirmations en même temps ? Simplement parce que deux forces contraires agissent en permanence. D'un côté, la Fed américaine reste ferme et les rendements réels élevés freinent l'or, parce qu'un placement sans  la clôture de ce lundi soir vaudra positionnement, puisque Paris devra ensuite attendre l'ouverture du mercredi 15 pour digérer le CPI. Pour Bitcoin, il faut d'abord tenir 60 000 dollars et rester dans le range 60-66 k$ jusqu'à mardi soir. Pour l'or, la double échéance CPI mardi plus Michigan vendredi encadre toute la semaine.\n\nUn scénario cohérent se dessinerait ainsi. Si le CPI décélère nettement en dessous de 3,8 %, on aurait un rebond simultané sur les trois marchés dans la seconde moitié de semaine, avec un CAC 40 qui viserait 8 500 points, un Bitcoin qui pourrait retester 68 000 dollars et un or qui casserait 4 157. Si le CPI déçoit au-dessus de 4,1 %, l'or bénéficierait probablement du regain d'incertitude comme valeur refuge, tandis que le CAC 40 et Bitcoin plongeraient de concert vers leurs supports majeurs, 8 100 pour Paris et 58 000 pour Bitcoin. Le troisième cas, celui où l'inflation ressort exactement en ligne avec le consensus, prolongerait tout simplement la léthargie actuelle et repousserait la vraie décision au FOMC du 29 juillet.\n\nChercher à anticiper l'issue serait un pari aveugle. Les vrais mouvements se joueront dans les vingt-quatre heures qui suivront la publication de mardi.\n\n## 6. Calendrier de la semaine du 13 au 17 juillet\n\n**Rappel décalage horaire** : Nouméa est à UTC+11 sans heure d'été, Paris est à UTC+2 en juillet, donc Nouméa = Paris + 9 heures. Le CPI américain de mardi tombe à 14h30 à Paris, soit 23h30 à Nouméa.\n\n**Lundi 13 juillet** (aujourd'hui), la journée est presque vide côté statistiques. Aucune publication américaine ou européenne majeure. C'est une journée de positionnement pour ceux qui veulent ajuster leurs paris avant le grand rendez-vous du lendemain. Chez les entreprises, seul Thermador Groupe publie en France. Les volumes seront probablement légers, et les mouvements de faible amplitude.\n\n**Mardi 14 juillet**, c'est le jour pivot de la semaine, et probablement du mois. La Bourse de Paris est fermée pour la fête nationale, mais Wall Street tourne comme d'habitude. **Le CPI américain de juin tombe à 14h30 heure de Paris** (23h30 à Nouméa), et c'est **LE rendez-vous à ne pas manquer**. Consensus autour de 3,9 % en glissement annuel, coeur autour de 2,9 %, ce qui signifie que tout chiffre supérieur à 4,1 % passera pour un mauvais signal, et tout chiffre inférieur à 3,8 % sera lu comme une bonne nouvelle. Dans la foulée, le nouveau président de la Fed **Kevin Warsh sera auditionné par la Chambre des représentants**, son premier grand discours depuis sa prestation de serment le 22 mai. Et avant l'ouverture des marchés américains, **la saison des résultats des grandes banques US démarre** avec JPMorgan (consensus BPA 5,59 dollars), Bank of America, Wells Fargo, Goldman Sachs et Citigroup. On suivra aussi les résultats européens de BP, Rio Tinto et Ericsson.\n\n**Mercredi 15 juillet**, la Chine ouvre le bal très tôt avec son **PIB du deuxième trimestre**, attendu entre 4,6 et 4,9 % en glissement annuel, contre 5,0 % au premier trimestre. Un chiffre décevant plomberait immédiatement le secteur du luxe européen, donc le CAC 40 via LVMH, Kering et Hermès. Dans la même journée, le PPI américain et l'indice manufacturier Empire State à 14h30 (23h30 à Nouméa), la décision de la Banque du Canada à 15h45, et la publication d'ASML avant l'ouverture européenne, qui donnera le pouls du secteur semi-conducteurs mondial. Aux États-Unis, on suivra Johnson & Johnson, Morgan Stanley et BlackRock. **C'est aussi le jour où Paris rouvre après la fête nationale et digère le CPI de la veille, potentiellement avec un gap important à l'ouverture**.\n\n**Jeudi 16 juillet**, la journée est chargée du côté du consommateur américain. À 14h30 heure de Paris (23h30 à Nouméa), **ventes de détail de juin, indice Philly Fed manufacturier, et inscriptions au chômage hebdomadaires**. Ces chiffres compléteront le puzzle CPI de la veille et confirmeront ou infirmeront la santé du consommateur. En Europe, publication de Publicis en semestriels, et Sodexo tient sa journée investisseurs. Après clôture US, Netflix publie, plus périphérique pour nos marchés mais souvent utilisé comme baromètre du sentiment tech.\n\n**Vendredi 17 juillet**, la semaine se ferme sur deux données à surveiller. À 11h, la publication finale de l'**inflation harmonisée en zone euro**. À 16h heure de Paris (1h du matin samedi à Nouméa), la **confiance des consommateurs Michigan préliminaire**, avec une attention particulière sur les anticipations d'inflation, qui peuvent faire bouger l'or plus fortement qu'on ne le croit.\n\n**Le rendez-vous à ne pas manquer cette semaine** est donc sans hésitation le **CPI américain du mardi 14 juillet à 14h30 Paris (23h30 Nouméa)**. Tout le reste, publications d'entreprises, décisions de banques centrales, statistiques secondaires, s'ordonne autour de cette échéance et ne prendra son sens qu'après.\n\n---\n\n*Sources principales : Boursorama, Investing.com, TradingView, CoinGlass, alternative.me, CME FedWatch, Trading Economics, Kitco, ABC Bourse, Bourse Direct, Zonebourse, LiteFinance, CryptoBriefing, Kiplinger.*"},{"date":"2026-07-12","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe dimanche matin à Nouméa, les places boursières dorment encore mais l'histoire de la semaine, elle, est déjà écrite. Trois forces continuent de tendre la corde vers un même moment, mardi 14 juillet à 14h30 heure de Paris, quand tombera le CPI américain de juin. À J moins deux, les investisseurs du monde entier révisent leur copie, et le week-end n'aura pas changé grand-chose au décor.\n\nLa première force, c'est **cette obsession collective pour le CPI**. Le consensus reste autour de 3,9 % en glissement annuel, en léger recul par rapport aux 4,2 % de mai. Depuis vendredi, aucune nouvelle donnée n'est venue bouger les anticipations. Un chiffre en dessous de 3,8 % serait accueilli comme une délivrance et rouvrirait la porte à une baisse de taux à  un gap important à l'ouverture**.\n\n**Jeudi 16 juillet**, la journée est chargée du côté du consommateur américain. À 14h30, **ventes de détail de juin, indice Philly Fed manufacturier, et inscriptions au chômage hebdomadaires**. Ces chiffres compléteront le puzzle CPI de la veille et confirmeront ou infirmeront la santé du consommateur. En Europe, publication de Publicis en semestriels, et Sodexo tient sa journée investisseurs. Après clôture US, on suivra les résultats de Netflix, plus périphériques pour nos marchés mais souvent utilisés comme baromètre du sentiment tech.\n\n**Vendredi 17 juillet**, la semaine se ferme sur deux données à surveiller. À 11h, la publication finale de l'**inflation harmonisée en zone euro**. À 16h, la **confiance des consommateurs Michigan préliminaire**, avec une attention particulière sur les anticipations d'inflation, qui peuvent faire bouger l'or plus fortement qu'on ne le croit.\n\n**Le rendez-vous à ne pas manquer cette semaine** est donc sans hésitation le **CPI américain du mardi 14 juillet à 14h30 Paris (23h30 Nouméa)**. Tout le reste, publications d'entreprises, décisions de banques centrales, statistiques secondaires, s'ordonne autour de cette échéance et ne prendra son sens qu'après.\n\n---\n\n*Sources principales : Boursorama, Investing.com, TradingView, CoinGlass, alternative.me, CME FedWatch, Trading Economics, Kitco, BLS, ABC Bourse, Bourse Direct, Zonebourse, LiteFinance, FXStreet.*"},{"date":"2026-07-11","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nCe samedi, les marchés sont à l'arrêt mais l'histoire se joue déjà. Trois forces dominent le tableau et convergent toutes vers un même point d'arrivée : mardi prochain, 14h30 heure de Paris.\n\nLa première force, c'est la **fixation absolue sur le CPI américain de juin**. Toute la semaine, les investisseurs ont retenu leur souffle, et cette attente explique pourquoi les marchés ont refusé de trancher. Petite précision par rapport à hier, la publication tombe bien le **mardi 14 juillet**, jour de la fête nationale française, et non le mercredi 15 comme je l'avais évoqué. Le CPI est attendu autour de 3,9 % en glissement annuel, en léger repli sur les 4,2 % de mai. Une décélération franche redonnerait de l'oxygène à tout le monde, actions, or et Bitcoin compris. Un chiffre décevant, à l'inverse, ferait basculer la Fed dans une posture encore plus dure.\n\nLa deuxième force, c'est justement une **Fed qui parle fort, et pas dans le sens que les marchés voudraient entendre**. Le comité qui décide des taux est aujourd'hui coupé en deux, neuf membres pour resserrer la politique monétaire contre huit qui préfèrent temporiser. Le gouverneur Waller a répété cette semaine que l'inflation redevenait la préoccupation numéro un, et le marché obligataire ne parie plus du tout sur une baisse des taux à la prochaine réunion du 29 juillet. Autrement dit, la banque centrale américaine ne viendra pas au secours des marchés cet été.\n\nLa troisième force est plus discrète mais tout aussi structurante, c'est **l'apaisement géopolitique de fin de semaine**. Après la flambée de mercredi, où la reprise des hostilités verbales entre Washington et Téhéran avait fait chuter le CAC de plus de 2 %, la tension est retombée d'un cran. Le pétrole est redescendu sous 76 dollars, ce qui allège la pression inflationniste et rassure sur la trajectoire des taux, sans pour autant supprimer le risque de fond au Moyen-Orient.\n\nCette combinaison, attente monétaire, banque centrale ferme et détente relative, dessine des marchés qui refusent le pari tranché. Ils patientent.\n\n## 2. CAC 40, la consolidation prudente\n\nLa Bourse de Paris a terminé la semaine sur une note ténue. Vendredi 10 juillet, le CAC 40 a clôturé à **8 338,97 points**, en hausse de 0,15 %, soit à peine 12 points de plus que la veille. Sur la semaine, le bilan est proche de l'équilibre, légèrement négatif. Le rebond de jeudi (+0,90 %) et la petite avancée de vend
