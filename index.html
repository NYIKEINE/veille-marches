ours à 14h30, les États-Unis publient les inscriptions hebdomadaires au chômage. À 19h00, adjudication US 10 ans indexée sur l'inflation. Enfin, après clôture Wall Street (22h00 Paris, 07h00 vendredi à Nouméa), **Intel** publie ses résultats, avec l'attente d'un premier trimestre bénéficiaire après six trimestres de pertes consécutives.\n\n**Vendredi 24 juillet.** Journée de vérité de l'activité en juillet. À 9h15-10h00 Paris, **PMI flash zone euro** (composite, manufacturier, services) publiés par S&P Global. Impact **fort** sur l'euro et les taux courts, au lendemain de la BCE. À 15h45 Paris (00h45 samedi à Nouméa), **PMI flash États-Unis**. À 14h30 Paris (23h30 Nouméa), **commandes de biens durables américaines** pour juin, baromètre de l'investissement productif. À 16h00 (01h00 samedi à Nouméa), ventes de logements neufs US. Journée qui va fixer le narratif d'été (récession douce ou tenue de l'activité) avant la Fed de la semaine suivante.\n\n> ### 📌 Le rendez-vous à ne pas manquer cette semaine\n>\n> **Jeudi 23 juillet, 13h45 Paris / 22h45 Nouméa — Décision BCE, puis conférence Lagarde à 14h30 (23h30 Nouméa).**\n>\n> Après la hausse surprise de 25 points de base du 11 juin (qui a porté le dépôt à 2,25 % pour répondre au choc énergétique iranien), le marché price 88 % de statu quo. Le vrai enjeu n'est pas la décision elle-même, c'est **le langage de Lagarde** : va-t-elle valider que le cycle de hausse est fini, ou laisser la porte ouverte à un nouveau tour de vis en septembre ? Cette réunion tombe le même jour que sept publications du CAC 40 (dont TotalEnergies, BNP Paribas, STMicro, Dassault Systèmes) et à la veille des flash PMI. L'euro-dollar, les taux OAT et Bund, et le CAC 40 vont vivre 24 heures de tension maximale. C'est le moment de la semaine pour recalibrer une exposition euro.\n\n**Ce que la semaine n'apporte pas** : pas de discours de la Fed américaine (elle est en blackout du 18 au 30 juillet, sa réunion tombe le 29), pas de BoJ (le 30-31), pas de BoE, pas de PBoC. Pas de LVMH (le 27), pas d'Ifo allemand (le 27). L'expiration mensuelle des options BTC et ETH sur Deribit est déjà passée le vendredi 17 juillet, prochaine grosse échéance le 31.\n\n---\n\n*Veille construite à partir de sources croisées, chaque fait cité confirmé par au moins deux publications indépendantes. Sources principales : ABC Bourse, Zonebourse, Boursorama, Investing.com, TradingSat, TradingView, CoinDesk, CoinGlass, alternative.me, CryptoBriefing, BloomingBit, TradingEconomics, Vantage Markets, FXStreet, CME FedWatch, Congress.gov, SEC.gov, ECB, Kiplinger, CNBC. Les niveaux techniques bougent naturellement d'une source à l'autre selon l'heure de capture. Cette veille est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-19","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Fil conducteur du jour\n\nDimanche matin à Nouméa. Les grandes places sont fermées, les écrans du CAC 40 et de Wall Street affichent encore les cotations de vendredi soir, l'or est en pause hebdomadaire, et seule la crypto continue de respirer. C'est le décor typique d'une veille de fin de semaine : peu de mouvements à raconter en direct, mais un contexte à relire posément pour préparer la reprise de lundi.\n\nCe que le week-end met en évidence, c'est le décalage entre deux signaux qui se contredisent. D'un côté, les investisseurs institutionnels sont revenus timidement sur les ETF Bitcoin américains : BlackRock IBIT a mené une troisième journée consécutive d'entrées jeudi, ce qui casse enfin la longue série de sorties qui plombait la crypto depuis mai. De l'autre, le sentiment des particuliers, lui, continue de se détériorer. Le Fear & Greed Index de la référence alternative.me est tombé à 25, dans la zone de peur extrême, un cran plus bas qu'hier. Autrement dit, les gros portefeuilles rachètent doucement pendant que les petits porteurs jettent l'éponge. Historiquement, ce type de désaccord précède souvent les creux de marché, mais il peut aussi durer plusieurs semaines. Rien de tranchant.\n\nEn arrière-plan, le tableau macro reste chargé de la même tension qui a rythmé la fin de semaine. Kevin Warsh, le président de la Fed, refuse toujours de baisser la garde sur l'inflation. Le dollar tient autour de 100,70. Les tensions au Moyen-Orient n'ont pas reflué. Et surtout, l'agenda de la semaine qui commence est structurant : la Banque centrale européenne parlera jeudi soir, les PMI flash tomberont vendredi, la Chambre haute américaine peut débloquer le CLARITY Act crypto avant sa deadline du 7 août. Trois rendez-vous qui peuvent redistribuer les cartes d'un seul coup.\n\nPas de flash à publier ce matin : ni la SEC ni le Sénat n'ont bougé sur les deux dossiers réglementaires suivis de près (Regulation Crypto et CLARITY Act), et aucun mouvement crypto brutal ne justifie une alerte séparée.\n\n## 2. CAC 40 — Bourse de Paris\n\nLe CAC 40 est resté sur sa clôture de vendredi à **8 338,81 points**, un repli de 0,47% sur la séance qui a interrompu la belle série haussière de la semaine précédente. Sur les cinq séances du 13 au 17 juillet, l'indice parisien termine finalement à peu près à l'équilibre : le début de semaine solide a compensé la fatigue de la deuxième moitié. Le week-end n'apporte pas de nouvelle statistique et rien de nouveau ne s'est ajouté depuis samedi matin, donc la photo reste celle que Catherine a lue hier.\n\nCe qui compte pour lundi, ce sont les niveaux techniques et le décor de fond. Le tableau se lit comme un jeu d'équilibriste : les moyennes mobiles pointent vers un signal d'achat fort (l'indice tient au-dessus de sa moyenne mobile 50 jours et le canal haussier de moyen terme n'est pas cassé), mais les oscillateurs de court terme sonnent la vente, ce qui traduit un essoufflement qui n'a pas encore été purgé. Concrètement, les niveaux à surveiller lundi à l'ouverture sont :\n- Résistance immédiate : **8 400 points**, qui verrouille les rebonds depuis mardi dernier.\n- Support proche : **8 300 points**, à préserver absolument pour ne pas basculer.\n- Support majeur : **8 250 points**, sous lequel la structure haussière du canal serait sérieusement fragilisée.\n- Résistance suivante : **8 620 points**, borne haute du canal de moyen terme.\n\nLe week-end n'a pas changé l'équation. Le scénario haussier reste vivant tant que 8 300 tient : dans ce cas, un rebond en début de semaine peut ramener le marché vers 8 400 puis, en cas de cassure sur volume, vers 8 500 et 8 620. Le scénario baissier, qui s'active sous 8 300, pointerait vers 8 250 puis 8 190. À l'échelle de la semaine, deux ingrédients vont trancher : la tenue des valeurs défensives (Orange, Thales et Engie ont montré la semaine passée qu'elles savaient jouer leur rôle quand la tech tremble), et la lecture faite jeudi soir des annonces de la Banque centrale européenne. Rappel utile pour Catherine : la saison des résultats semestriels s'accélère à partir de lundi, avec une trentaine de poids lourds étalés sur les deux prochaines semaines et un pic très chargé le jeudi 30 juillet. C'est un facteur de volatilité valeur par valeur, à surveiller pour les portefeuilles qui ont des lignes individuelles.\n\n## 3. Crypto — Bitcoin en priorité\n\nLe Bitcoin s'échange ce dimanche matin autour de **63 900 dollars**, en léger repli par rapport aux 64 700 dollars d'hier. Le week-end a été calme sur le prix, mais deux nouvelles institutionnelles méritent qu'on s'y arrête. Le Nigeria, une des plus grandes économies africaines, vient de signer par décret présidentiel la création d'un Comité des actifs virtuels chargé de coordonner régulation, fiscalité, application de la loi et de lancer un bac à sable réglementaire dans les trente jours. Bank of America, de son côté, a nommé Sonali Theisen à la tête de sa plateforme d'actifs numériques et étoffé la direction chargée de la tokenisation, des stablecoins, du règlement crypto, de la custody et de l'IA. Deux signaux qui, sans être spectaculaires, montrent qu'à l'échelle mondiale la crypto continue de s'installer dans le paysage institutionnel.\n\nLe contraste avec le sentiment des particuliers est net. Le Fear & Greed Index d'alternative.me, la référence historique du secteur, est tombé à **25 sur 100, en zone de peur extrême**, un cran plus bas que la lecture d'hier (27). C'est une bascule symbolique : quand l'indice quitte la zone de peur simple pour la peur extrême, les traders parlent souvent de capitulation retail. Historiquement, ces niveaux ont parfois précédé des rebonds solides, mais ils ne les garantissent pas. Il faudra voir si l'indice remonte lundi et mardi, ou s'il s'enfonce vers les zones sous 20 qui ont marqué les vrais points bas des cycles précédents.\n\nCôté flux institutionnels, la nouvelle est plutôt positive : les ETF spot Bitcoin américains ont enregistré **79,15 millions de dollars d'entrées nettes le 16 juillet**, avec BlackRock IBIT en tête (33,44 millions) et Fidelity FBTC juste derrière (30,73 millions). C'est la troisième journée d'entrées consécutives, ce qui met un point d'arrêt à la série de huit semaines de sorties qui totalisait plus de 8 milliards de dollars. Le mouvement est encore trop récent pour parler de retournement de tendance (une seule semaine ne fait pas un cycle), mais c'est le premier vrai signe de retour des gros portefeuilles depuis mai. À l'inverse, les ETF Ethereum continuent de saigner, avec 28 millions de dollars de sorties nettes le même jour.\n\n**Analyse technique (TradingView) :** le signal quotidien reste neutre, tiraillé entre des indicateurs court terme qui hésitent et des timeframes hebdomadaires et mensuelles orientées à la vente. Le RSI journalier tourne autour de 35, ce qui indique une pression vendeuse encore présente. Niveaux à surveiller cette semaine :\n- Résistance immédiate : **64 600 dollars**, à casser pour espérer relancer la mécanique.\n- Résistance suivante : **65 500 dollars** puis **67 000 dollars**.\n- Support intermédiaire : **62 500 dollars**, à préserver pour ne pas glisser.\n- Support majeur : **60 000 dollars**, la ligne rouge historique, sous laquelle un déraillement vers 57 800 dollars deviendrait probable.\n\nSur le front réglementaire américain, la semaine qui vient peut tout changer, mais rien n'a encore bougé. Le CLARITY Act reste bloqué au Sénat, avec les marchés de prédictions qui donnent maintenant environ 48% de chances de passage avant la deadline du 7 août, contre 74% il y a un mois. Le désaccord porte toujours sur trois points : la clause d'éthique visant les responsables publics (que les démocrates Murphy, Van Hollen et Merkley refusent de laisser sauter), la protection des développeurs DeFi (Section 604), et la rémunération des stablecoins. Aucun de ces trois points n'a été résolu ce week-end. La proposition Regulation Crypto de la SEC, elle, est toujours annoncée pour juillet, sous revue à l'OIRA (le bureau qui contrôle les textes réglementaires avant publication), sans date encore fixée. La semaine qui commence peut voir l'un de ces deux textes bouger vraiment, ou aucun des deux : dans les deux cas, ce sera un vrai catalyseur pour le climat crypto.\n\n### 🚦 Feu de circulation Bitcoin — 19 juillet 2026\n\n```\n🟢  Flux ETF          → 79 M$ d'entrées le 16 juillet, 3ème jour consécutif positif, rupture de la série sortante\n🔴  Fear & Greed      → 25, peur extrême, en baisse (source alternative.me), retail en capitulation\n🟠  Fed               → Warsh hawkish, discours inchangé du week-end, pas de nouvelle donne mais pression maintenue\n🟠  Dollar (DXY)      → 100,70, stable après le rebond de vendredi, ni porteur ni pénalisant à court terme\n🟠  Technique         → Signal quotidien neutre, hebdo à la vente, RSI 35 sous pression, butoir 64 600 $ intact\n🟠  Supports          → 63 900 $, dans le range, encore loin du support 60 000 $ mais buffer réduit\n🟠  Catalyseur 7j     → BCE jeudi 23, PMI flash vendredi 24, CLARITY Act possible au Sénat, agenda structurant\n\nVERDICT DU JOUR : 1 vert, 5 oranges, 1 rouge, contexte équilibré-fragile.\nInstitutions rachètent doucement, retail capitule, marché en quête d'un catalyseur pour trancher.\n```\n\n**Note sur la source Fear & Greed :** la routine s'appuie sur alternative.me, la référence historique. Ce fournisseur donne aujourd'hui 25 (peur extrême), quand un autre indice (CFGI.io, resté proche de 46 depuis quelques jours) donne une image plus optimiste. Le désaccord entre les deux mesures est en soi une information : les composantes de sentiment social et de momentum s'écartent, ce qui traduit une nervosité inégale selon les segments d'investisseurs. Catherine peut retenir la lecture d'alternative.me comme le thermomètre officiel de la routine.\n\nComparaison avec hier : le tableau perd son unique rouge côté ETF (qui passe au vert, une bonne nouvelle réelle) mais gagne un rouge côté Fear & Greed (le sentiment retail décroche). Pas de bascule majeure au sens de la routine, mais le déplacement est significatif : le climat n'est plus le même. Vendredi, la crypto vivait dans une consolidation ordinaire portée par des flux ETF négatifs et un sentiment tenu. Dimanche, elle vit dans une consolidation portée par des flux ETF qui reviennent et un sentiment qui craque. Les cartes sont rebattues.\n\n## 4. Or\n\nL'once d'or a clôturé la semaine juste sous les **4 000 dollars**, aux alentours de 3 990 dollars, dans une amplitude qui a oscillé entre 3 960 et 4 024 dollars vendredi. Le week-end ne change pas la photo : le métal jaune a perdu plus de 3% sur la semaine, une performance qui, cumulée aux mois précédents, éloigne définitivement l'idée d'un retour rapide vers les 4 300 dollars qui structuraient encore le tableau technique il y a quinze jours. Le record de fin janvier à 5 602 dollars est un souvenir lointain, à plus de 28% du niveau actuel.\n\nDeux forces continuent à peser sur le métal jaune, et le week-end ne les a pas relâchées. La première, ce sont les taux réels américains, qui restent élevés malgré la détente des taux longs, et qui privent l'or de son avantage relatif face à un placement obligataire sécurisé. Concrètement : à quoi bon détenir un actif qui ne rapporte rien quand un bon du Trésor américain à 10 ans rapporte encore correctement en dollars ? La seconde force, c'est le retour de flamme de la Fed. La remontée des probabilités de hausse de taux à septembre autour de 55-59% a redonné du souffle au dollar, ce qui, mécaniquement, empoisonne l'or coté en dollars. Ajoutons à cela la préférence toujours forte des investisseurs pour le Bitcoin et pour les grandes technos américaines quand ils cherchent du rendement, et on comprend que la palette du refuge historique n'est plus la première dans laquelle on pioche cet été.\n\nLe paradoxe reste entier : sur le papier, tous les feux devraient être au vert pour l'or (tensions au Moyen-Orient qui s'aggravent, incertitude sur les taux, marchés actions fragiles), mais dans les faits, il n'arrive plus à convertir ces vents porteurs en performance. C'est le signe que le marché a intégré une hypothèse : quand l'inflation est vraiment le problème, la Fed ne baisse pas ses taux, et donc l'or ne peut plus être le refuge évident qu'il était en 2024.\n\n**Analyse technique (TradingView) :** le signal quotidien reste franchement défavorable, **Sell** avec des moyennes mobiles à la vente forte. Les oscillateurs restent neutres, ce qui laisse la porte ouverte à une stabilisation à court terme sans confirmer un rebond. Niveaux à surveiller cette semaine :\n- Résistance immédiate : **4 050 dollars**, cible haute du range en cours.\n- Résistance suivante : **4 100 dollars** puis **4 388 dollars**, la moyenne mobile 50 périodes qui verrouille la remontée.\n- Support proche : **3 945 dollars**, ligne à défendre pour éviter une accélération baissière.\n- Support majeur : **3 915 dollars**, sous lequel un décrochage vers 3 800 dollars deviendrait envisageable.\n\n## 5. Synthèse stratégique\n\nLes trois marchés couverts racontent aujourd'hui la même histoire, vue de trois côtés : le décor monétaire favorable qui s'était brièvement ouvert début juillet est fermé pour l'instant, sans qu'on sache s'il rouvrira vite ou pas. Le CAC 40 s'est stabilisé sur ses niveaux clés en fin de semaine mais n'a plus de moteur porteur avant la BCE. Le Bitcoin joue un chassé-croisé entre des institutions qui rachètent doucement et des particuliers qui craquent. L'or subit une pression persistante qui contredit son statut historique de refuge.\n\nIl y a une logique dans ce désordre : quand le dollar tient bon, tout ce qui est valorisé en dollars (l'or, le Bitcoin, les grands indices exportateurs européens) subit une pression mécanique, quels que soient les fondamentaux. C'est précisément ce qui se joue depuis vendredi. Le dollar à 100,70 n'est pas un dollar explosif, mais il ne cède pas non plus, et c'est déjà trop pour ces trois classes d'actifs.\n\nLes points d'inflexion à surveiller la semaine prochaine sont clairs. Techniquement, le CAC 40 doit tenir 8 300 pour ne pas basculer sur son support majeur, le Bitcoin doit défendre 62 500 dollars pour ne pas replonger vers 60 000, et l'or doit s'accrocher à 4 000 pour éviter un décrochage vers 3 900. Fondamentalement, tout va se jouer sur trois rendez-vous : la décision de la BCE jeudi soir, les PMI flash vendredi, et l'agenda du Sénat américain sur le CLARITY Act. Si Christine Lagarde adopte un ton plus dur que prévu, l'euro grimpera, le dollar reculera, et les trois marchés vont respirer. Si elle joue les colombes, le dollar continuera à remonter, et le décor de la semaine restera défavorable.\n\nSur la crypto plus spécifiquement, le point vraiment intéressant du week-end est le retour des flux ETF. Une seule semaine ne fait pas un cycle, mais si les entrées se maintiennent au-dessus de 500 millions de dollars la semaine prochaine, ce sera un vrai signal que le pire des sorties institutionnelles est derrière nous. À surveiller de très près.\n\n## 6. Calendrier de la semaine du 20 au 24 juillet\n\nLa semaine qui commence est de complexité moyenne, avec un rendez-vous majeur jeudi soir et une salve d'indicateurs vendredi. La photo est inchangée depuis hier, mais elle mérite qu'on la relise à froid le dimanche.\n\n**Lundi 20 juillet** — Journée relativement calme côté macro. La Banque populaire de Chine publie ses taux préférentiels de prêt (LPR 1 an et 5 ans), indicateur de la politique monétaire chinoise qui peut bouger les valeurs européennes exposées à l'Asie. Aux États-Unis, l'indice avancé du Conference Board pour le mois de juin sort à 10h00 heure de New York, un thermomètre secondaire du cycle américain. Rien de nature à déclencher un choc, une journée pour lire tranquillement le décor et voir comment les marchés parisiens reprennent après le repli de vendredi.\n\n**Mardi 21 juillet** — Publication des chiffres du marché de l'emploi au Royaume-Uni, avec impact potentiel sur la Banque d'Angleterre et sur la livre sterling. La BCE publie son enquête sur les conditions de prêt bancaire (BLS), un indicateur secondaire mais utile pour prendre la température du crédit en zone euro à quarante-huit heures de la décision de politique monétaire. Journée sans grosse échéance macro aux États-Unis.\n\n**Mercredi 22 juillet** — **CPI Royaume-Uni de juin**, un chiffre attendu parce qu'il conditionnera les prochaines décisions de la Banque d'Angleterre, avec effet possible sur l'euro-livre et par ricochet sur les taux longs européens. Journée calme aux États-Unis.\n\n**Jeudi 23 juillet** — ***Décision de politique monétaire de la BCE***, à 14h15 heure de Paris, suivie de la conférence de presse de Christine Lagarde à 14h45. **C'est le rendez-vous majeur de la semaine.** Le consensus n'attend pas de changement de taux (probabilité de statu quo autour de 93% selon les marchés), mais le ton employé par la BCE sur l'inflation, sur la trajectoire des futures décisions et sur son évaluation de l'énergie et des salaires va peser sur l'euro, sur le CAC 40 (via l'euro-dollar et via la sensibilité des taux longs), et indirectement sur l'or et le Bitcoin par le canal du dollar. Rappel horaire pour Nouméa : **14h15 heure de Paris = 23h15 heure locale** en hiver austral, ce qui met la conférence Lagarde tard dans la soirée locale, avec des effets qui se liront à l'ouverture du vendredi matin.\n\n**Vendredi 24 juillet** — Journée dense côté indicateurs. Ventes au détail au Royaume-Uni en début de matinée européenne, puis salve d'**indicateurs PMI préliminaires (S&P Global)** pour l'Allemagne, la zone euro, le Royaume-Uni et les États-Unis en début d'après-midi. Ce sont des thermomètres avancés très surveillés : si le PMI manufacturier zone euro reste sous 50, il renforcera la pression sur la BCE pour un ton plus accommodant en septembre, ce qui pourrait affaiblir l'euro. Aux États-Unis, publication des ventes de logements neufs de juin (10h00 heure de New York), un indicateur secondaire. Au Japon, publication du CPI qui peut faire bouger le yen.\n\n**Rendez-vous à ne pas manquer cette semaine :** la décision et le discours de la BCE le jeudi 23 juillet. C'est le pivot autour duquel tourne toute la lecture des trois marchés à partir de vendredi.\n\n**Veille réglementaire crypto en toile de fond** — Deux dossiers restent chauds et peuvent bouger la semaine sans être inscrits au calendrier officiel :\n- Le **CLARITY Act** au Sénat américain : deadline de facto au 7 août avant la pause parlementaire d'été. Un vote de cloture ou une nouvelle version peuvent tomber à tout moment cette semaine.\n- La **proposition Regulation Crypto de la SEC** : annoncée pour juillet, en cours de revue à l'OIRA, publication possible d'un jour à l'autre.\n\nSi l'un des deux textes bouge concrètement, un flash dédié sera publié."},{"date":"2026-07-18","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Fil conducteur du jour\n\nLe week-end commence sur une note plus grise que celle qui avait porté la semaine. Vendredi, la petite mécanique bien huilée qui poussait doucement les grands indices s'est enrayée à Paris comme à New York, et le vernis a craqué sur trois points de friction qui ne veulent pas se ranger. Le premier, c'est le doute qui s'est installé sur les valeurs de l'intelligence artificielle, ce moteur qui avait tiré toute l'année boursière : quand TSMC, le fondeur taïwanais qui fabrique les puces de Nvidia, annonce que ses investissements 2026 seront plus lourds que prévu, tout l'écosystème des semi-conducteurs tousse, TSMC lâche 7,3% à Taipei dans la nuit, et Nvidia perd brièvement, à Wall Street, son trône de première capitalisation mondiale. Le deuxième point de friction est géopolitique : un navire a été frappé par un projectile non identifié au large d'Oman et le Koweït a annoncé qu'une de ses centrales électriques venait d'être touchée par une frappe iranienne, ce qui remet du pétrole cher dans la tuyauterie mondiale et fragilise l'idée d'une désescalade rapide au Moyen-Orient. Le troisième point, c'est la Fed qui joue faux : Kevin Warsh, le président de la banque centrale américaine, continue de marteler qu'il ne baissera pas la garde contre l'inflation, et les probabilités d'une hausse de taux en septembre ont fait un bond au-dessus de 55%, un tournant qui reprend une partie du bol d'air que la détente des taux longs avait offert aux marchés cette semaine.\n\nRésultat, le CAC 40 recule pour la première fois en cinq séances, le Bitcoin retombe à l'intérieur de son range faute d'avoir cassé sa résistance, et l'or, coincé entre un dollar qui remonte doucement et un climat géopolitique qu'il ne parvient plus à monétiser, se rapproche dangereusement de la barre des 4 000 dollars. On entre dans un week-end qui n'apportera pas de nouvelle statistique, mais qui prépare une semaine chargée où la Banque centrale européenne va reprendre le micro jeudi.\n\n## 2. CAC 40 — Bourse de Paris\n\nL'indice parisien a clôturé vendredi à **8 338,81 points**, en repli de 0,47% sur la journée, mettant un terme à la belle série haussière de la semaine précédente. La séance a été plombée par les doutes sur l'intelligence artificielle et par l'ambiance moyen-orientale, deux courants contraires qui ont sapé toute tentative de rebond. Sur la semaine, le CAC 40 se maintient malgré tout en léger positif, aidé par un début plus solide entre le 13 et le 15 juillet. Bonne nouvelle pour ceux qui préfèrent la sagesse au turbulent : les valeurs défensives ont bien joué leur rôle. Orange a gagné 2,4%, Thales 1,5% et Engie 1,2%, trois signatures qui rassurent quand la tech tremble.\n\n**Analyse technique (TradingView) :** le tableau se lit comme un jeu d'équilibriste. Les moyennes mobiles envoient un signal d'achat fort (le CAC 40 reste au-dessus de sa moyenne mobile 50 jours et son canal haussier de moyen terme n'est pas cassé), mais les oscillateurs, eux, sonnent la vente forte, ce qui traduit un essoufflement de court terme. Niveaux à surveiller lundi à l'ouverture :\n- Résistance immédiate : **8 400 points**, qui ferme la porte des rebonds depuis mardi.\n- Support proche : **8 300 points**, qu'il faut absolument conserver pour ne pas basculer.\n- Support majeur : **8 250 points**, la ligne sous laquelle la structure haussière du canal serait sérieusement fragilisée.\n- Résistance suivante : **8 620 points**, borne haute du canal de moyen terme.\n\nLe scénario haussier reste vivant tant que 8 300 tient : dans ce cas, un rebond en début de semaine sur des flux techniques prudents peut ramener le marché vers 8 400 puis, en cas de cassure sur volume, vers 8 500 et 8 620. Le scénario baissier, qui s'active sous 8 300, pointerait vers 8 250 puis 8 190. À l'échelle de la semaine, tout va dépendre de deux ingrédients : la tenue des valeurs défensives (Orange, Thales, Engie ont montré qu'elles jouent leur rôle), et la lecture faite jeudi soir des annonces BCE.\n\nCôté résultats semestriels, la saison s'accélère à partir de lundi. Publicis a donné le coup d'envoi jeudi (avec un relèvement de prévisions qui a poussé son cours de 3,1%), et près de trente-huit poids lourds vont publier étalés sur les deux prochaines semaines, avec un pic très chargé le jeudi 30 juillet. C'est un vrai facteur de volatilité valeur par valeur, à surveiller pour les portefeuilles qui ont des positions individuelles.\n\n## 3. Crypto — Bitcoin en priorité\n\nLe Bitcoin s'échange ce matin autour de **64 700 dollars**, à peu près stable par rapport à hier, mais l'apparente tranquillité masque un changement d'ambiance qui mérite qu'on s'y arrête. La semaine avait bien démarré, portée par le pic à 65 471 dollars mardi et par un dollar en repli. Vendredi, elle s'est essoufflée : la Fed a rappelé qu'elle pouvait remonter les taux, les investisseurs institutionnels ont continué à retirer des liquidités des ETF Bitcoin, et le titre bute pour la quatrième journée consécutive sous la zone des 65 500 dollars.\n\nLe baromètre du sentiment des particuliers a réagi : le Fear & Greed Index se tient autour de **46, en zone neutre**, un cran en dessous des lectures optimistes de la semaine passée. Sur Binance, les positions retail penchent à 54% long contre 46% short, un déséquilibre modéré qui reste très inférieur à la moyenne 30 jours (63% de longs). Autrement dit : les mains fortes gardent leur biais haussier, mais avec beaucoup moins de conviction qu'il y a deux semaines. Côté institutionnel, la photo est plus sombre : les ETF spot Bitcoin cumulent environ **4,13 milliards de dollars de sorties nettes sur trente jours glissants**, un rythme d'hémorragie que les rares journées d'entrées n'ont pas suffi à compenser.\n\n**Analyse technique (TradingView) :** le signal quotidien reste neutre, tiraillé entre des indicateurs court terme haussiers et des timeframes hebdomadaires et mensuelles orientées à la vente. Niveaux à surveiller :\n- Résistance immédiate : **65 500 dollars**, mur infranchi depuis mardi.\n- Résistance suivante : **66 300 dollars** puis **67 950 dollars**.\n- Support intermédiaire : **62 500 dollars**, à ne pas perdre pour préserver le rebond.\n- Support majeur : **60 000 dollars**, la ligne rouge historique, celle qui avait tenu lors de la correction de février 2026 et sous laquelle un déraillement vers 57 800 dollars deviendrait probable.\n\nSur le front réglementaire, la semaine qui vient est décisive. Le CLARITY Act, ce texte censé fixer enfin les règles du jeu pour la crypto américaine, est théoriquement attendu à l'agenda du Sénat autour du 20 juillet, mais les paris politiques restent défavorables à un vote positif avant la deadline du 7 août (autour de 43% de probabilité), avec des désaccords non résolus sur l'éthique et sur la protection des développeurs DeFi. Dans le même temps, la SEC continue d'annoncer que sa proposition Regulation Crypto sera publiée dans le courant du mois, sans date encore fixée. Rien qui déclenche un flash aujourd'hui, mais Catherine, si ces deux textes bougent la semaine prochaine, ils peuvent réécrire le climat crypto en quelques heures.\n\n### 🚦 Feu de circulation Bitcoin — 18 juillet 2026\n\n```\n🔴  Flux ETF          → 4,13 Md$ de sorties nettes sur 30 jours, tendance qui persiste malgré quelques journées vertes\n🟠  Fear & Greed      → 46, zone neutre, retail moins bullish qu'il y a deux semaines\n🟠  Fed               → Warsh hawkish, odds de hausse en septembre remontés à ~55-59%, la fenêtre se referme\n🟠  Dollar (DXY)      → 100,6, stabilisation après avoir rebondi vendredi, plus porteur qu'il y a une semaine\n🟠  Technique         → Signal quotidien neutre, hebdo/mensuel toujours orienté vente, butoir 65 500 $ intact\n🟠  Supports          → 64 700 $, dans le range, encore loin du support 60 000 $ mais sans buffer confortable\n🟠  Catalyseur 7j     → BCE jeudi 23, PMI flash vendredi 24, CLARITY Act possible en Senate, agenda risqué\n\nVERDICT DU JOUR : 1 rouge, 6 oranges, contexte franchement neutre avec un biais légèrement défavorable.\nLe message est clair : le Bitcoin n'a plus le vent dans le dos qu'il avait en début de semaine.\n```\n\n**⚠️ Alerte : le climat Bitcoin s'est nettement détérioré depuis hier.** Le tableau perd les trois voyants verts qu'il affichait vendredi matin (Fed, dollar, supports) : la Fed a durci le ton, le dollar a repris quelques dixièmes, et le cours a glissé dans le range sans retrouver son buffer. Rien de dramatique, mais le vent tourne. Tant que 62 500 dollars tient, le décor reste celui d'une consolidation ordinaire. En dessous, il faudra reprendre la mesure du risque baissier vers 60 000 dollars.\n\n## 4. Or\n\nL'or s'échange ce matin autour de **4 010 dollars l'once**, dans une amplitude qui a oscillé hier entre 3 960 et 4 024 dollars. Le paradoxe qui a nourri la veille d'hier continue de se jouer : sur le papier, tous les feux devraient être au vert pour le métal jaune (tensions au Moyen-Orient qui s'aggravent, incertitude sur les taux, marchés actions fragiles), mais dans les faits, il n'arrive pas à se relever. Sur la semaine, l'or a perdu plus de 3%, une performance qui, cumulée aux mois précédents, éloigne définitivement l'idée d'une remontée facile vers les 4 300 dollars qui structuraient l'analyse technique de la semaine passée. Le record à 5 602 dollars de fin janvier est désormais un souvenir lointain, à plus de 28% de distance.\n\nDeux forces continuent à peser. La première, ce sont les taux réels américains, qui restent élevés malgré la détente des taux longs, et qui privent l'or de son avantage relatif face à un placement obligataire sécurisé. La seconde, c'est le retour de flamme de la Fed : la remontée des probabilités de hausse de taux en septembre (autour de 55-59%) a redonné du souffle au dollar, ce qui, mécaniquement, empoisonne le métal jaune. Ajoutons à cela la préférence toujours forte des investisseurs pour le Bitcoin et pour les grandes technos américaines quand ils cherchent du rendement, et on comprend que la palette du refuge historique n'est plus la première dans laquelle on pioche.\n\n**Analyse technique (TradingView) :** le signal reste franchement défavorable, **Strong Sell** à la journée, avec les moyennes mobiles à la vente forte et des oscillateurs qui, cette fois, restent neutres, ce qui donne un léger espoir de stabilisation à court terme. Niveaux à surveiller :\n- Support majeur : **4 000 dollars**, un seuil psychologique et technique dont la casse ouvrirait un vide relatif jusqu'à 3 850-3 900 dollars.\n- Support suivant : **3 897 dollars**, dont la perte déclencherait une accélération vers **3 720** puis **3 500 dollars**.\n- Résistance courte : **4 100 dollars**, à récupérer pour redonner de l'oxygène.\n- Résistance suivante : **4 200 dollars**, la trendline descendante qui structure le mouvement depuis février.\n\nÀ court terme, le scénario neutre à baissier reste dominant : sans nouveau choc géopolitique majeur ou sans surprise dovish de la Fed, l'or n'a pas la force de casser la trendline descendante. La zone 4 000-4 010 est le vrai test à surveiller la semaine prochaine : ce que le métal jaune fait de ce support conditionnera la suite du mois.\n\n## 5. Synthèse stratégique\n\nLes trois marchés parlent d'une même chose vue de trois côtés : la fenêtre monétaire favorable qui s'était entrouverte début juillet est en train de se refermer, et personne ne sait vraiment si elle se referme pour de bon ou juste pour une pause. Le CAC 40 a fait sa première séance rouge en cinq jours au moment précis où les probabilités de hausse de taux Fed sont remontées, le Bitcoin a perdu ses trois voyants verts du feu de circulation, et l'or, contrairement à ce qu'on aurait pu croire, n'a pas profité de l'aggravation moyen-orientale parce que le dollar a repris quelques dixièmes. Il y a une logique dans tout ce désordre : quand le dollar remonte, tout ce qui est valorisé en dollar (l'or, le Bitcoin, les grands indices exportateurs européens) subit une pression mécanique, quels que soient les fondamentaux.\n\nLes points d'inflexion à surveiller la semaine prochaine sont , un indicateur secondaire mais utile pour prendre la température du crédit en zone euro à quarante-huit heures de la décision de politique monétaire. Journée sans grosse échéance macro aux États-Unis.\n\n**Mercredi 22 juillet** — **CPI Royaume-Uni de juin**, un chiffre attendu parce qu'il conditionnera les prochaines décisions de la Banque d'Angleterre, avec effet possible sur l'euro-livre. Journée calme aux États-Unis.\n\n**Jeudi 23 juillet** — ***Décision de politique monétaire de la BCE***, à 14h15 heure de Paris, suivie de la conférence de presse de Christine Lagarde à 14h45. **C'est le rendez-vous majeur de la semaine.** Le consensus n'attend pas de changement de taux (probabilité de statu quo autour de 93% selon le marché), mais le ton employé par la BCE sur l'inflation, sur la trajectoire des futures décisions et sur son évaluation de l'énergie et des salaires va peser sur l'euro, sur le CAC 40 (via l'euro-dollar et via la sensibilité des taux longs), et indirectement sur l'or et le Bitcoin par le canal du dollar. Rappel horaire pour Nouméa : **14h15 heure de Paris = 23h15 heure locale**, ce qui met la conférence Lagarde tard dans la soirée locale, avec des effets qui se liront à l'ouverture du vendredi matin.\n\n**Vendredi 24 juillet** — Journée dense côté indicateurs. Ventes au détail au Royaume-Uni en début de matinée européenne, puis salve d'**indicateurs PMI préliminaires (S&P Global)** pour l'Allemagne, la zone euro, le Royaume-Uni et les États-Unis en début d'après-midi. Ce sont des thermomètres avancés très surveillés : si le PMI manufacturier zone euro reste sous 50, il renforcera la pression sur la BCE pour un ton plus accommodant en septembre, ce qui pourrait affaiblir l'euro. Aux États-Unis, publication des ventes de logements neufs de juin (10h00 heure de New York), un indicateur secondaire. Au Japon, publication du CPI qui peut faire bouger le yen.\n\n**Sur l'ensemble de la semaine, également à suivre :** montée en puissance de la vraie saison des résultats semestriels du CAC 40 (Air Liquide, entre autres, publie dans la semaine, avant le pic très chargé du jeudi 30 juillet), possible publication de la proposition Regulation Crypto de la SEC (dont la date exacte n'est toujours pas fixée), et suite du feuilleton politique autour du CLARITY Act au Sénat américain. En arrière-plan, la Fed publiera son **beige book** et les investisseurs commencent à se positionner en amont du FOMC du **mercredi 29 juillet**, qui reste l'événement macro le plus lourd du mois de juillet.\n\n### Le rendez-vous à ne pas manquer cette semaine\n\n**Jeudi 23 juillet, 14h15 heure de Paris (23h15 à Nouméa) : décision et conférence de presse de la BCE.** Aucune autre échéance de la semaine n'a la capacité à elle seule de bouger l'euro, le CAC 40 et par ricochet le dollar de plus d'un demi-pourcent en séance. Le reste peut être digéré tranquillement, mais celle-là mérite qu'on la note dans l'agenda, en gardant en tête que la conférence de presse tombera très tard chez toi.\n\n---\n\n*Sources principales : Zonebourse, Boursorama, ABC Bourse, BFM Bourse, TradingSat, TradingView, Yahoo Finance, TradingEconomics, CoinGlass, CFGI, alternative.me, CoinDesk, Reuters, CNBC, Vantage Markets, FXStreet, IG, LiteFinance, Kucoin, FinanceCalendar, ECB.*"},{"date":"2026-07-17","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Fil conducteur du jour\n\nTrois forces continuent de tirer les fils, et elles se contredisent joyeusement. La première, c'est le Moyen-Orient qui refuse de se calmer : dans la nuit, les États-Unis ont étendu leurs frappes vers le nord de l'Iran et immobilisé un navire tentant de forcer le blocus, ce qui a poussé le baril de WTI à repasser au-dessus de 73 dollars, en hausse d'environ 4,4% sur la semaine. À chaque escalade, les investisseurs se demandent si le détroit d'Ormuz va rester à moitié fermé et si l'inflation, à peine matée, ne va pas repartir par la case pétrole. La deuxième, c'est la Fed qui joue sa partition à deux voix : les marchés ont fortement révisé à la baisse la probabilité d'une hausse des taux, désormais à seulement 12% pour juillet et autour de 44% pour septembre après un chiffre d'inflation producteur plus mou que prévu, mais le président Kevin Warsh continue de répéter qu'il finira le travail contre l'inflation, ce qui empêche les taux longs de vraiment se détendre. La troisième, c'est le retour d'un sujet régulatoire qui pourrait redessiner l'année crypto : l'audition du CLARITY Act se tient aujourd'hui même à Federal Hall à New York, pendant que la SEC prépare sa proposition Regulation Crypto pour le mois de juillet.\n\nRésultat, les marchés avancent en tâtonnant. Les grands indices européens font une pause après cinq séances de hausse, l'or hésite à profiter d'un dollar qui faiblit, et le Bitcoin s'accroche au-dessus de 64 000 dollars sans trouver la force de casser la résistance qui l'étouffe depuis trois jours.\n\n## 2. CAC 40 — Bourse de Paris\n\nL'indice parisien a clôturé hier à **8 377,86 points**, en léger repli de 0,05%, mettant un terme à une belle série de cinq séances positives. La journée aurait pu être franchement rouge sans la performance éclatante de Publicis, dont l'action a bondi de 3,1% après un relèvement de prévisions annuelles de chiffre d'affaires. Sodexo a également tiré son épingle du jeu (+2,18%) pendant que les valeurs technologiques se prenaient un coup de froid : STMicroelectronics a perdu 4,9%, Soitec a plongé de 7,64%, dans un mouvement plus large de doute sur la valorisation du secteur des puces, à quelques semaines d'une saison de résultats semestriels qui va être scrutée à la loupe.\n\nPublicis a d'ailleurs donné le coup d'envoi de cette saison hier : les 38 autres poids lourds du CAC 40 publieront leurs comptes semestriels étalés sur les deux prochaines semaines, avec un pic très chargé le jeudi 30 juillet (treize publications sur la même journée). Eiffage fermera le bal fin août.\n\n**Analyse technique (TradingView) :** le signal quotidien est neutre, tiraillé entre des moyennes mobiles orientées à l'achat et des oscillateurs qui pointent la vente. Concrètement, le marché est en pause à l'intérieur d'un range :\n- Résistance immédiate : **8 400 points**, un seuil psychologique qui a joué plusieurs fois de barrière.\n- Support intermédiaire : **8 300 points**, testé en début de semaine.\n- Support majeur : **8 200 points**, en dessous duquel la structure haussière serait sérieusement remise en cause.\n\nLe scénario haussier, valide tant que 8 300 tient, viserait un retour vers 8 500-8 550 points en cas de cassure de 8 400. Le scénario baissier, qui s'activerait sous 8 300, ouvrirait la voie à 8 200 puis 8 100. À court terme, tant que la géopolitique reste chaude et que les publications semestrielles n'ont pas confirmé la vigueur des marges, l'indice a plus de raisons de piétiner que de trancher.\n\n## 3. Crypto — Bitcoin en priorité\n\nLe Bitcoin s'échange ce matin autour de **64 600 dollars**, en légère hausse par rapport à hier soir. La semaine aura vu le cours grimper de 62 200 dollars (mercredi 9) à un pic à 65 471 dollars mardi 15, avant de buter sur cette même zone de résistance. Sur les sept derniers jours, la performance est plutôt honorable (+4%), portée par un dollar qui faiblit et par une Fed que le marché juge moins agressive. Mais le rally s'essouffle à mesure que l'on approche des 65 800 dollars, un seuil qui a joué de mur plusieurs fois ces dernières semaines.\n\n**Analyse technique (TradingView) :** le signal quotidien est neutre, mais les timeframes plus longues (semaine, mois) restent orientées à la vente, ce qui rappelle que le mouvement en cours est un rebond dans un range plutôt qu'un nouveau départ. Niveaux à surveiller :\n- Résistance immédiate : **65 800 dollars**, à casser pour libérer un objectif à 68 000 puis 72 000.\n- Support intermédiaire : **63 000 dollars**, qui a servi de base au rebond de mercredi.\n- Support majeur : **61 000 dollars**, la ligne rouge sous laquelle le rebond serait invalidé.\n\nDeux catalyseurs à surveiller de près sur les 72 prochaines heures. D'abord, la réglementation crypto américaine : l'audition du CLARITY Act se tient aujourd'hui à Federal Hall à New York (un événement de communication piloté par la commission Services financiers de la Chambre, pas un vote), et la SEC prévoit toujours de publier sa proposition Regulation Crypto ce mois-ci. Le CLARITY Act a du plomb dans l'aile : trois sénateurs démocrates (Murphy, Van Hollen, Merkley) se sont formellement opposés au texte fusionné qui, dans sa dernière mouture, a discrètement retiré la clause éthique sur les fonctionnaires détenant des cryptos. Les paris politiques donnent désormais 43% de chance seulement d'un vote positif avant la deadline du 7 août. Ensuite, le calendrier réglementaire du GENIUS Act (stablecoins) impose que six agences fédérales publient leurs règles d'application demain samedi 18 juillet, ce qui pourrait bouger le prix des stablecoins et des tokens qui y sont adossés.\n\n### 🚦 Feu de circulation Bitcoin — 17 juillet 2026\n\n```\n🟠  Flux ETF          → Reflux depuis les +181 M$ de mardi, journées mixtes autour de zéro, YTD toujours -5,4 Md$\n🟠  Fear & Greed      → 44-49, zone neutre, sentiment ni euphorique ni paniqué\n🟢  Fed               → Odds de hausse juillet à 12%, odds septembre trimmés à 44%, la trajectoire reste favorable\n🟢  Dollar (DXY)      → 100,5, en légère baisse cette semaine, environnement porteur pour le BTC\n🟠  Technique         → Neutre au jour, vendeur en hebdo/mensuel, butoir 65 800 $ pas encore cassé\n🟢  Supports          → 64 600 $, bien au-dessus du support 61 000 $, la structure tient\n🟠  Catalyseur 7j     → Audition CLARITY Act aujourd'hui, deadline GENIUS Act demain, BCE jeudi, agenda actif\n\nVERDICT DU JOUR : 3 verts, 4 oranges, contexte encore favorable mais qui s'essouffle sous la résistance 65 800 $.\n```\n\nPar rapport à hier (4 verts, 3 oranges), le tableau perd un peu de couleur : les flux ETF se sont normalisés après le beau chiffre de mardi, ce qui rappelle que la demande institutionnelle reste hésitante. Aucun indicateur ne bascule au rouge, donc pas d'alerte de dégradation à signaler, mais le message est clair : sans cassure de 65 800 dollars sur volume, le Bitcoin restera prisonnier de son range. Les catalyseurs réglementaires des trois prochains jours peuvent débloquer la situation dans un sens comme dans l'autre.\n\n## 4. Or\n\nL'or continue de vivre un mois difficile. Le métal jaune s'échange ce matin autour de **4 059 dollars l'once**, avec une amplitude hier entre 3 974 et 4 065 dollars, ce qui le pose dangereusement près de la barre psychologique des 4 000 dollars, seuil qui n'avait plus été frôlé depuis novembre 2025. On est loin, très loin, du record historique à 5 602 dollars touché fin janvier : la correction dépasse désormais 27% par rapport au sommet, ce qui, pour un actif refuge, commence à ressembler à un vrai marché baissier.\n\nL'affaire est paradoxale. Sur le papier, tout devrait aider l'or : dollar qui faiblit, tensions géopolitiques au Moyen-Orient qui refluent en même temps qu'elles s'aggravent, incertitude sur la politique monétaire. En réalité, deux forces jouent contre le métal. La première, ce sont les taux réels américains qui, malgré la détente des anticipations Fed, restent élevés et privent l'or de son avantage relatif face à un placement obligataire. La seconde, c'est la préférence des investisseurs pour le Bitcoin et les autres actifs à levier lorsque le climat monétaire se détend, un arbitrage qui s'est nettement joué contre l'or ces dernières semaines.\n\n**Analyse technique (TradingView) :** le signal est franchement défavorable, **Strong Sell**, avec les oscillateurs à la vente et les moyennes mobiles à la vente forte. Le cours reste sous sa moyenne mobile 200 jours et évolue dans un canal descendant. Niveaux à surveiller :\n- Support majeur : **4 000 dollars**, un seuil psychologique et technique lourd de sens ; s'il cède, il n'y a plus de vrai filet avant 3 850-3 900 dollars.\n- Résistance courte : **4 100 dollars**, à récupérer d'urgence pour éviter l'accélération baissière.\n- Objectif haussier théorique (peu probable à court terme) : **4 236 dollars**, borne haute du range estimé pour juillet.\n\nÀ suivre attentivement dans la journée : une nouvelle escalade au Moyen-Orient serait à peu près le seul déclencheur capable de renverser la tendance technique. Sans cela, la pente reste orientée à la baisse.\n\n## 5. Synthèse stratégique\n\nLes trois marchés couverts racontent la même histoire vue sous trois angles. Un dollar qui recule est une aubaine pour les actifs risqués (le Bitcoin en profite discrètement, les actions européennes tiennent), mais il n'a pas suffi à réveiller l'or, ce qui est le vrai signal du moment : quand le refuge historique ne monte pas alors que les tensions géopolitiques montent, c'est que le marché a changé de conviction. Les capitaux qui auraient fui vers l'or il y a dix-huit mois vont désormais vers le Bitcoin et vers les grandes technos américaines. Ce n'est pas nouveau, mais c'est confirmé une fois de plus cette semaine.\n\nLe point d'inflexion qu'il faut surveiller est double. Techniquement, le CAC 40 doit franchir 8 400 et le Bitcoin doit casser 65 800 pour que les rebonds actuels se transforment en vraies tendances haussières. Fondamentalement, deux dossiers vont dominer les prochaines quarante-huit heures : l'audition CLARITY Act et le calendrier GENIUS Act samedi peuvent bouger le climat crypto, et la décision BCE de jeudi prochain va donner le ton pour l'euro et par ricochet pour le dollar. Si le dollar continue de faiblir la semaine prochaine, les trois marchés peuvent se réaligner à la hausse. S'il rebondit sur une BCE plus accommodante que prévu, on rebasculerait dans une phase de consolidation, voire de correction.\n\n## 6. Calendrier de la semaine à venir\n\nLa semaine du 20 au 24 juillet est de complexité moyenne, avec deux grands rendez-vous et un chapelet d'indicateurs secondaires qui peuvent, cumulés, redonner de la volatilité.\n\n**Vendredi 17 juillet (aujourd'hui, Nouméa)** — L'audition du CLARITY Act à Federal Hall (New York) est symbolique mais peut déclencher des réactions crypto en séance américaine. Aux États-Unis, la production industrielle de juin et la confiance du consommateur Michigan (préliminaire de juillet) sont publiées. Rien de nature à bouleverser l'agenda, mais des données qui viendront alimenter le débat sur le rythme des baisses de taux Fed.\n\n**Samedi 18 juillet** — Deadline réglementaire pour la publication des règles d'application du GENIUS Act sur les stablecoins par six agences fédérales US (OCC, FDIC, Treasury, FinCEN, entre autres). Événement à surveiller pour l'univers crypto, avec des impacts potentiels sur USDC, USDT et Coinbase.\n\n**Lundi 20 juillet** — Décision de la Banque populaire de Chine (LPR 1 et 5 ans, indicateur de politique monétaire chinoise). Journée par ailleurs calme en Europe et aux États-Unis.\n\n**Mardi 21 juillet** — Chiffres du marché de l'emploi au Royaume-Uni (impact sur la Banque d'Angleterre). Enquête sur les conditions de prêt bancaire (BLS) de la BCE, un indicateur secondaire mais utile pour prendre la température du crédit en zone euro.\n\n**Mercredi 22 juillet** — CPI Royaume-Uni de juin, qui va conditionner les prochaines décisions de la BoE. Journée plutôt légère aux États-Unis.\n\n**Jeudi 23 juillet** — ***Décision de politique monétaire de la BCE***, à 14h15 (heure de Paris), suivie de la conférence de presse de Christine Lagarde à 14h45. C'est **le rendez-vous majeur de la semaine** : le marché n'attend pas de changement de taux, mais le ton employé par la BCE sur l'inflation et sur la trajectoire des futures décisions pèsera sur l'euro, sur le CAC 40 (via l'euro-dollar et via la sensibilité aux taux longs), et indirectement sur l'or et le Bitcoin par le canal du dollar. Rappel horaire pour Nouméa : 14h15 heure de Paris = ***23h15 heure locale***, en soirée.\n\n**Vendredi 24 juillet** — Ventes au détail au Royaume-Uni, puis en début d'après-midi européenne, salve d'indicateurs PMI préliminaires (S&P Global) pour l'Allemagne, la zone euro, le Royaume-Uni et les États-Unis. Ce sont des indicateurs avancés très surveillés : si le PMI manufacturier zone euro passe sous 50, cela renforcerait la pression sur la BCE pour un ton plus accommodant en septembre.\n\n**Sur l'ensemble de la semaine, également à suivre :** début de la vraie saison des résultats semestriels du CAC 40 (Air Liquide, Publicis Groupe entre autres publient dans la semaine, avant le pic du jeudi 30), et probable publication de la proposition Regulation Crypto de la SEC (dont la date exacte reste inconnue).\n\n### Le rendez-vous à ne pas manquer cette semaine\n\n**Jeudi 23 juillet, 14h15 heure de Paris (23h15 à Nouméa) : décision et conférence de presse de la BCE.** C'est la seule échéance de la semaine capable, à elle seule, de faire bouger l'euro, le CAC 40 et le dollar au-delà d'un demi-pourcent en séance. Tout le reste peut être digéré tranquillement, mais celle-là mérite qu'on la note dans l'agenda.\n\n---\n\n*Sources principales : Zonebourse, Boursorama, ABC Bourse, BFM Bourse, TradingView, Yahoo Finance, CoinGlass, CryptoBriefing, CoinDesk, TechTimes, Federal Reserve, Trading Economics, LiteFinance, Reuters.*"},{"date":"2026-07-16","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Fil conducteur du jour\n\nDeux forces dominent le tableau ce matin, et elles vont dans le même sens : l'inflation américaine a plié le genou, et les marchés en profitent. Le chiffre du CPI publié mardi a fait tomber l'inflation annuelle à 3,5% contre 4,2% le mois précédent et 3,8% attendus, une décélération que Wall Street n'avait pas osé espérer si vite. Résultat, la probabilité d'une hausse des taux de la Fed à la réunion de fin juillet est passée en une séance de 40% à seulement 12%, et l'idée que le prochain mouvement pourrait être une baisse fait doucement son chemin. Le dollar, désarmé, glisse à 100,79 sur le DXY. C'est cette respiration monétaire qui porte tout : les actions, le Bitcoin qui a percé les 65 000 dollars, et même l'or qui refuse de plonger malgré un contexte technique lourd.\n\nEn arrière-plan, deux dossiers réglementaires crypto restent en attente à Washington, sans nouvelle décisive à ce stade : la SEC prépare toujours sa Regulation Crypto (encore à l'OIRA, publication toujours attendue en juillet) et le CLARITY Act reste bloqué au Sénat par trois désaccords non résolus. Le compte à rebours vers la pause estivale du Congrès (autour du 7 août) commence à peser sur ce second dossier.\n\n## 2. CAC 40\n\nLa Bourse de Paris a fini mercredi 15 juillet à **8 382 points**, en petite hausse de 0,19%. La séance a été portée par une locomotive familière : le luxe. Les résultats du groupe suisse Richemont, meilleurs qu'attendu, ont ravivé l'espoir que la demande mondiale pour le très haut de gamme n'a pas cédé, et LVMH, Hermès et Kering ont suivi le mouvement. Ce coup de pouce sectoriel arrive à point : la saison des résultats du deuxième trimestre s'ouvre justement dans les prochains jours, et c'est le luxe français qui donnera la première le vrai verdict.\n\nTechniquement, l'indice évolue dans un canal ascendant de moyen terme, ce qui est un signe globalement positif. Il faut retenir trois niveaux :\n\n- **Support majeur : 8 250 points**, à défendre absolument pour préserver la tendance\n- **Résistance immédiate : 8 430 points**, testée depuis quelques séances sans casse franche\n- **Cible haute : 8 620 points**, en cas de bascule au-dessus de la résistance\n\nLe signal technique du jour reste neutre à légèrement positif : le canal haussier tient, mais le CAC bute encore sur son plafond de court terme. Traduit en français simple : le marché a envie de monter, mais il attend une bonne raison, et cette raison viendra probablement des publications de résultats à venir.\n\nLe sujet à surveiller sur les valeurs françaises reste Kering, plus exposé aux collections mode de Gucci et donc plus fragile que ses voisins face à un consommateur chinois qui reste hésitant. Une déception de ce côté peut faire vaciller le compartiment luxe entier, alors qu'une bonne surprise sur LVMH ou Hermès enverrait l'indice tester ses 8 430 points sans hésitation.\n\n## 3. Crypto\n\nLe Bitcoin a offert hier une belle démonstration de nervosité positive. En quelques heures, il est passé de 63 000 à plus de **65 500 dollars**, dans un rally alimenté par la surprise favorable de l'inflation américaine et par le retour des flux nets positifs sur les ETF Bitcoin US : **181 millions de dollars** d'entrées nettes mercredi, dont 139 millions sur le seul IBIT de BlackRock. Après trois séances chaotiques la semaine dernière (le 13 juillet avait vu 430 millions de sorties nettes), le marché retrouve un peu de sérénité.\n\nTechniquement, la zone des **65 000 à 65 800 dollars** est décisive. C'est là que le rally a buté hier et là que les prises de bénéfices ont commencé. Les niveaux à garder en tête :\n\n- **Supports : 61 300, puis 60 000, puis 58 300 dollars**\n- **Résistances : 65 150, puis 68 000, puis 74 700 dollars**\n\nTant que Bitcoin ne casse pas nettement les 65 800 dollars à la hausse, on reste dans un scénario de rebond dans un range, pas de rupture haussière franche. Le market maker Wintermute a d'ailleurs souligné cet obstacle : les 65 000 dollars ont servi de résistance à plusieurs reprises ces dernières semaines, et le franchir demande plus qu'un bon chiffre d'inflation.\n\nCôté réglementaire, deux dossiers américains continuent d'infuser :\n\n- La **SEC Regulation Crypto** : la proposition officielle est toujours en revue à l'OIRA (bureau du budget de la Maison-Blanche). Elle prévoit trois volets, dont une exemption qui permettrait aux startups crypto de lever jusqu'à 75 millions de dollars sans enregistrement complet. Publication toujours attendue courant juillet, sans date certaine à ce jour.\n- Le **CLARITY Act** (H.R. 3633) : bloqué au Sénat, avec les probabilités de passage estimées autour de 48% et trois désaccords ouverts (clause d'éthique visant les responsables publics et les revenus crypto de la famille Trump, protection des développeurs DeFi via la Section 604, rémunération des stablecoins USDC de Coinbase). Le vote doit passer avant la pause du Congrès autour du 7 août, sinon le dossier repart de zéro à la rentrée.\n\nAucun de ces deux dossiers n'a bougé de manière officielle depuis hier, donc pas de flash dédié aujourd'hui : ils restent en veille active.\n\n### 🚦 Feu de circulation Bitcoin — 16 juillet 2026\n\n```\n🟢  Flux ETF          → +181 M$ nets le 15/07, IBIT en tête à +139 M$\n🟠  Fear & Greed      → Autour de 46, zone neutre après avoir touché la peur extrême début juillet\n🟢  Fed               → Odds de hausse tombées de 40% à 12% en une séance, ton devenu plus accommodant\n🟢  Dollar (DXY)      → 100,79, en baisse, environnement favorable au BTC\n🟠  Technique         → Rally vigoureux mais butée sur la résistance 65 000-65 800 $, signal mitigé\n🟢  Supports          → Bien au-dessus de 60 000 $, la zone-clé de défense tient\n🟠  Catalyseur 7j     → Agenda macro US calme cette semaine, mais deadline CLARITY Act au 7 août pèse\n\nVERDICT DU JOUR : 4 verts, 3 oranges, contexte plutôt porteur mais fragile sous la résistance 65 800 $.\n```\n\n**✅ Signal positif : le climat Bitcoin s'améliore nettement depuis hier.** Les ETF sont repassés au vert et la Fed devient beaucoup moins menaçante, deux basculements qui comptent. Cela ne veut pas dire que la voie est libre : tant que Bitcoin ne casse pas franchement les 65 800 dollars, le rally reste un rebond dans un range plus qu'une nouvelle jambe haussière.\n\n## 4. Or\n\nL'or a réagi en demi-teinte à la nouvelle donne inflationniste. Le métal jaune s'échange ce matin autour de **4 052 dollars l'once**, en légère hausse sur la séance d'hier mais toujours sous pression après un mois compliqué (perte d'environ 6% sur trente jours). Il faut se rappeler d'où l'on vient : le 29 janvier dernier, l'or avait touché son record historique à 5 602 dollars. Depuis, le métal a subi une correction sévère, portée par la remontée des taux réels américains et par un dollar longtemps ferme.\n\nCe qui est intéressant aujourd'hui, c'est que la baisse du DXY et la perspective de taux moins hostiles devraient logiquement soutenir l'or, mais le métal peine à en profiter pleinement. Techniquement, il reste sous ses moyennes mobiles courtes, ce qui indique que les vendeurs n'ont pas encore rendu les armes.\n\nLes niveaux à surveiller :\n\n- **Supports : 3 945 dollars (crucial), puis 3 800, puis 3 600 dollars**\n- **Résistances : 4 100 dollars (moyenne mobile 21 jours), 4 300 dollars, puis 4 500 dollars**\n- **Range attendu de juillet : 3 950 à 4 236 dollars**\n\nSignal technique du jour : baissier à neutre. L'or peut se replier vers 3 945 dollars, un niveau où les acheteurs se sont montrés très présents fin juin. Sous ce seuil, la porte s'ouvrirait vers 3 800 dollars, et là ce serait le signe d'un changement de régime. Pour retrouver de l'élan, le métal doit repasser au-dessus de 4 100 dollars et surtout de sa moyenne mobile 50 jours qui plafonne à 4 319 dollars.\n\n## 5. Synthèse stratégique\n\nLe fil rouge est clair : la Fed cesse de faire peur, et cela suffit à remettre trois marchés en mouvement, mais chacun à sa manière.\n\nLe CAC 40 profite du répit sans grande euphorie, il attend ses résultats de deuxième trimestre pour savoir si le luxe tient ou fléchit. Le Bitcoin en profite avec le plus d'appétit, parce qu'il est le plus sensible à la baisse du dollar et à la détente des taux, mais il se cogne à un plafond technique qu'il n'a pas encore su forcer. L'or, paradoxalement, hésite : il devrait bénéficier de la détente monétaire, mais la remontée des actifs risqués lui vole une partie de son rôle refuge.\n\nTrois points d'inflexion à guetter dans les prochaines semaines :\n\n1. **Le premier résultat du luxe français** (LVMH ou Hermès) : il donnera le ton pour le CAC 40 jusqu'à fin août.\n2. **La cassure ou l'échec des 65 800 dollars sur Bitcoin** : la mèche est courte, une confirmation à la hausse ouvrirait 68 000 puis 74 700 dollars, un rejet renverrait vers 60 000.\n3. **La publication effective de la Regulation Crypto par la SEC et le vote du CLARITY Act avant le 7 août** : le calendrier réglementaire américain va devenir bruyant, avec un impact potentiel élevé sur la crypto.\n\n## 6. Calendrier de la semaine\n\n**Jeudi 16 juillet (aujourd'hui).** Journée américaine chargée mais sans bombe, ce qui est plutôt une bonne chose après la surprise du CPI. Aux États-Unis, publication à **14h30 heure de Paris** (soit **0h30 vendredi à Nouméa**) des inscriptions hebdomadaires au chômage, des ventes au détail de juin (indicateur de la santé du consommateur américain), de l'enquête Empire State de la Fed de New York et surtout du **Philadelphia Fed Manufacturing Survey**, un baromètre industriel scruté par les investisseurs. **Ces publications peuvent bouger le dollar et donc, par ricochet, l'or et le Bitcoin.** À 16h, sortie des stocks des entreprises et des ventes de logements en cours. Rien de dramatique attendu, mais si les ventes au détail déçoivent, le récit \"économie qui ralentit + inflation qui baisse\" prendra encore plus d'ampleur et pourrait accélérer la baisse du dollar.\n\n**Vendredi 17 juillet.** Aux États-Unis, la journée est plus légère mais elle apporte deux données importantes : la **production industrielle** de juin (15h15 Paris) et surtout l'**indice de confiance du consommateur de l'Université du Michigan** (16h Paris, soit 2h du matin samedi à Nouméa), avec ses fameuses anticipations d'inflation qui font régulièrement bouger les marchés obligataires. Côté entreprises, ouverture officielle de la saison des résultats bancaires américains, souvent une bonne boussole pour l'humeur générale de Wall Street.\n\n**Lundi 21 juillet.** Journée calme en Europe et aux États-Unis. Bon moment pour digérer la semaine et regarder les flux techniques. À Nouméa, la revue crypto hebdomadaire sera publiée en début de matinée.\n\n**Mardi 22 juillet.** En zone euro, indices PMI flash (services et manufacturier), un premier vrai indicateur de la santé économique européenne pour juillet. Attendu autour de 11h heure de Paris. **Impact potentiel : le CAC 40 et l'euro, à surveiller.**\n\n**Mercredi 23 juillet.** Journée dense côté résultats européens. Le calendrier attend plusieurs publications importantes du CAC 40 (les dates précises varient : Michelin, STMicroelectronics, TotalEnergies sont dans les radars sur cette semaine). C'est là que le luxe devrait commencer à parler, à confirmer.\n\n### Le rendez-vous à ne pas manquer cette semaine\n\n**Le Philadelphia Fed Manufacturing Survey ce jeudi 16 juillet à 14h30 heure de Paris (0h30 vendredi à Nouméa).** Après un CPI très favorable, si cet indicateur industriel confirme un ralentissement de l'activité américaine, le récit \"Fed moins agressive + économie qui décélère\" devient très puissant. Cela pousserait le dollar encore plus bas, soutiendrait le Bitcoin dans sa tentative de casser les 65 800 dollars, et pourrait enfin réveiller l'or. Si à l'inverse le chiffre surprend à la hausse, on assisterait à un mini-choc de crédibilité sur l'idée d'une Fed accommodante, et les rallys d'hier pourraient s'essouffler.\n\n*Rappel horaire : Paris est en avance sur Nouméa de 9 heures actuellement.*"},{"date":"2026-07-15","type":"dossier","titre":"Inflation américaine (juin 2026) : plus faible que prévu","md":"Le rapport sur l'inflation américaine de juin 2026, publié le 14 juillet par le Bureau des statistiques du travail (BLS), a réservé une bonne surprise. Les prix ont ralenti nettement plus que ce que les économistes attendaient, et c'est la première baisse du rythme annuel depuis cinq mois. Voici ce qui était attendu, ce qui est réellement sorti, et pourquoi cela compte pour les marchés.\n\n## Ce qui était attendu, ce qui est sorti\n\nPetit rappel de vocabulaire avant les chiffres. L'inflation dite \"cœur\" (ou core) retire l'alimentation et l'énergie, deux postes très instables, pour montrer la tendance de fond. C'est celle que la banque centrale américaine surveille le plus attentivement.\n\n- **Inflation annuelle globale** : attendue à 3,8 %, sortie à **3,5 %**. Elle recule par rapport aux 4,2 % de mai.\n- **Inflation mensuelle globale** : attendue à moins 0,2 %, sortie à **moins 0,4 %**. C'est la plus forte baisse sur un mois depuis avril 2020.\n- **Inflation annuelle \"cœur\"** : attendue autour de 2,8 à 2,9 %, sortie à **2,6 %**, contre 2,9 % en mai.\n- **Inflation mensuelle \"cœur\"** : attendue à plus 0,2 %, sortie à **0,0 %**, donc parfaitement stable.\n\nLe signal le plus important est là : l'inflation de fond, celle qui ne dépend pas du pétrole, ralentit clairement et davantage que prévu.\n\n## Pourquoi l'inflation a ralenti\n\n- **L'énergie, en premier lieu.** Le prix de l'essence a chuté de 9,7 % sur le seul mois de juin. La raison principale est le cessez-le-feu entre les États-Unis et l'Iran, qui a fait retomber la pression sur les cours du pétrole. Sur un an, l'énergie reste chère, à plus 15,7 %, mais elle décélère fortement puisqu'elle était encore à plus 23,5 % en mai.\n- **Le logement se calme un peu**, à 3,3 % contre 3,4 %. C'est important, car c'est le plus gros poste du panier de consommation.\n- **L'alimentation** ralentit légèrement aussi, à 3,0 % contre 3,1 %.\n\n## Ce que cela veut dire pour les marchés\n\nC'est un bon chiffre, pour une raison simple. Une inflation qui retombe donne à la banque centrale américaine, la Fed, de la marge pour baisser ses taux d'intérêt, ou au moins pour ne pas les remonter. Or sa prochaine décision tombe à la fin du mois de juillet. Ce rapport renforce donc le camp de ceux qui espèrent un ton plus souple.\n\nConcrètement, un ralentissement de l'inflation est en général bien accueilli par la Bourse et par l'or, car des taux plus bas rendent les actions et le métal jaune plus attractifs. Pour la crypto, c'est aussi un facteur favorable : une Fed plus accommodante a historiquement soutenu le Bitcoin. C'est exactement le genre de catalyseur suivi dans la veille du matin, à travers l'indicateur \"Fed\" du feu de circulation Bitcoin.\n\n## La nuance à garder en tête\n\nIl ne faut pas tout prendre pour argent comptant. Une bonne partie de cette bonne surprise vient de l'énergie, donc d'un facteur ponctuel, le cessez-le-feu. Si les tensions géopolitiques repartent, les prix du pétrole peuvent remonter et l'effet peut s'inverser dès le mois suivant. La bonne nouvelle la plus solide reste le ralentissement de l'inflation \"cœur\", qui, elle, ne dépend pas du pétrole et traduit une vraie détente de fond.\n\nLe prochain rendez-vous à surveiller est la décision de la Fed à la fin juillet, puis le rapport d'inflation du mois suivant, pour confirmer que la tendance se poursuit.\n\n---\n\n*Compte rendu construit à partir de sources croisées : le Bureau of Labor Statistics (données officielles), CNBC, CBS News, Morningstar et Trading Economics. Les chiffres sont confirmés par plusieurs sources concordantes. Ce compte rendu est une explication d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-15","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## Fil conducteur du jour\n\nTrois forces se disputent la scène ce matin. La première, c'est **l'inflation américaine qui s'est enfin comportée** hier. Le CPI de juin est ressorti à 3,5 % sur un an, alors que les économistes attendaient 3,8 %. Ce quart de point de moins a suffi à rassurer Wall Street en fin de journée, à faire remonter le CAC 40 depuis un plus bas de séance à moins un pour cent, et à donner une bouffée d'oxygène à des marchés qui commençaient à s'essouffler.\n\nLa deuxième force, c'est **une Fed qui refuse de céder** à cette accalmie. Christopher Waller, un des gouverneurs les plus écoutés, a répété hier que l'inflation restait la priorité. Les probabilités calculées par le CME donnent 70 % de chances que la Fed ne bouge pas le 29 juillet et, plus révélateur encore, 25 % qu'elle remonte les taux d'un quart de point. Le scénario d'une baisse a purement et simplement disparu de la table. C'est cette bataille silencieuse entre un CPI qui décélère et une Fed qui hausse le ton qui explique la nervosité de tous les actifs risqués.\n\nLa troisième force est plus discrète mais elle pèse sur les indices européens depuis des semaines : **le luxe qui décroche**. LVMH a cassé hier un support technique majeur à 481 euros et perd désormais plus de vingt-huit pour cent depuis le début de l'année. Le poids lourd historique du CAC 40 est en train de laisser sa place symbolique à TotalEnergies, qui gagne quarante-quatre pour cent sur la même période. C'est une bascule qui en dit long sur la période : les valeurs de croissance qui reposent sur la consommation chinoise reculent, les valeurs cycliques adossées à l'énergie s'imposent.\n\n## CAC 40 — la Bourse de Paris\n\nL'indice parisien a clôturé la séance du 14 juillet à **8 366,85 points**, quasi inchangé (+0,03 %). Séance amputée par le férié, avec un marché au ralenti qui a d'abord glissé de près d'un pour cent dans la matinée avant de tout reprendre l'après-midi sur la publication de l'inflation américaine. L'euro tient à 1,1433 face au dollar, en légère hausse, et le Brent grimpe de 2,72 % à 85,59 dollars le baril, reflet des tensions qui persistent au Moyen-Orient.\n\nTechniquement, le CAC 40 vit dans une **cage claire dont il n'arrive plus à sortir**. Les niveaux à retenir pour la journée :\n\n- Résistance immédiate : **8 400 points**, un mur que l'indice n'arrive pas à casser depuis plusieurs mois\n- Résistance intermédiaire : 8 220 points\n- Support psychologique majeur : **8 000 points**, à ne pas perdre\n- Support de rupture : 7 650 points en cas de cassure\n\nLes analystes de TradingView sont partagés. Le scénario haussier suppose une cassure confirmée à 8 275 points, qui viserait alors 8 450 puis 8 575, avec un stop à 8 150. Le scénario baissier commence à évoquer une formation en tête et épaules sur graphique quotidien, avec plusieurs configurations short intraday. Bref, l'indice attend une impulsion, et cette impulsion viendra probablement d'ailleurs : de la Fed, de la BCE la semaine prochaine, ou des résultats trimestriels qui commencent à tomber.\n\nCôté valeurs, la journée d'hier a été rude pour deux poids lourds. **LVMH** a cédé trois pour cent à environ 475 euros après la cassure du support des 481, la prochaine cible technique s'inscrit à 463 puis 455 euros. **EssilorLuxottica** a reculé de 2,51 % après une dégradation de Goldman Sachs qui pointe la concurrence sur les lunettes connectées. À l'opposé, **Soitec** a gagné cinq pour cent et **TotalEnergies** confirme son statut de valeur la plus performante de l'indice cette année.\n\n## Crypto — Bitcoin sous tension\n\nLe climat s'est nettement dégradé sur le Bitcoin depuis la fin de la semaine dernière, sans qu'un événement isolé ne mérite d'alerte : c'est plutôt un empilement de signaux défavorables qui pèse. **Le Bitcoin s'échange autour de 62 000 dollars ce matin**, et se traîne depuis plusieurs jours dans une zone de consolidation basse, à -18 % sur le mois. L'Ethereum accompagne mollement le mouvement, à 1 773 dollars, avec une baisse de 2,7 % sur vingt-quatre heures.\n\nLe **Fear & Greed Index** est tombé à **22, en zone de peur extrême**. C'est un chiffre suffisamment bas pour susciter deux lectures opposées : d'un côté, ça confirme que le marché est fébrile et que les vendeurs dominent, de l'autre, historiquement, les niveaux inférieurs à 25 marquent parfois des bas de cycle courts qui précèdent des rebonds contrariants. Il faut retenir les deux lectures et ne pas se précipiter.\n\nLe vrai coup dur est venu **des ETF Bitcoin américains**. Après une belle séquence positive du 6 au 10 juillet (près de 200 millions de dollars d'entrées cumulées), le 13 juillet a effacé la semaine d'un seul coup : **424 millions de dollars de sorties nettes** en une journée, principalement sur les fonds FBTC et IBIT. Le solde des huit derniers jours est repassé négatif à -227 millions. Ce n'est pas encore la catastrophe d'une sortie supérieure à trois cents millions sur une seule séance, mais la tendance est clairement rouge.\n\nL'analyse technique confirme la fragilité. Le signal quotidien de TradingView est **bearish/sell**, avec un prix qui évolue sous toutes les moyennes mobiles majeures. Les niveaux à surveiller :\n\n- Supports : 61 870 dollars, puis **60 000 dollars** (support psychologique et technique majeur), puis 57 800 en cas de rupture\n- Résistances : 64 070, puis 64 700, et surtout la zone pivot à **65 700-65 800 dollars** qui sépare une vraie reprise d'un simple rebond technique\n- Range de travail tant que rien ne casse : 60 000 à 66 000 dollars\n\nPoint d'espoir tempéré : l'histogramme MACD montre que les vendeurs perdent en momentum sans avoir perdu la direction. Autrement dit, la baisse ralentit mais elle n'est pas terminée.\n\nCôté actualités crypto, quelques mouvements de fond méritent d'être notés même s'ils ne bougent pas les cours immédiatement : **Swift a lancé un ledger blockchain** avec dix-sept grandes banques mondiales pour les paiements internationaux vingt-quatre heures sur vingt-quatre. **JCB coopère avec Circle** sur l'USDC au Japon. La BCE avance ses tests d'euro numérique. Les marchés de prédiction ont dépassé cinquante milliards de dollars de volume mensuel, un record, dopés par le premier mois de la Coupe du Monde 2026. Ce sont des signaux d'adoption structurelle qui ne se traduisent pas encore dans les prix mais qui construisent la prochaine phase.\n\n### Veille réglementaire — le dossier à surveiller\n\nDeux textes américains restent au menu. Du côté de la **SEC**, le chairman Paul Atkins a publié le 7 juillet un agenda réglementaire avec trois chantiers pour juillet (offres crypto, custody, structure de marché). Mais la proposition tant attendue de \"Regulation Crypto\" **n'est toujours pas publiée** : elle reste en revue au Bureau de la Maison-Blanche chargé de l'information réglementaire (OIRA). Publication attendue une fois cette revue terminée, sans date confirmée.\n\nDu côté du **CLARITY Act (H.R. 3633)**, le texte est sorti du Senate Banking Committee le 14 mai (15 voix contre 9) et attend son vote plénier au Sénat sous le numéro d'ordre 423. Une version fusionnée est attendue à partir du retour du Sénat, avec un vote plancher visé la semaine du 20 juillet. La probabilité de passage est estimée à un pile ou face (autour de 48 %). Quatre blocages persistent : la clause d'éthique visant les responsables publics et Trump, la protection des développeurs DeFi (Section 604), la rémunération des stablecoins, et les vacances de postes SEC-CFTC. Deadline dure : le Sénat entre en vacances autour du 7 août, au-delà le dossier partira probablement au prochain Congrès. Rien à publier de dédié tant qu'il ne se passe rien de concret, mais **la surveillance est particulièrement active cette semaine et la suivante**.\n\n### 🚦 FEU DE CIRCULATION BITCOIN — 15 juillet 2026\n\n```\n🔴  Flux ETF          → -227 M$ sur 8 jours après une sortie brutale de -424 M$ le 13 juillet, momentum cassé\n🔴  Fear & Greed      → 22, peur extrême, à nuancer par un possible signal contrarian de bas de cycle court\n🔴  Fed               → hawkish, Waller réaffirme la priorité à l'inflation, 70 % de statu quo et 25 % de hausse au FOMC du 29 juillet\n🟠  Dollar (DXY)      → 100,74 en léger repli, contenu sans effet dollar fort marqué\n🔴  Technique         → signal bearish/sell, prix sous toutes les EMA majeures\n🟠  Supports          → BTC à 62 000, au-dessus du support à 60 000 mais sous la zone pivot 65 800, encore dans le range\n🔴  Catalyseur 7j     → PPI US aujourd'hui, témoignage Warsh hawkish, décision BoC, BCE la semaine prochaine, agenda à risque\n\nVERDICT DU JOUR : 5 rouges sur 7, environnement clairement défavorable au Bitcoin cette semaine.\n```\n\n⚠️ **Alerte : le climat Bitcoin s'est nettement détérioré depuis la semaine dernière**, où les flux ETF étaient encore positifs et le Fear & Greed proche de 28. Le passage des ETF au rouge et l'aggravation du sentiment sont les deux bascules à retenir.\n\n## Or — repli tactique, socle structurel\n\nL'or ne s'écarte pas de sa consolidation. Après une chute de deux pour cent lundi à 4 020 dollars l'once, le métal a rebondi de 1,25 % hier pour clôturer à **4 052 dollars**, dans un range de 3 986 à 4 103. Ce matin, le prix évolue autour de 4 020 à 4 070 dollars selon les fournisseurs. L'or n'arrive pas à casser franchement le seuil psychologique des 4 100.\n\nLes forces en présence se neutralisent presque parfaitement. D'un côté, **la géopolitique pousse à l'achat** : les échanges de tirs entre l'Iran et les États-Unis, la revendication iranienne d'une fermeture du détroit d'Ormuz et l'envolée du pétrole créent une prime de risque évidente. Les banques centrales achètent au rythme de mille tonnes par an depuis 2022 et 45 % d'entre elles annoncent vouloir encore augmenter leurs réserves. De l'autre côté, **la Fed hawkish tire l'or vers le bas** : les marchés pricent maintenant entre 51 % et 70 % de probabilité d'une hausse de taux en septembre. Les taux réels américains, avec un 10 ans à 4,62 %, restent au plus haut de deux mois. Et les ETF or américains ont subi 5,3 milliards de dollars de rachats sur le mois, ce qui pèse tactiquement même si structurellement rien ne change.\n\nTechniquement, TradingView affiche un **signal global de vente**, avec les moyennes mobiles en fort signal vendeur mais des oscillateurs neutres. Les niveaux du jour :\n\n- Résistances : **4 100-4 130** (zone pivot majeure), puis 4 195, 4 215, 4 320\n- Supports : **4 030**, puis 4 000 (zone de demande), puis 3 948-3 975\n\nLe scénario haussier passe par une cassure confirmée au-dessus des 4 130, qui viserait 4 215 puis 4 320. Le scénario baissier commence en cas de repli sous 4 090 et vise 4 021 puis 3 942. L'or se referme comme un parapluie qu'on n'arrive pas à décider s'il faut ouvrir ou ranger : la décision se prendra au contact de la zone 4 100-4 130.\n\n## Synthèse stratégique\n\nLes trois marchés parlent le même langage ce matin, et ce langage est celui de **l'attente prudente**. Le CAC 40 refuse de casser ses 8 400 points, le Bitcoin est bloqué sous ses 66 000, l'or n'ose pas franchir ses 4 130 : chacun bute sur son plafond parce que personne ne veut prendre position avant les grands rendez-vous à venir.\n\nLe point de bascule commun s'appelle **la Fed**. Tant que la Fed reste hawkish, le dollar tient au-dessus de 100 sur le DXY, les taux réels américains restent élevés, et cela pèse simultanément sur l'or (via les taux réels), sur la crypto (via l'appétit pour le risque) et sur le CAC 40 par ricochet (via l'EUR/USD et le secteur du luxe qui vit du dollar). Si la Fed capitule à un moment ou l'autre, les trois marchés respireront ensemble.\n\nLe point d'inflexion à surveiller de très près cette semaine est le **PPI américain de cet après-midi à 14h30 (Paris), suivi du témoignage Warsh à 16h00**. Un PPI faible affaiblirait l'argument hawkish et pourrait déclencher un rebond coordonné. Un PPI fort ou un Warsh particulièrement dur enfoncerait tous les marchés dans la journée.\n\nCorrélation particulière à noter pour Catherine : **quand LVMH décroche, ce n'est pas seulement le luxe qui souffre, c'est un signal sur la demande chinoise**. La publication du PIB chinois demain jeudi à 4h du matin (Paris) est un rendez-vous silencieux mais crucial. Un chiffre décevant enfoncera à nouveau LVMH, Kering, Hermès, et rejaillira sur l'ensemble de l'indice parisien.\n\n## Calendrier de la semaine\n\n**Mercredi 15 juillet.** Journée dense côté États-Unis. À **14h30 (Paris)**, publication du **PPI américa
