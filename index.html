<style>
  :root {
    --rail: #0F141E;
    --rail-line: #222b3a;
    --ink: #1B2130;
    --paper: #FAFAF8;
    --surface: #FFFFFF;
    --muted: #6A7180;
    --muted-soft: #9AA0AC;
    --line: #E6E7EB;
    --accent: #26567F;
    --accent-soft: #EAF1F7;
    --up: #1E7A54;
    --down: #C23B33;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* ---------- Rail ---------- */
  .rail {
    background: var(--rail);
    color: #E8EAF0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rail-line);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .rail-head {
    padding: 26px 24px 20px;
    border-bottom: 1px solid var(--rail-line);
  }

  .mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .mark svg { display: block; }

  .rail-title {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: .2px;
    margin: 0;
    color: #F6F7FA;
  }
  .rail-sub {
    margin: 4px 0 0;
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .rail-list {
    overflow-y: auto;
    padding: 12px 0 24px;
    flex: 1;
  }

  .month-label {
    padding: 18px 24px 8px;
    font-size: 10.5px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .entry {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #C9CEDA;
    padding: 11px 24px;
    cursor: pointer;
    font-family: var(--sans);
    border-left: 2px solid transparent;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .entry:hover { background: rgba(255,255,255,.04); color: #fff; }
  .entry:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .entry.active {
    background: rgba(38,86,127,.22);
    border-left-color: #5B9BD1;
    color: #fff;
  }
  .entry .d-day {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .entry .d-meta {
    font-size: 12px;
    color: var(--muted-soft);
    margin-top: 2px;
  }
  .entry.active .d-meta { color: #AEC4DA; }

  /* ---------- Reading pane ---------- */
  .pane {
    padding: 0;
    overflow-x: hidden;
    background: var(--paper);
    transition: background .25s ease;
  }
  /* Fond de page distinct selon le type de contenu */
  .pane[data-type="crypto"]  { background: #EEF3F9; }  /* revue de presse hebdo : bleu très clair */
  .pane[data-type="flash"]   { background: #FCF3E7; }  /* flash urgent : ambre doux */
  .pane[data-type="dossier"] { background: #F1EFF7; }  /* dossier thématique : lavande très clair */
  .pane-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 40px 96px;
  }

  .doc-kicker {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .doc-date {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
    margin: 0 0 8px;
    text-wrap: balance;
    letter-spacing: -.3px;
  }
  .doc-note {
    font-size: 13px;
    color: var(--muted);
    padding-bottom: 26px;
    margin-bottom: 34px;
    border-bottom: 1px solid var(--line);
  }

  /* rendered markdown */
  .md { font-family: var(--serif); font-size: 18px; line-height: 1.72; color: #262d3d; }
  .md h1 { font-size: 26px; line-height: 1.2; margin: 40px 0 12px; font-weight: 600; }
  .md h2 {
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 40px 0 4px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .md h3 { font-size: 19px; margin: 28px 0 6px; font-weight: 600; }
  .md p { margin: 14px 0; }
  .md ul { margin: 12px 0; padding-left: 4px; list-style: none; }
  .md li {
    position: relative;
    padding-left: 26px;
    margin: 9px 0;
  }
  .md li::before {
    content: "";
    position: absolute;
    left: 4px;
    top: .72em;
    width: 7px;
    height: 7px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
  }
  .md strong { font-weight: 700; color: var(--ink); }
  .md em { font-style: italic; }
  .md a { color: var(--accent); text-underline-offset: 2px; word-break: break-word; }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 30px 0; }
  .md blockquote {
    margin: 20px 0;
    padding: 12px 18px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 15px;
    font-family: var(--sans);
    font-style: normal;
    color: #3a4759;
  }
  .md blockquote p { margin: 4px 0; }
  .md pre {
    background: #0F141E;
    color: #D7DCE6;
    padding: 16px 18px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Consolas, monospace;
    margin: 18px 0;
  }

  .empty {
    color: var(--muted);
    font-family: var(--sans);
    text-align: center;
    padding: 120px 20px;
  }

  /* mobile nav (hidden on desktop) */
  .mnav { display: none; }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .rail { display: none; }
    .mnav {
      display: block;
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--rail);
      color: #fff;
      padding: 16px 18px 12px;
    }
    .mnav .rail-title { font-size: 18px; }
    .mnav .rail-sub { margin-bottom: 12px; }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      flex: 0 0 auto;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--rail-line);
      color: #D4D9E3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pane-inner { padding: 34px 22px 80px; }
    .md { font-size: 17px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

  const REPORTS = [{"date":"2026-07-22","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nTrois jours avant la BCE et sept jours avant la Fed, le brouillard se déchire d'un coup, mais pas là où on l'attendait. Le vrai événement de ces dernières vingt-quatre heures n'est pas macro, il est crypto : le Bitcoin, resté sept semaines cloué dans son couloir 62 000 à 65 500 dollars, a percé la résistance qui le tenait en respect et cotait ce matin à Nouméa autour de **66 400 dollars**, en hausse d'environ 3 % sur 24 heures. La cassure ne s'est pas faite dans l'improvisation. Elle est le résultat de cinq séances d'affilée d'entrées nettes dans les fonds indiciels Bitcoin cotés aux États-Unis, pour un total qui dépasse 727 millions de dollars, avec BlackRock IBIT toujours en locomotive et une dernière session (celle de vendredi 18 juillet à New York) qui a drainé à elle seule 227 millions de dollars, le meilleur chiffre depuis début juillet. Au passage, 242 millions de dollars de positions courtes ont été liquidées sur 24 heures, dont 182 millions sur les seuls shorts, ce qui a mécaniquement amplifié la remontée. Ce n'est pas un feu d'artifice, c'est une évasion patiente.\n\nPendant ce temps, les places européennes ont retrouvé un peu de couleur. Le CAC 40 a terminé mardi soir à **8 363,14 points**, en hausse de 0,28 %, porté par un rebond de la tech américaine qui s'est propagé jusqu'à Paris via STMicroelectronics (+4,3 %, en tête de l'indice). Contrepoint sombre de la séance : Sartorius Stedim Biotech a lâché 7,55 %, sanctionnée par la déception des résultats de son pair américain Danaher, un rappel utile que la saison des publications trimestrielles fait déjà des victimes. L'or, lui, sort doucement de son coma et remonte à **environ 4 048 dollars l'once**, en hausse discrète de moins d'un pour cent, tentant un cassure de sa figure en triangle descendant.\n\nPas de flash urgent à publier ce matin. Le rally du Bitcoin est franc mais reste sous le seuil des 10 % en 24 heures qui déclencherait une alerte, et il traduit une amélioration de fond plutôt qu'un choc réglementaire ou géopolitique. Aucun mouvement concret sur les deux dossiers américains que nous suivons : la proposition Regulation Crypto de la SEC est toujours attendue et non publiée, et le CLARITY Act reste bloqué au Sénat sur ses trois lignes de fracture. Rendez-vous en fin de partie crypto pour le feu de circulation Bitcoin, qui s'est nettement éclairci depuis hier.\n\n## 2. CAC 40 — Bourse de Paris\n\nLe CAC 40 a fini mardi 21 juillet à **8 363,14 points**, en hausse de 0,28 % (+23 points), après avoir passé la journée à digérer deux ingrédients contradictoires. D'un côté, le retour en grâce des semi-conducteurs américains a bien porté la tech européenne : STMicroelectronics s'est envolée de 4,3 %, meilleure performance de l'indice, dans le sillage d'un Nasdaq qui a gagné 1,3 % à Wall Street. De l'autre, la déception de Danaher a plombé Sartorius Stedim Biotech de 7,55 %, la pire performance du jour, rappelant qu'une publication américaine peut suffire à faire vaciller un titre parisien lorsque le secteur (ici les équipements pour l'industrie pharmaceutique et biotech) est étroitement corrélé de part et d'autre de l'Atlantique. Le pétrole s'est également invité dans la conversation, avec un baril de Brent qui a franchi les 90 dollars en séance sans faire dérailler la place parisienne. Le marché a gardé la tête froide, comme le résume BFM Bourse : les fondamentaux macro dominent encore les à-coups géopolitiques.\n\nDeux nouvelles secondaires méritent d'être notées, parce qu'elles vont peut-être devenir les grandes nouvelles de demain. Premièrement, un accord entre **Microsoft et Mistral** a été rendu public hier, signe que l'écosystème IA franco-américain continue de tisser sa toile alors que Mistral se positionne comme l'alternative européenne aux mastodontes de la Silicon Valley. Deuxièmement, la saison des résultats semestriels europé r de **66 400 dollars**, en hausse d'environ **3 % sur 24 heures** et de plus de 5 % sur la semaine. Ce chiffre paraît anodin, il ne l'est pas. Depuis le 8 juillet, le Bitcoin a été enfermé dans un couloir 62 000 à 65 500 dollars que tous les traders regardaient comme une ligne de défense stratégique. Cette ligne vient de céder par le haut. La résistance des 65 300 à 65 800 dollars, qui avait tenu trois tentatives précédentes, n'a pas résisté à la quatrième. Le prochain plafond à surveiller se situe dans la zone **67 500 à 68 000 dollars**, et une cassure nette sur volumes ouvrirait la porte à un mouvement supplémentaire de 5 à 6 % très rapidement.\n\nCe qui rend cette évasion crédible et non anecdotique, c'est le mécanisme qui la porte : cinq jours consécutifs d'entrées nettes dans les fonds indiciels Bitcoin cotés aux États-Unis, pour un cumul de **727 millions de dollars sur cinq sessions**, avec une dernière journée à 226,9 millions, le meilleur chiffre depuis le 6 juillet. C'est la plus longue série d'entrées consécutives depuis début mai. La série de huit semaines de sorties, qui avait totalisé plus de 2,7 milliards de dollars entre mai et juillet, appartient désormais au passé. BlackRock IBIT continue de peser environ la moitié des flux cumulés, désormais au-dessus de 35 milliards de dollars depuis le lancement des ETF spot en 2024. Pour parachever le portrait, le mouvement s'est accompagné de **242 millions de dollars de liquidations forcées sur 24 heures, dont 182 millions sur les positions courtes** : autrement dit, une partie de la hausse s'explique par des vendeurs à découvert obligés de racheter dans l'urgence, ce qui a mécaniquement amplifié le rebond. C'est un signal ambigu : il montre que la pression baissière a été violemment absorbée, mais il rappelle aussi que le short squeeze est un carburant qui s'épuise vite.\n\nCôté sentiment, le Fear & Greed Index d'alternative.me reste ancré dans la zone de peur à un niveau autour de **29 sur 100**, très légèrement au-dessus de la semaine dernière mais bien loin des zones d'euphorie. Le prix monte, mais les investisseurs particuliers n'y croient pas encore. Ce décalage entre le prix et le sentiment est historiquement un signal plutôt haussier : les rallies qui démarrent dans la méfiance ont plus d'espace pour se développer que ceux qui démarrent dans l'excitation. Autrement dit, le carburant psychologique n'est pas épuisé, il n'est même pas encore vraiment allumé.\n\nSur le front réglementaire, aucun mouvement concret depuis hier. La **SEC** continue de préparer sa proposition Regulation Crypto (safe harbor à 75 millions de dollars, exemption temporaire d'enregistrement, exit du statut de security pour les tokens dont la gestion active a cessé) mais aucune date de publication officielle n'a été posée, et le texte reste chez le bureau OIRA de la Maison Blanche pour revue finale. Le **CLARITY Act** demeure bloqué au Sénat, sur les trois désaccords désormais bien identifiés : la clause d'éthique portée par Elizabeth Warren visant les 1,4 milliard de dollars de revenus crypto de Donald Trump, la protection des développeurs de logiciels non-custodial (Section 604) sur laquelle les sénateurs Warner et Cortez Masto attendent l'avis explicite des forces de l'ordre, et la rémunération des soldes en stablecoins dénoncée par les fédérations bancaires (ABA et ICBA). La sénatrice Cynthia Lummis vise toujours un vote avant la pause parlementaire du 7 août, mais aucune motion de cloture n'a été déposée. La probabilité d'un passage reste évaluée autour de 48 % chez les observateurs. C'est ce qui explique qu'aucun flash réglementaire n'est déclenché ce matin : la routine dit clairement que l'on publie quand un événement est concret et confirmé, pas quand il est simplement possible.\n\n**Analyse technique (TradingView) :** le signal quotidien s'améliore franchement avec la cassure des 65 800 dollars et bascule à l'achat, le signal hebdomadaire commence à se réaligner (avec une bougie hebdomadaire en cours qui pourrait bien fermer sur son plus haut depuis mai), le mensuel reste neutre. La configuration est celle d'une reprise qui prend forme, encore fragile mais désormais soutenue par un socle de flux institutionnels. Les niveaux à garder en tête :\n\n- Résistance immédiate : **67 500 à 68 000 dollars**, prochain plafond à casser pour libérer 5 à 6 % supplémentaires.\n- Résistance suivante : **70 000 dollars**, chiffre rond qui appellera les prises de bénéfices.\n- Support immédiat : **65 300 à 65 800 dollars**, l'ancienne résistance qui doit désormais devenir plancher.\n- Support intermédiaire : **63 125 dollars**, moyenne mobile 200 semaines, plancher technique majeur.\n- Support psychologique majeur : **60 000 dollars**, ligne rouge dont la perte ouvrirait vers 55 000 puis 50 000.\n\n### 🚦 Feu de circulation Bitcoin — 22 juillet 2026\n\n```\n🟢  Flux ETF          → 5e séance d'entrées consécutives, 727 M$ cumulés, IBIT toujours en locomotive\n🟠  Fear & Greed      → 29, encore en peur malgré la hausse du prix, décalage plutôt haussier à terme\n🟠  Fed               → Warsh reste neutre, statu quo à 85 % attendu au FOMC du 29 juillet\n🟢  Dollar (DXY)      → 100,9, tendance globalement baissière depuis les hauts du début juillet\n🟢  Technique         → Daily bascule à l'achat après cassure des 65 800 $, hebdo en amélioration\n🟢  Supports          → 66 400 $, largement au-dessus de la MA 200 semaines et du seuil des 60 000\n🟠  Catalyseur 7j     → FOMC le 29 (statu quo attendu, mais Fed divisée), Regulation Crypto SEC pas encore\n\nVERDICT DU JOUR : 4 verts, 3 oranges, 0 rouge, contexte franchement favorable au Bitcoin.\nLa cassure technique s'appuie sur des flux institutionnels solides et un dollar plutôt faible.\nAttention à ne pas confondre embellie et confirmation : le FOMC du 29 juillet peut tout recalibrer.\n```\n\n**✅ Signal positif : le climat Bitcoin s'améliore nettement depuis hier.** Trois indicateurs passent au vert par rapport à la veille : la technique (grâce à la cassure des 65 800 $), les supports (BTC désormais franchement au-dessus de son ancienne résistance devenue support), et le dollar (qui a relâché son rebond du 21). Le Fear & Greed passe de rouge à orange mais reste en zone de peur, ce qui est une nuance et non une bascule. Aucun indicateur ne s'est dégradé. Pour la première fois depuis la deuxième semaine de juillet, aucun voyant n'est au rouge. C'est une configuration à surveiller de près sans se laisser griser : un rally alimenté par un short squeeze peut s'essouffler aussi vite qu'il s'est emballé si le prochain catalyseur macro (FOMC dans une semaine) déçoit.\n\n## 4. Or (XAU/USD)\n\nL'or tente enfin de sortir de son immobilisme. Le métal cotait ce matin autour de **4 048 dollars l'once**, en légère hausse d'environ 0,7 % sur 24 heures, et il a réussi à récupérer le seuil des 4 040 dollars après avoir cassé une petite ligne de tendance descendante de court terme. Techniquement, le prix esquisse un rebond du bas de la figure en triangle descendant qui l'enferme depuis un mois, mais la conviction reste modeste : le Relative Strength Index à 14 périodes navigue autour de 45, un chiffre qui traduit une absence d'élan haussier franc.\n\nDeux forces se disputent toujours le prix. À la baisse, la Fed. Le nouveau président Kevin Warsh (nommé le 22 mai) a témoigné devant le Congrès les 14 et 15 juillet et a livré un discours d'une neutralité étudiée : ni engagement à baisser, ni promesse de resserrer, mais une insistance sur le fait que les progrès récents sur l'inflation ne constituent pas une \"mission accomplie\". Résultat, la probabilité d'un statu quo au FOMC du 29 juillet culmine autour de 85,6 % chez CME FedWatch, et surtout le comité reste profondément divisé (environ la moitié des dix-neuf membres continue de vouloir encore une hausse d'ici la fin de l'année). Cette impasse maintient les taux réels élevés, ce qui pèse sur un actif qui ne verse aucun intérêt. À la hausse, deux forces jouent en faveur du métal : les tensions au Moyen-Orient qui refusent de s'éteindre et un dollar globalement en repli (DXY à 100,9). C'est cet équilibre précaire qui explique le calme apparent du prix, en réalité un bras de fer permanent.\n\n**Analyse technique (TradingView) :** le signal quotidien reste **baissier**, les moyennes mobiles sont défavorablement empilées, mais les oscillateurs de court terme commencent à repointer. C'est la configuration d'une reprise technique en formation, pas d'un vrai retournement. Les niveaux à surveiller :\n\n- Résistance immédiate : **4 089 dollars**, moyenne mobile exponentielle 20 périodes, verrou à faire sauter pour libérer un vrai rebond.\n- Résistance suivante : **4 100 puis 4 200 dollars**, cibles techniques d'une reprise confirmée (le pic du 6 juillet à 4 200 est la référence à récupérer pour changer de narrative).\n- Support immédiat : **4 043 dollars**, zone de cassure récente qui doit tenir.\n- Support majeur : **3 942 dollars**, plancher de tendance ; sous ce niveau, la porte s'ouvre vers 3 856 puis 3 666.\n\nDeux scénarios pour la semaine. Le premier, le plus probable en l'état, est celui d'une consolidation entre 4 040 et 4 090 dollars en attendant la BCE de jeudi, avec une bascule éventuelle vers 4 100 si Lagarde durcit le ton et affaiblit le dollar par ricochet. Le second scénario est celui d'une rechute sous 4 000 dollars, ce qui rouvrirait la porte à un test des 3 942, un niveau que les acheteurs institutionnels défendent traditionnellement avec conviction. Le vrai catalyseur pour l'or ne tombera pas cette semaine, il tombera le 29 juillet avec la décision Fed. D'ici là, l'or reste l'otage des mouvements du dollar, des probabilités de baisse de taux, et des soubresauts géopolitiques.\n\n## 5. Synthèse stratégique\n\nLa journée dessine un dégroupement des trois marchés, une nouveauté après deux semaines où tout bougeait de conserve. Le Bitcoin prend son indépendance et casse par le haut, poussé par un moteur qui lui est propre (le retour massif des flux ETF institutionnels), sans avoir besoin d'un catalyseur macro. Le CAC 40 continue de respirer sous influence croisée de la tech américaine (qui l'aide) et des tensions géopolitiques (qui le retiennent). L'or reste en apnée, otage d'une Fed divisée et d'un dollar qui refuse de vraiment plier. Trois marchés, trois logiques, ce qui est rare et intéressant à noter : cela signifie que le \"risk on / risk off\" caricatural cède la place à une lecture plus fine où chaque actif suit ses propres drivers.\n\nL'indicateur croisé à surveiller aujourd'hui reste la paire euro-dollar. L'euro glisse autour de **1,1620** ce matin, en hausse discrète après un rebond du dollar mardi, et il devient techniquement le baromètre de la BCE de jeudi. Si Christine Lagarde valide l'idée que le cycle de hausse est fini, l'euro corrigera vers 1,155 et cela renforcera par ricochet le dollar (mauvais pour l'or, neutre pour Bitcoin, neutre pour le CAC). Si au contraire elle laisse la porte ouverte à un tour de vis supplémentaire pour cause de tarifs Trump ou de choc pétrolier, l'euro remontera vers 1,170 et cela affaiblira le dollar (bon pour l'or, très bon pour Bitcoin, neutre à légèrement négatif pour le CAC). Le vrai suspense de la semaine se joue là, dans cette paire discrète que les particuliers regardent peu mais qui coordonne en réalité les trois marchés couverts.\n\nLe point d'inflexion imminent, ce sont les publications d'**Alphabet, Tesla et IBM** qui tombent après clôture de Wall Street cette nuit à Nouméa (22h00 Paris mercredi, 08h00 jeudi à Nouméa). Le consensus attend 26,4 milliards de dollars de chiffre d'affaires pour Tesla (avec un focus sur le déploiement du Robotaxi dans cinq marchés) et 116,9 milliards pour Alphabet (avec un focus sur le carnet de commandes Google Cloud désormais à 460 milliards). Ces deux publications sont critiques pour la tech européenne (Soitec, STMicroelectronics, ASM International, ASML, Dassault Systèmes) qui ouvri de statu quo au taux de dépôt de 2,25 %. À **14h30 Paris (00h30 jeudi à Nouméa), conférence de presse de Christine Lagarde** : le moment de la semaine où tout se joue, entre le ton dovish (fin du cycle de hausse validé) et le ton hawkish (porte ouverte à un nouveau tour de vis en septembre). À 14h30 également, les **États-Unis publient les inscriptions hebdomadaires au chômage**. À 19h00 Paris (05h00 vendredi à Nouméa), adjudication US 10 ans indexée sur l'inflation. Enfin, après clôture Wall Street (22h00 Paris, 08h00 vendredi à Nouméa), **Intel publie ses résultats**, avec l'attente d'un premier trimestre bénéficiaire après six trimestres consécutifs de pertes. **Impact très fort** attendu sur l'euro, les taux, le CAC et par ricochet sur l'or.\n\n**Vendredi 24 juillet.** Journée de vérité pour l'activité économique en juillet. **PMI flash zone euro (composite, manufacturier, services)** publiés par S&P Global entre 9h15 et 10h00 Paris (19h15 à 20h00 à Nouméa). **Impact fort** sur l'euro et les taux courts, au lendemain de la BCE. **PMI flash États-Unis** à 15h45 Paris (01h45 samedi à Nouméa). **Commandes de biens durables américaines** pour juin à 14h30 Paris (00h30 samedi à Nouméa), baromètre de l'investissement productif. **Ventes de logements neufs US** à 16h00 (02h00 samedi à Nouméa). Journée qui va fixer le narratif d'été (récession douce ou tenue de l'activité) avant la Fed de la semaine suivante.\n\n**Semaine du 27 juillet (pour anticiper).** LVMH publie ses résultats semestriels **lundi 27 avant Bourse**. La **Fed américaine se réunit mercredi 29 juillet**, décision à 20h00 Paris (06h00 jeudi à Nouméa), suivie de la conférence de presse du chair Kevin Warsh. Consensus 85,6 % de statu quo au taux de 4,25-4,50 %. Ce sera **le vrai rendez-vous macro du mois**, avec des projections économiques actualisées et le premier vrai test de communication de Warsh sur sa perception de la trajectoire d'inflation. La semaine du 27 verra aussi **Microsoft, Meta et Amazon** x techniques bougent naturellement d'une source à l'autre selon l'heure de capture. Cette veille est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-21","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nLa journée s'ouvre dans la même compression qu'hier, avec une nuance qui change tout : les marchés ne se contentent plus d'attendre la BCE, ils commencent aussi à trembler à cause du Moyen-Orient. Le week-end a vu les Gardiens de la révolution iraniens frapper des installations militaires américaines en Arabie saoudite et au Qatar, revendiquer des attaques contre des pétroliers dans le détroit d'Ormuz, et les Houthis yéménites déclarer un blocus maritime contre l'Arabie saoudite. Ces annonces ont fait grimper le Brent à 91,42 dollars dimanche avant qu'il ne redescende à 89 dollars lundi soir, et elles ont sensiblement réduit le trafic dans le détroit d'Ormuz : entre le 17 et le 19 juillet, seulement 30 navires y ont transité selon les données Kpler, huit le samedi et quatre le dimanche seulement, alors qu'en temps normal ce couloir maritime charrie près de 20 % du pétrole mondial.\n\nC'est ce mélange détonnant, une BCE que tout le monde attend jeudi et une géopolitique qui rebalaie la table chaque week-end, qui va cadrer les trois marchés couverts. Le CAC 40 est rentré chez lui hier soir à 8 340,11 points, quasiment à l'équilibre (+0,02 %), un match nul très éloquent qui dit tout de l'ambiance. Le Bitcoin s'échange autour de 64 400 dollars ce matin, immobile lui aussi. L'or maintient tout juste sa tête au-dessus des 4 000 dollars, à 4 020 dollars, sous la pression continue d'un dollar qui a repris de la hauteur (indice DXY à 100,8) et d'une Fed que les marchés voient de moins en moins pressée de baisser ses taux.\n\nAujourd'hui, mardi 21 juillet, le premier vrai gros rendez-vous de la semaine tombe côté résultats d'entreprises. Sept grands noms américains publient avant l'ouverture de Wall Street, dont General Motors (avec une volatilité implicite de plus ou moins 5,7 % attendue), 3M, Lockheed Martin, Halliburton et UPS. Trois secteurs vont parler ce matin : l'industrie lourde, la défense et la consommation. Rien du côté du CAC 40 aujourd'hui. La journée sera donc plus micro que macro, avec un agenda économique presque vide.\n\nPas de flash à publier ce matin. Aucun choc crypto ne justifie une alerte séparée, la SEC n'a toujours pas publié sa proposition Regulation Crypto, et le Sénat américain a beau viser cette semaine pour un vote sur le CLARITY Act, aucun calendrier formel n'a encore été déposé.\n\n## 2. CAC 40 — Bourse de Paris\n\nLe CAC 40 a terminé lundi soir à **8 340,11 points**, en hausse symbolique de 0,02 %, tout près du même niveau qu'à la clôture de vendredi. C'est le type de séance où l'indice n'a bougé de rien mais où beaucoup de choses se sont passées en sous-marin. Le pétrole a joué au yo-yo, la peur de l'Iran a pesé toute la matinée, puis la lecture du positionnement des banques centrales et la stabilisation du Brent en dessous de 90 dollars ont permis au marché parisien de sauver l'équilibre. À côté, l'Euro Stoxx 50 a grignoté 0,07 %, le FTSE 100 londonien a lâché 0,71 %, et Wall Street a fini partagée : le Dow Jones en baisse de 0,25 %, le Nasdaq en hausse de 0,65 %, la scission classique entre les valeurs cycliques inquiètes du pétrole cher et les valeurs technologiques qui continuent d'espérer un été de baisse de taux.\n\nCe qui a joué en défaveur de Paris hier, c'est surtout le pétrole. Les compagnies aériennes européennes (dont Air France-KLM, hors CAC 40 mais dans le climat) ont souffert, à l'image de Ryanair et Lufthansa en baisse sur toute la journée. Les valeurs pétrolières, elles, se sont défendues sans conviction : TotalEnergies a tenu son cap avant sa publication semestrielle prévue jeudi matin. Les valeurs défensives (Orange, Air Liquide, Danone) ont continué à jouer les paratonnerres, et la banque a été neutre dans l'attente de la BCE.\n\nL'analyse technique lue sur TradingView est parfaitement lisible aujourd'hui : le signal global est **neutre**, à la fois sur les oscillateurs et sur les moyennes mobiles. Ni conviction haussière, ni conviction baissière, la définition même d'un indice qui refuse de prendre position tant que Christine Lagarde n'aura pas parlé. Les repères techniques à garder à l'esprit pour la journée et la semaine :\n\n- Résistance immédiate : **8 377 points**, le plafond qu'aucune tentative de rebond n'a réussi à percer depuis la semaine dernière.\n- Support à défendre : **8 331 points**, la ligne au-dessus de laquelle le biais court terme reste constructif.\n- Support de moyen terme : **8 253 points**, retesté plusieurs fois depuis mars et systématiquement défendu.\n- Résistance suivante : **8 500 puis 8 620 points**, borne haute du canal de moyen terme.\n\nDeux scénarios continuent à se disputer la journée. Le scénario haussier repose sur la tenue de 8 331 en cas d'ouverture faible, avec un retour progressif vers 8 400 si les publications américaines d'avant Bourse (GM, 3M, Coca-Cola) ne déçoivent pas. Le scénario baissier s'active sous 8 331, avec 8 253 comme cible naturelle, et il serait alimenté soit par une déception de la part de GM (dont le titre peut bouger de 5,7 % sur ses résultats, avec des questions lourdes sur les tarifs Trump et la marge des véhicules électriques), soit par une flambée surprise du Brent au-dessus de 92 dollars. Le vrai catalyseur de la semaine reste à venir jeudi : la conférence de presse de Lagarde à 14h30 Paris, immédiatement précédée de sept publications semestrielles françaises avant Bourse. Aujourd'hui, l'indice va probablement respirer entre 8 320 et 8 380, dans l'attente.\n\n## 3. Crypto — Bitcoin en priorité\n\nLe Bitcoin s'échange ce mardi matin autour de **64 400 dollars**, en très légère baisse de 0,99 % sur 24 heures, et en hausse d'environ 3 % sur la semaine. Le prix reste coincé dans le range 62 500 à 65 500 dollars qui le tient depuis la semaine dernière, avec 65 300 à 65 600 dollars comme plafond de verre et 63 000 dollars comme premier point d'appui. C'est la configuration d'un actif qui a besoin d'un déclencheur pour sortir, et ce déclencheur n'est pas là ce matin.\n\nCôté sentiment, le Fear & Greed Index d'alternative.me remonte doucement à **29 sur 100, toujours en zone de peur**, mais un cran au-dessus du 28 d'hier. C'est du progrès millimétrique. Les investisseurs particuliers restent nerveux, mais moins qu'ils ne l'étaient au plus bas de la semaine dernière. Ils n'ont pas encore basculé dans l'appétit.\n\nLes nouvelles institutionnelles jouent sur la même bande étroite. Les fonds indiciels Bitcoin cotés en bourse aux États-Unis ont continué à enregistrer des entrées nettes à la fin de la semaine dernière : 108 millions de dollars mercredi 15 juillet, 79 millions jeudi 16, 132 millions vendredi 17, avec le géant BlackRock IBIT en locomotive systématique (plus de 80 % des entrées à lui seul). La série de huit semaines de sorties, qui avait totalisé plus de 2,7 milliards de dollars entre mai et juillet, est bien cassée. Le retour d'appétit reste toutefois modeste et n'a pas encore franchi le seuil des 200 millions de dollars par jour qui signalerait un vrai basculement de tendance.\n\nSur le front réglementaire, deux dossiers avancent sans avancer. La **SEC** continue de préparer sa grande proposition Regulation Crypto (safe harbor jusqu'à 75 millions de dollars de levée, exemption temporaire d'enregistrement, sortie du statut de security pour les tokens dont la gestion active a cessé) : le texte est passé au bureau OIRA de la Maison Blanche pour revue finale et la publication est annoncée pour juillet, sans date encore posée. Le **CLARITY Act** reste bloqué au Sénat, sur trois désaccords qui n'ont pas bougé depuis vendredi. Un premier : la clause d'éthique demandée par Elizabeth Warren, qui pointe les 1,4 milliard de dollars de revenus crypto disclosés par Donald Trump en 2025, pour interdire au président, au vice-président, aux hauts fonctionnaires et aux parlementaires de profiter du secteur. Un deuxième : la protection des développeurs de logiciels non-custodial (Section 604), sur laquelle les sénateurs Warner (démocrate de Virginie) et Cortez Masto (démocrate du Nevada) attendent l'avis explicite des forces de l'ordre. Un troisième : la rémunération des soldes en stablecoins, dénoncée par les banques (American Bankers Association et Independent Community Bankers of America) comme une faille contournant le GENIUS Act. La sénatrice Cynthia Lummis avait annoncé mi-juillet un vote possible dans la semaine du 20, mais aucune motion de cloture n'a été déposée à ce jour et le vote reste à l'état d'intention plutôt que de programmation. C'est ce qui explique qu'aucun flash n'est déclenché ce matin : la routine dit clairement que l'on publie quand un événement est concret et confirmé, pas quand il est envisagé.\n\n**Analyse technique (TradingView) :** le signal quotidien est à l'achat, le signal hebdomadaire reste à la vente, le signal mensuel est neutre. Autrement dit, à très court terme les moyennes mobiles se sont réalignées à la hausse, mais la tendance de fond reste défavorable. C'est le portrait classique d'un rebond correctif dans une tendance baissière plus large, qui peut soit se transformer en vraie reprise soit s'essouffler contre la résistance. Les niveaux à surveiller cette semaine restent les mêmes qu'hier :\n\n- Résistance immédiate : **65 300 à 65 600 dollars**, le plafond depuis la mi-juillet.\n- Résistance suivante : **66 000 puis 70 000 dollars**, en cas de cassure nette sur volumes.\n- Support intermédiaire : **63 125 dollars**, la moyenne mobile 200 semaines, plancher technique majeur.\n- Support psychologique majeur : **60 000 dollars**, la ligne rouge qu'un décrochage ouvrirait vers 55 000 puis 50 000.\n\n### 🚦 Feu de circulation Bitcoin — 21 juillet 2026\n\n```\n🟢  Flux ETF          → Série 3 jours d'entrées confirmée (108 + 79 + 132 M$), IBIT en locomotive\n🔴  Fear & Greed      → 29, peur (une petite marche au-dessus des 28 d'hier), retail encore prudent\n🟠  Fed               → 10,2 % de proba de hausse au FOMC du 29 (contre 31 % il y a une semaine)\n🟠  Dollar (DXY)      → 100,8, en léger rebond après le creux du 16 juillet, un cran moins favorable\n🟢  Technique         → Quotidien à l'achat, hebdo à la vente, léger avantage au court terme\n🟠  Supports          → 64 400 $, au-dessus de la MA 200 semaines et de 60 000, buffer réduit\n🟠  Catalyseur 7j     → Regulation Crypto SEC toujours attendue, vote CLARITY visé sans calendrier, tensions Iran\n\nVERDICT DU JOUR : 2 verts, 4 oranges, 1 rouge, contexte équilibré-modérément-porteur.\nLe retour progressif des flux institutionnels et une technique daily qui repasse à l'achat donnent quelques signaux positifs, mais le dollar qui remonte et le retail encore prudent empêchent de basculer franchement.\n```\n\n**Évolution depuis hier :** un vert conservé (les flux ETF), le dollar passe de 🟢 (100,76 en repli) à 🟠 (100,8 en léger rebond), la technique passe de 🟠 à 🟢 grâce au réalignement des moyennes mobiles courtes. Le solde net est neutre : un indicateur bascule dans un sens, un autre dans l'autre. Aucune alerte franche ni de détérioration ni d'amélioration à signaler. La journée d'aujourd'hui est simplement une variante de celle d'hier.\n\n## 4. Or (XAU/USD)\n\nL'or reste en convalescence. Après la lourde chute de la semaine dernière (près de 4,6 % perdus entre lundi et vendredi), le métal a stabilisé sa position autour de **4 020 dollars l'once** lundi, en légère hausse de 0,1 %, mais il continue de flirter dangereusement avec la barre psychologique des 4 000 dollars sous laquelle il n'ose pas descendre. Le rebond est encore trop faible pour parler de vrai retournement.\n\nDeux forces opposées se disputent le prix. Du côté haussier, la géopolitique devrait normalement doper la demande de valeur refuge : frappes iraniennes en Arabie saoudite et au Qatar, pétroliers attaqués dans le détroit d'Ormuz, blocus houthi contre l'Arabie saoudite. Cette configuration aurait dû envoyer l'or nettement au-dessus de 4 100 dollars. Mais la prime de refuge a été neutralisée par la lecture monétaire : les probabilités d'une baisse de taux Fed en juillet sont tombées à 10,2 % (contre 31 % il y a une semaine, et 47 % il y a un mois), et la probabilité d'une hausse en septembre est remontée à 53 %. Autrement dit, chaque cran de taux en plus est un cran d'inconfort en plus pour un actif qui ne verse aucun intérêt. Et le dollar en rebond à 100,8 rend l'or plus cher en euros et en yens, ce qui pèse mécaniquement sur la demande étrangère.\n\n**Analyse technique (TradingView) :** le signal quotidien reste explicitement à la vente. Les moyennes mobiles sont défavorablement empilées, et seuls les oscillateurs neutralisent partiellement le tableau. Ce sont les niveaux d'une consolidation qui n'a pas encore choisi sa direction, mais qui penche pour l'instant vers le bas :\n\n- Résistance immédiate : **4 021 dollars**, la zone d'offre à casser pour espérer relancer la machine.\n- Résistance suivante : **4 100 puis 4 215 dollars**, cibles techniques d'un rebond confirmé.\n- Support immédiat : **3 980 à 4 000 dollars**, la ligne psychologique.\n- Support majeur : **3 942 dollars**, sous lequel la porte s'ouvre vers 3 856 puis 3 666.\n\nDeux scénarios pour la semaine. Le premier, le plus probable en l'état, est que l'or reste piégé entre 3 980 et 4 021 en attendant la BCE. Un ton dovish de Lagarde jeudi affaiblirait l'euro sans grand effet sur l'or, un ton hawkish affaiblirait le dollar par ricochet et donnerait une petite bouffée d'oxygène. Le second scénario est celui d'une cassure sous 3 942 : dans ce cas la fourchette basse de 3 666 devient à portée. Le vrai catalyseur pour l'or ne tombera pas cette semaine, il tombera le 29 juillet avec la décision Fed. D'ici là, l'or restera l'otage des mouvements du dollar et du pétrole.\n\n## 5. Synthèse stratégique\n\nLes trois marchés continuent de raconter la même histoire, celle d'une pause forcée avant un jeudi qui va tout crystalliser. Le CAC 40 ne peut pas bouger tant que Lagarde n'a pas parlé et que les sept mastodontes français n'ont pas publié. Le Bitcoin ne peut pas casser sa consolidation tant que la SEC n'a pas sorti Regulation Crypto et que la Fed n'a pas donné son verdict le 29. L'or ne peut pas se relever tant que les probabilités de baisse de taux ne remontent pas. Trois attentes différentes qui convergent sur les mêmes acteurs (Fed, BCE, dollar) et qui laissent les marchés dans cette drôle de posture, immobiles en surface mais tendus en profondeur.\n\nLe vrai indicateur croisé à surveiller aujourd'hui reste la paire euro-dollar. Elle a lâché 0,16 % lundi à **1,1409**, sur un mouvement de repli léger mais suffisant pour rappeler que le dollar bénéficie encore de son statut de valeur refuge quand le pétrole flambe et que l'Iran fait parler ses armes. Si l'euro-dollar continue de glisser sous 1,14, c'est mauvais pour le pouvoir d'achat des Européens qui importent du pétrole, mauvais pour l'or (encore plus cher en euros), et probablement neutre pour le Bitcoin. Si au contraire l'euro remonte sur les 1,145 ou 1,15, cela signifierait que le marché anticipe une Lagarde plus offensive que prévu jeudi, et cela soulagerait mécaniquement les deux autres marchés. C'est la boussole discrète qui coordonne CAC, or et crypto sans jamais faire les gros titres.\n\nLe point d'inflexion le plus imminent, ce n'est pas Lagarde en réalité, c'est Tesla et Alphabet **demain soir mercredi**, après clôture de Wall Street. Deux mastodontes technologiques qui vont dire si la thèse de la surperformance de l'intelligence artificielle tient encore la route, ou si les doutes qui ont commencé à s'installer autour de STMicroelectronics et Nvidia la semaine dernière trouvent leur confirmation. Le Nasdaq et par ricochet la tech européenne (Soitec, STMicro justement, ASM International) joueront leur été sur ces deux publications, et le Bitcoin y sera sensible aussi, par corrélation avec l'appétit pour le risque.\n\n## 6. Calendrier de la semaine — 21 au 25 juillet 2026\n\n**Mardi 21 juillet (aujourd'hui).** Réveil du calendrier des résultats américains. Avant l'ouverture de Wall Street, publient **General Motors, Coca-Cola, Halliburton, 3M, Lockheed Martin, Capital One, UPS et EQT**. Impact **fort** sur les secteurs consommation (Coca-Cola), industrie (3M, GM), énergie (Halliburton, EQT), défense (Lockheed Martin) et logistique (UPS). GM sera particulièrement scruté, avec une volatilité implicite de plus ou moins 5,7 %, sur les tarifs Trump et la profitabilité des véhicules électriques. Rien du côté du CAC 40. Côté macro, la journée est vide de statistiques de premier plan : les résultats micro donneront le ton sur la santé de la demande américaine. Une adjudication américaine à 20 ans se déroule à 19h00 Paris (05h00 mercredi à Nouméa).\n\n**Mercredi 22 juillet. La journée à haute intensité tech.** AT&T publie ses résultats T2 avant l'ouverture US. Mais surtout, **après clôture de Wall Street (soit 22h00 Paris, 08h00 jeudi à Nouméa)**, deux mastodontes publient : **Tesla** (consensus 26,4 milliards de dollars de chiffre d'affaires, focus sur le déploiement du Robotaxi dans cinq marchés) et **Alphabet** (consensus 116,9 milliards de dollars, focus sur le carnet de commandes Google Cloud à 460 milliards). IBM publie également, premier rendez-vous du cycle IA générative pour les entreprises. **Impact fort** attendu sur les futures Nasdaq dès la nuit européenne, avec ricochets probables sur la tech française (Soitec, STMicro, Dassault Systèmes) et sur le Bitcoin par corrélation appétit pour le risque.\n\n**Jeudi 23 juillet. La journée à haute intensité européenne.** La matinée démarre avec **sept publications du CAC 40 avant Bourse : TotalEnergies, BNP Paribas, Carrefour, Dassault Systèmes, STMicroelectronics, Thales, Eurofins Scientific**. Sept mastodontes le même matin, ce qui va donner au parisien un profil de tempête intraday. Puis à 13h45 Paris (23h45 Nouméa), **décision de politique monétaire de la BCE**, consensus 88 % de statu quo au taux de dépôt de 2,25 %. À 14h30 (00h30 vendredi à Nouméa), **conférence de presse de Christine Lagarde**, moment de la semaine où tout se joue : ton dovish ou hawkish, diagnostic sur l'inflation et sur l'impact des tarifs Trump. Toujours à 14h30, les États-Unis publient les inscriptions hebdomadaires au chômage. À 19h00, adjudication US 10 ans indexée sur l'inflation. Enfin, après clôture Wall Street (22h00 Paris, 08h00 vendredi à Nouméa), **Intel** publie ses résultats, avec l'attente d'un premier trimestre bénéficiaire après six trimestres de pertes consécutives.\n\n**Vendredi 24 juillet.** Journée de vérité de l'activité en juillet. À 9h15-10h00 Paris, **PMI flash zone euro** (composite, manufacturier, services) publiés par S&P Global. **Impact fort** sur l'euro et les taux courts, au lendemain de la BCE. À 15h45 Paris (01h45 samedi à Nouméa), **PMI flash États-Unis**. À 14h30 Paris (00h30 samedi à Nouméa), **commandes de biens durables américaines** pour juin, baromètre de l'investissement productif. À 16h00 (02h00 samedi à Nouméa), ventes de logements neufs US. Journée qui va fixer le narratif d'été (récession douce ou tenue de l'activité) avant la Fed de la semaine suivante.\n\n**Lundi 27 juillet et au-delà.** Ce n'est pas dans la semaine, mais autant l'annoncer : LVMH publie ses résultats semestriels lundi 27 avant Bourse, et la Fed américaine se réunit le mercredi 29 avec sa décision à 20h00 Paris (06h00 jeudi à Nouméa), suivie de la conférence de presse de Jerome Powell. Ces deux rendez-vous cadreront la fin du mois.\n\n> ### 📌 Le rendez-vous à ne pas manquer cette semaine\n>\n> **Jeudi 23 juillet, 13h45 Paris / 23h45 Nouméa — Décision BCE, puis conférence Lagarde à 14h30 (00h30 vendredi à Nouméa).**\n>\n> Après la hausse surprise de 25 points de base du 11 juin (qui a porté le dépôt à 2,25 % pour répondre au choc énergétique iranien), le marché price 88 % de statu quo. Le vrai enjeu n'est pas la décision elle-même, c'est **le langage de Lagarde** : va-t-elle valider que le cycle de hausse est fini, ou laisser la porte ouverte à un nouveau tour de vis en septembre ? Cette réunion tombe le même jour que sept publications du CAC 40 (dont TotalEnergies, BNP Paribas, STMicro, Dassault Systèmes, Thales) et à la veille des flash PMI. L'euro-dollar, les taux OAT et Bund, et le CAC 40 vont vivre 24 heures de tension maximale. C'est le moment de la semaine pour recalibrer une exposition euro.\n\n**Ce que la semaine n'apporte pas** : pas de discours de la Fed américaine (elle est en blackout du 18 au 30 juillet, sa réunion tombe le 29), pas de BoJ (le 30-31), pas de BoE, pas de PBoC. L'expiration mensuelle des options BTC et ETH sur Deribit est déjà passée le vendredi 17 juillet, prochaine grosse échéance le 31.\n\n---\n\n*Veille construite à partir de sources croisées, chaque fait cité confirmé par au moins deux publications indépendantes. Sources principales : Boursorama, Zonebourse, TradingSat, Investing.com, TradingView, CoinDesk, CoinGlass, alternative.me, KuCoin, LiveVolatile, FXLeaders, FXStreet, TradingEconomics, CNBC, Al Jazeera, WorldOil, CME FedWatch, Congress.gov, SEC.gov, Latham & Watkins US Crypto Policy Tracker, Forbes, Yahoo Finance. Les niveaux techniques bougent naturellement d'une source à l'autre selon l'heure de capture. Cette veille est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-20","type":"crypto","titre":"Revue de presse crypto de la semaine","md":"## L'histoire de la semaine\n\nLa crypto est entrée dans cette semaine sur la pointe des pieds, encore convalescente d'un printemps difficile, et elle en est ressortie plus assurée, mais avec une nervosité nouvelle. Le fil rouge, c'est l'inflation américaine. Mardi 14 et mercredi 15 juillet, coup sur coup, les chiffres de juin sont tombés en dessous des attentes, l'indice des prix à la consommation à 3,5 % contre 3,6 attendu, l'indice des prix producteurs à 5,5 % contre 6,2 espérés. Le marché a lu ces deux chiffres comme une porte qui se refermait sur toute hausse des taux de la Réserve fédérale à la fin du mois. En quelques minutes, le Bitcoin est passé d'environ 62 000 à 64 900 dollars, l'Ethereum a bondi de 7 %, et près de 230 millions de dollars de positions vendeuses forcées ont amplifié le mouvement. C'est ce que les marchés appellent une prise à contre-pied. Le rebond de la semaine s'est joué à ce moment-là.\n\nPuis le vent a tourné. À partir de jeudi 16, le conflit entre les États-Unis et l'Iran, latent depuis fin juin, s'est brutalement rallumé. Le commandement central américain a mené sept nuits d'affilée de frappes ciblées dans le sud de l'Iran, autour du détroit d'Ormuz. Le prix du pétrole a repris cinq pour cent, ce qui menace directement le récit d'une inflation qui s'apaise, et les actifs risqués, crypto en tête, ont pris un peu de recul. Le Bitcoin est repassé sous les 64 000 dollars vendredi, avant de se stabiliser autour de 64 400 dimanche 19. Ni euphorie, ni panique. Un marché qui essaie de tenir sa ligne dans le brouillard géopolitique.\n\nEn toile de fond, Washington continue de sculpter le paysage réglementaire crypto à petits coups. Kevin Warsh, le nouveau président de la Réserve fédérale, a fait son premier grand oral devant le Congrès. Le CLARITY Act, la grande loi de clarification, n'a pas trouvé son chemin vers un vote au Sénat, mais la Chambre a organisé une audience très mise en scène à New York, dans l'ancien Federal Hall. Et le compte à rebours des règles stablecoins de la loi GENIUS a continué de tourner. Bref, une semaine où la macro et la politique ont autant compté que la technologie elle-même.\n\n## Les évènements marquants\n\n### 1. Le double choc désinflationniste américain fait rebondir le Bitcoin (mardi 14 et mercredi 15 juillet)\n\nC'est le fait dominant de la semaine. L'indice des prix à la consommation pour juin, publié mardi 14 par le Bureau of Labor Statistics, a montré un recul mensuel de 0,4 %, la plus forte baisse depuis avril 2020, avec une inflation annuelle ramenée à 3,5 % et une inflation sous-jacente à 2,6 %. Le lendemain, l'indice des prix producteurs a continué dans le même sens à 5,5 % sur un an, très en dessous des 6,2 % attendus. Résultat, la probabilité d'une hausse de taux à la réunion de la Fed du 29 juillet, mesurée par l'outil FedWatch du CME, est tombée d'un peu plus de 40 % à environ 10 à 13 %. Le Bitcoin, qui tournait autour de 62 000 dollars, a bondi au-delà de 65 000 en quelques minutes, l'Ethereum s'est adjugé 7 %. Pourquoi c'est important : moins de hausse de taux signifie moins de coût d'opportunité à détenir des actifs qui ne rapportent pas d'intérêt, comme le Bitcoin. C'est le moteur mécanique du rally, avant même de parler d'histoire ou de sentiment.\n\nSources : [CoinDesk, 15 juillet](https://www.coindesk.com/markets/2026/07/15/bitcoin-tops-usd64-000-as-cooling-u-s-inflation-guts-the-fed-rate-hike-trade) ; [Blockhead, 15 juillet](https://www.blockhead.co/2026/07/15/bitcoin-rallies-to-65-000-as-cooling-cpi-cuts-july-fed-hike-odds/) ; [Crypto Briefing, 14 juillet](https://cryptobriefing.com/us-ppi-falls-june-2026-crypto-outlook/).\n\n### 2. Kevin Warsh, le nouveau visage de la Fed, passe son premier grand oral (mardi 14 et mercredi 15 juillet)\n\nKevin Warsh, confirmé président de la Réserve fédérale en début d'année, s'est présenté devant la commission des services financiers de la Chambre le mardi, puis devant la commission bancaire du Sénat le mercredi, pour le rendez-vous semestriel de politique monétaire. Sa ligne a été ferme sur l'inflation, plus prudente sur les cryptos. Il a redit qu'il ne tolérerait pas une inflation durablement élevée, et il a insisté sur la nécessité de protéger les facilités de liquidité traditionnelles des risques posés par les actifs numériques. Interrogé sur son indépendance face à d'éventuelles pressions de la Maison-Blanche, il a répondu qu'il continuerait à faire son travail. Pourquoi c'est important : les marchés cherchent à décoder Warsh comme ils ont décodé Powell pendant sept ans. Sa fermeté sur l'inflation, combinée aux chiffres du CPI de la veille, a créé une lecture nuancée, moins de hausses possibles mais pas de baisses tout de suite, ce qui a soutenu les actifs risqués sans déclencher d'euphorie.\n\nSources : [Federal Reserve Board](https://www.federalreserve.gov/newsevents/testimony/warsh20260714a.htm) ; [CNBC, 15 juillet](https://www.cnbc.com/2026/07/15/watch-fed-chairman-kevin-warsh-testify-live-before-senate-banking-committee.html) ; [NPR, 15 juillet](https://www.npr.org/2026/07/15/nx-s1-5894712/in-first-congressional-testimony-new-fed-chief-warsh-vows-to-fight-inflation) ; [Bank Policy Institute](https://bpi.com/8-takeaways-from-kevin-warshs-first-semiannual-testimony-to-congress/).\n\n### 3. Le CLARITY Act tourne au ralenti, l'audience de New York fait plus de bruit que d'effet (vendredi 17 juillet)\n\nLe CLARITY Act, ce grand texte qui doit répartir la surveillance de la crypto entre le gendarme boursier SEC et le régulateur des dérivés CFTC, n'a toujours pas de vote programmé au Sénat. Vendredi 17 juillet, la commission des services financiers de la Chambre a tenu une audience symbolique à Federal Hall, à New York, sous le titre « Bâtir l'avenir de la finance ». Faute de vote, l'objectif était de mettre la pression sur les sénateurs récalcitrants avant les vacances parlementaires du 7 août. Trois désaccords bloquent encore le texte, une clause d'éthique concernant les cryptos détenues par d'anciens responsables publics, dont Donald Trump, la lutte contre le financement illicite, et la rémunération des soldes en stablecoins. Selon plusieurs marchés de prédiction cités par la presse spécialisée, la probabilité d'un vote favorable en 2026 est tombée d'environ 70 % en début d'année à 43 % à la mi-juillet. Pourquoi c'est important : c'est la loi qui doit donner un cadre légal complet au marché crypto américain. Sans elle, on reste dans le paysage réglementaire par à-coups qu'on connaît depuis trois ans.\n\nSources : [Crypto News, 15 juillet](https://crypto.news/clarity-act-senate-showdown-why-the-july-17-hearing-decides-cryptos-2026/) ; [Yahoo Finance, 4 juillet](https://finance.yahoo.com/markets/crypto/articles/clarity-act-countdown-crypto-bill-161215444.html) ; [Yahoo Finance, 15 juillet](https://finance.yahoo.com/markets/crypto/articles/clarity-act-stalls-senate-three-100403007.html) ; [Disruption Banking, 17 juillet](https://www.disruptionbanking.com/2026/07/17/clarity-act-text-drops-today-no-democrats-on-board-and-60-votes-to-find/).\n\n### 4. Escalade militaire américaine en Iran, le pétrole remonte, la crypto encaisse (jeudi 16 à samedi 18 juillet)\n\nLe commandement central américain a mené une septième nuit consécutive de frappes ciblées sur des installations iraniennes dans la province d'Hormozgan, autour du détroit d'Ormuz. Un affrontement en Jordanie a coûté la vie à deux soldats américains. Le prix du pétrole a bondi d'environ 5 % et le détroit reste très perturbé pour la navigation commerciale. Le Bitcoin, qui approchait 65 000 dollars mercredi, est repassé sous les 64 000 vendredi 17, dans un trading nerveux entre 62 800 et 63 800 dollars. Pourquoi c'est important : deux effets se combinent. D'un côté, un pétrole plus cher menace le récit d'inflation qui refroidit, ce qui pourrait rendre la Fed plus prudente sur d'éventuelles baisses de taux. De l'autre, le climat géopolitique pèse mécaniquement sur tous les actifs risqués. La crypto s'est bien tenue jusqu'ici, mais elle reste exposée si le conflit dure.\n\nSources : [Crypto Briefing, 17 juillet](https://cryptobriefing.com/us-airstrikes-iran-crypto-market-impact-3/) ; [Yahoo Finance, 17 juillet](https://finance.yahoo.com/personal-finance/investing/article/bitcoin-and-ethereum-prices-today-friday-july-17-2026-prices-ease-as-conflict-in-iran-escalates-125602208.html) ; [CoinDesk Daybook, 14 juillet](https://www.coindesk.com/daybook-us/2026/07/14/u-s-iran-escalation-weighs-on-bitcoin-stocks-as-oil-climbs) ; [CryptoSlate, mi-juillet](https://cryptoslate.com/bitcoin-looks-calm-but-it-now-faces-a-july-17-oil-deadline-after-iran-shock-sends-crude-up-5/).\n\n### 5. Les fonds indiciels Bitcoin repassent en collecte nette, huit semaines de sorties terminées\n\nSur les trois premiers jours ouvrés de la semaine, les fonds Bitcoin cotés en bourse aux États-Unis ont attiré environ 368 millions de dollars d'entrées nettes, selon les données croisées de SoSoValue et Farside. Le détail : 181 millions le mardi 14, 108 millions le mercredi 15, et 79 millions le jeudi 16. C'est BlackRock, avec son ETF IBIT, qui a mené la reprise, avec 81 millions de dollars d'entrées la seule journée du 15. Les fonds Ethereum ont eux aussi vu revenir de l'argent, avec 58 millions de dollars d'entrées le 14 juillet à eux seuls. Cela met fin à une série de huit semaines de sorties nettes, pendant lesquelles plus de 8 milliards de dollars étaient partis des fonds Bitcoin depuis mai. Pourquoi c'est important : les flux ETF sont devenus depuis dix-huit mois le meilleur baromètre de la demande institutionnelle américaine. Le retour de flux positifs, même modestes, signale que les investisseurs professionnels reviennent, ce qui compte davantage que les émotions du marché de détail.\n\nSources : [Crypto Briefing, 14 juillet](https://cryptobriefing.com/bitcoin-ethereum-etf-inflows-july-14/) ; [CoinMarketCap Academy](https://coinmarketcap.com/academy/article/bitcoin-etfs-snap-2-month-outflow-run-with-dollar368m-3-day-inflow-streak) ; [Crypto Times, 18 juillet](https://www.cryptotimes.io/2026/07/18/crypto-etfs-ended-the-week-with-nearly-200m-in-inflows/).\n\n### 6. Ripple obtient un passeport européen, XRP classé illiquide par la chambre de compensation américaine (vendredi 18 juillet)\n\nVendredi 18 juillet, deux nouvelles opposées ont marqué l'écosystème XRP. D'un côté, Ripple a obtenu un agrément européen qui vaut comme passeport pour opérer dans les vingt-sept pays de l'Union sous le règlement MiCA, un vrai contrepoids à l'incertitude législative américaine. De l'autre, la Depository Trust and Clearing Corporation, la chambre de compensation qui gère l'essentiel des transactions de titres américains, a classé XRP comme actif illiquide dans son système de collatéral. Concrètement, cela signifie que XRP ne peut pas être utilisé aussi facilement comme garantie par les institutions financières américaines qui passent par la DTCC. Le seuil symbolique retenu par la DTCC, un prix de référence de 5 dollars, place XRP, qui s'échangeait autour d'un dollar cette semaine, dans une catégorie plus contraignante en marge d'appel. Pourquoi c'est important : cela résume à soi seul la dualité de la crypto en 2026, l'Europe qui structure et intègre, les États-Unis qui tâtonnent et fragmentent, avec des conséquences très concrètes pour les grands acteurs.\n\nSources : [CoinMarketCap CMC-AI XRP](https://coinmarketcap.com/cmc-ai/xrp/latest-updates/) ; [CaptainAltcoin, 18 juillet](https://captainaltcoin.com/crypto-price-prediction-for-today-july-18-solana-sol-xrp-cardano-ada/).\n\n### 7. Polymarket dépose son dossier pour le trading à effet de levier aux États-Unis\n\nPolymarket, la plateforme leader des marchés de prédiction, a déposé au début du mois auprès de la National Futures Association un dossier pour opérer comme courtier en contrats à terme, à travers son affiliée Coming Home GBA LLC. L'objectif est d'obtenir le feu vert pour proposer du trading à effet de levier aux clients américains, ce qui suivrait la voie ouverte par Kalshi en mars. Il manque encore l'aval de la CFTC pour modifier le règlement de la plateforme et permettre des positions non entièrement collatéralisées. Pourquoi c'est important : les marchés de prédiction sont l'une des passerelles les plus concrètes entre la crypto et la finance classique. Leur passage à l'effet de levier, s'il est autorisé, marquerait leur entrée pleine et entière dans l'univers des dérivés régulés américains, avec des volumes potentiellement multipliés par dix.\n\nSources : [Bloomberg, 9 juillet](https://www.bloomberg.com/news/articles/2026-07-09/polymarket-seeks-license-to-offer-margin-trading-legally-in-us) ; [CoinDesk, 10 juillet](https://www.coindesk.com/markets/2026/07/10/polymarket-seeks-approval-to-bring-margin-trading-to-u-s-customers).\n\n## Les chiffres de la semaine\n\n| Indicateur | Début de semaine (13 juillet) | Fin de semaine (19 juillet) | Variation |\n|---|---|---|---|\n| Bitcoin (BTC) | environ 62 800 dollars | environ 64 400 dollars | + 2,5 % environ |\n| Ethereum (ETH) | environ 1 780 dollars | environ 1 866 dollars | + 4,8 % environ |\n| Dominance Bitcoin | 58 % environ | 56,3 % environ | légère baisse |\n| Flux nets ETF Bitcoin | | environ + 400 millions de dollars sur la semaine | fin de 8 semaines de sorties |\n| Probabilité hausse de taux Fed le 29 juillet | plus de 40 % | 10 à 13 % | forte baisse |\n\nDeux précisions honnêtes sur ces chiffres. D'abord, le Bitcoin a fait beaucoup plus que ce que la variation nette suggère, avec un pic à environ 65 000 dollars le 15 juillet avant la retombée liée à l'Iran. Ensuite, la variation de dominance Bitcoin, de 58 à 56,3 %, reste modeste, on n'est pas encore dans une vraie saison des altcoins. L'indice CMC des saisons d'altcoins pointe à 46 sur 100, encore en zone Bitcoin.\n\nSources chiffres : [CoinDesk, 15 juillet](https://www.coindesk.com/markets/2026/07/15/bitcoin-tops-usd64-000-as-cooling-u-s-inflation-guts-the-fed-rate-hike-trade) ; [Fortune, 13 juillet](https://fortune.com/article/price-of-bitcoin-07-13-2026/) ; [Fortune, 17 juillet](https://fortune.com/article/price-of-bitcoin-07-17-2026/) ; [TV Hub, dominance BTC juillet 2026](https://www.tv-hub.org/guide/bitcoin-dominance) ; [KuCoin, calendrier FOMC](https://www.kucoin.com/news/flash/fed-s-next-fomc-meeting-scheduled-for-july-28-29-2026).\n\n## Ce qu'il faut surveiller la semaine du 20 au 24 juillet\n\nTrois rendez-vous à noter, par ordre d'importance.\n\nLe plus lourd : la préparation du Comité de politique monétaire de la Réserve fédérale, qui se réunit les 28 et 29 juillet, la semaine suivante. Avec des chiffres d'inflation aussi favorables et un conflit iranien qui pourrait les inverser, la lecture de chaque intervention publique de la Fed cette semaine sera scrutée. La forme du communiqué du 29, plus que le taux lui-même qui ne bougera vraisemblablement pas, orientera le prochain grand mouvement crypto.\n\nEnsuite, le sort du CLARITY Act. Le Sénat rentre de mini-vacances lundi 20, il ne reste plus qu'environ trois semaines avant les congés du 7 août. Si une nouvelle version du texte, tenant compte des blocages Trump, DeFi et stablecoins, est déposée cette semaine, ce serait le signal que le vote est encore vivant. Sinon, on peut probablement enterrer l'espoir d'une adoption avant l'automne.\n\nEnfin, la deadline réglementaire GENIUS Act du 29 juillet, où six agences fédérales doivent finaliser les règles applicables aux émetteurs de stablecoins, dont Circle. Un télescopage de calendrier peu banal, puisque cette échéance tombe le même jour que la décision de la Fed. Toute règle inattendue sur la rémunération des soldes en stablecoins ou sur les exigences de fonds propres aurait un effet immédiat sur les émetteurs américains cotés.\n\nEn arrière-plan, la Canada Crypto Week s'ouvre à Toronto du 20 au 26 juillet, avec la Blockchain Futurist Conference les 21 et 22. Peu de chances d'y voir naître des annonces qui bougent le marché mondial, mais l'occasion de prendre la température de l'écosystème nord-américain hors États-Unis.\n\n---\n\n*Revue construite à partir de sources croisées, chaque fait cité étant confirmé par au moins deux publications indépendantes parmi CoinDesk, Bloomberg, CNBC, NPR, Crypto Briefing, Yahoo Finance, CryptoSlate, Fortune, CoinMarketCap, sans oublier les sources primaires officielles quand elles étaient accessibles (Réserve fédérale). Les articles à source unique, les titres à sensation et les prédictions de prix ont été écartés ou signalés. Les niveaux de prix sont donnés en ordres de grandeur, ils bougent par nature d'une source à l'autre selon l'heure de capture. Cette revue est une lecture d'actualité, pas un conseil d'investissement.*"},{"date":"2026-07-20","type":"daily","titre":"CAC 40 · Crypto · Or","md":"## 1. Le fil conducteur du jour\n\nLa semaine s'ouvre dans une posture d'attente. Les investisseurs sortent d'une séquence contradictoire, où le double signal désinflationniste américain de mardi et mercredi dernier (indice des prix à la consommation à 3,5 %, indice des prix producteurs à 5,5 %, tous deux sous les attentes) a été percuté deux jours plus tard par le regain d'hostilités entre les États-Unis et l'Iran. Le résultat est un marché tiraillé, qui a laissé le CAC 40 rentrer chez lui vendredi soir sur 8 338,81 points, à peu près à l'équilibre sur la semaine, et qui laisse le Bitcoin autour de 64 400 dollars, presque immobile lui aussi malgré une amplitude interne de plus de 3 000 dollars entre son pic de mercredi et son creux de vendredi. L'or, lui, a payé la facture de cette Fed que le marché voit désormais peu pressée de baisser ses taux, avec 4,6 % perdus sur la semaine.\n\nTrois forces vont dominer les cinq jours qui commencent. La première, c'est la préparation du grand rendez-vous BCE de jeudi soir, moment où Christine Lagarde va devoir dire si le cycle de hausse est fini ou si la porte reste entrouverte pour un tour de vis supplémentaire en septembre. La deuxième, c'est le déferlement des résultats semestriels : sept publications du CAC 40 sur la seule journée de jeudi, plus Tesla et Alphabet mercredi soir aux États-Unis, plus Intel jeudi soir, sur fond de doutes qui se sont installés autour des valeurs d'intelligence artificielle. La troisième, c'est la Fed américaine, qui décide le 29 juillet mais qui rentre cette semaine dans sa période de silence, ce qui veut dire qu'aucun de ses membres ne s'exprimera : les marchés vont devoir se contenter des seules statistiques pour deviner sa lecture.\n\nPas de flash à publier ce matin. Ni la SEC (qui prépare sa proposition Regulation Crypto sans l'avoir encore sortie) ni le Sénat (qui laisse traîner le CLARITY Act) n'ont concrètement bougé pendant le week-end, et aucun choc crypto ne justifie une alerte séparée.\n\n## 2. CAC 40 — Bourse de Paris\n\nLe CAC 40 démarre lundi sur la clôture de **8 338,81 points**, terminée vendredi sur un repli de 0,47 % qui a interrompu la petite tentative de rebond du milieu de semaine. La semaine du 13 au 17 juillet se solde sur un match nul, environ 0,3 % perdus, avec un point haut mercredi à 8 382 avant que la fatigue ne s'installe. Le tableau est classique de fin de tendance courte, une compression entre deux niveaux que le marché n'arrive pas à trancher.\n\nTrois forces ont modelé cette photo. La BCE, d'abord, qui reste la première banque centrale du G7 à avoir durci sa politique cet été, avec un taux de dépôt à 2,25 % défendu bec et ongles par Christine Lagarde depuis début juillet. Le luxe, ensuite, a fait ce qu'il fait de mieux ces dernières années, jouer le rôle d'amortisseur. Les résultats de Richemont ont tiré Kering (+3,6 % sur la semaine), LVMH (+2,7 %) et Hermès (+2,4 %), une petite bulle d'oxygène dans un indice qui manquait de bougie. La tech française, elle, a payé cash le retour du doute autour de l'intelligence artificielle : STMicroelectronics a lâché près de 7 % vendredi, Soitec plus de 7 % sur la semaine, dans le même mouvement qui a brièvement vu Apple redevenir la première capitalisation mondiale devant Nvidia.\n\nL'analyse technique lue sur TradingView tient dans une phrase : le CAC 40 est en compression entre deux niveaux serrés. Le signal quotidien et le signal hebdomadaire sont tous les deux neutres, ce qui traduit une hésitation collective plus qu'une conviction. Concrètement, les repères à garder en tête pour la semaine sont les suivants :\n\n- Résistance immédiate : **8 377 points**, le mur qui bloque les rebonds depuis mardi.\n- Support à défendre : **8 331 points**, la ligne au-dessus de laquelle le biais reste constructif.\n- Support de moyen terme : **8 253 points**, retesté et converti à plusieurs reprises depuis mars.\n- Résistance suivante : **8 500 puis 8 620 points**, borne haute du canal de moyen terme.\n\nDeux scénarios se disputent la semaine. Le scénario haussier repose sur le maintien de 8 331, un retour vers 8 400 puis une cassure sur volumes qui rouvre la voie des 8 500 puis 8 620, une lecture défendue par des analystes qui pointent la solidité des valeurs défensives (Orange, Thales, Engie) chaque fois que la tech tremble. Le scénario baissier s'active sous 8 331 : dans ce cas la structure du canal se fragilise, direction 8 253 puis 8 190. Ce qui va probablement trancher entre les deux, c'est le ton exact que Christine Lagarde prendra jeudi à 14h30, ainsi que la salve de résultats semestriels français ce même jeudi, avec TotalEnergies, BNP Paribas, STMicro, Dassault Systèmes, Thales, Carrefour et Eurofins qui publient tous avant l'ouverture.\n\n## 3. Crypto — Bitcoin en priorité\n\nLe Bitcoin s'échange ce lundi matin autour de **64 400 dollars**, à peine bougé sur 24 heures et à peine positif sur la semaine. Cette immobilité de surface cache pourtant une amplitude réelle : mardi 15, le prix a percé les 65 500 dollars quand les chiffres d'inflation américains sont tombés sous les attentes, avant de retomber sous 64 000 vendredi 17 quand la reprise des frappes américaines sur des installations iraniennes autour du détroit d'Ormuz a renchéri le pétrole de plus de 5 %. C'est le mouvement type d'un marché coincé entre deux narratives, celle d'une Fed qui pourrait se détendre et celle d'une géopolitique qui refuse de se calmer.\n\nCôté sentiment, le Fear & Greed Index d'alternative.me remonte doucement à **28 sur 100, en zone de peur**, trois points au-dessus du 25 d'hier qui marquait la peur extrême. C'est un début de convalescence, pas un retournement. Les investisseurs restent nerveux, mais moins qu'il y a 48 heures.\n\nLes nouvelles institutionnelles vont dans le même sens tempéré. Les fonds indiciels Bitcoin cotés en bourse aux États-Unis ont enregistré **132 millions de dollars d'entrées nettes vendredi 17 juillet**, portés par le géant BlackRock IBIT (+136 millions à lui seul), après **79 millions jeudi**. La série de huit semaines de sorties, qui totalisait plus de 8 milliards de dollars depuis mai, est donc bien cassée. Sur le front réglementaire, la SEC continue de préparer sa grande proposition Regulation Crypto (safe harbor jusqu'à 75 millions de dollars de levée, exemption temporaire d'enregistrement, sortie du statut de security pour les tokens dont la gestion active a cessé) : le texte est au bureau OIRA de la Maison Blanche pour revue finale, publication annoncée pour juillet, sans date encore posée. Le CLARITY Act, lui, reste bloqué au Sénat, sur trois désaccords qui n'ont pas bougé pendant le week-end (clause d'éthique visant les responsables publics, protection des développeurs DeFi, rémunération des soldes en stablecoins), et les marchés de prédiction estiment sa chance de passage à 48 %, contre 74 % il y a un mois.\n\n**Analyse technique (TradingView) :** le signal quotidien est neutre, le signal hebdomadaire reste à la vente. Autrement dit, à court terme le marché ne sait pas ce qu'il veut, à moyen terme il penche vers le bas. Les niveaux à surveiller cette semaine :\n\n- Résistance immédiate : **65 300 à 65 600 dollars**, le plafond que le prix n'arrive pas à casser depuis mercredi.\n- Résistance suivante : **70 000 dollars**, en cas de cassure nette avec volumes.\n- Support intermédiaire : **63 125 dollars**, la moyenne mobile 200 semaines, qui joue le rôle de plancher technique.\n- Support psychologique majeur : **60 000 dollars**, la ligne rouge qu'un décrochage ouvrirait vers 55 000 puis 50 000.\n\n### 🚦 Feu de circulation Bitcoin — 20 juillet 2026\n\n```\n🟢  Flux ETF          → 132 M$ d'entrées vendredi, 79 M$ jeudi, série de sorties définitivement cassée\n🔴  Fear & Greed      → 28, peur (mais en amélioration depuis le 25 d'hier), retail encore prudent\n🟠  Fed               → 87 % de proba de statu quo au FOMC du 29, silence blackout toute la semaine\n🟢  Dollar (DXY)      → 100,76, en repli après le pic du début juillet, dollar affaibli, favorable au BTC\n🟠  Technique         → Quotidien neutre, hebdo à la vente, coincé sous 65 600, ambigu\n🟠  Supports          → 64 400 $, au-dessus de la MA 200 semaines et du seuil 60 000, mais buffer réduit\n🟠  Catalyseur 7j     → Regulation Crypto SEC possible cette semaine, unlock PUMP 22/07 (124 M$), tensions Iran\n\nVERDICT DU JOUR : 2 verts, 4 oranges, 1 rouge, contexte équilibré-modérément-porteur.\nLe retour des institutions et un dollar qui souffle donnent du souffle au Bitcoin, mais le retail reste peureux et la technique manque de conviction.\n```\n\n**Évolution depuis hier :** un vert a été gagné (le dollar bascule d'orange à vert en poursuivant son repli), les autres cases n'ont pas changé de couleur. On reste sous le seuil des deux basculements dans le même sens, donc ni alerte de détérioration ni signal positif franc à déclencher. C'est simplement une journée un peu plus favorable que la précédente.\n\n## 4. Or (XAU/USD)\n\nL'or vit une semaine ingrate. Après avoir plané au-dessus de 4 200 dollars il y a dix jours, il se retrouve ce lundi matin autour de **4 017 dollars l'once**, avec une perte hebdomadaire de **4,59 %**, la plus lourde en six semaines. Le rebond de vendredi (+1 %) a plus des allures de sursaut technique que de vrai retournement, et le prix se maintient tout juste au-dessus de la barre psychologique des 4 000 dollars.\n\nLa raison de cette glissade tient en deux mots : la Fed. La lecture combinée des chiffres d'inflation américains (moins mauvais que craint, mais avec un pétrole qui reprend cinq pour cent) et du ton ferme de Kevin Warsh devant le Congrès a effacé toute anticipation de baisse de taux. Les futures pricent désormais **73 % de probabilité d'au moins une hausse de 25 points de base d'ici la fin de l'année**, et environ 50 % dès la réunion de septembre. Or, pour un actif qui ne verse aucun intérêt, chaque cran de taux supplémentaire est un cran de handicap : c'est ce qu'on appelle le coût d'opportunité. En parallèle, l'indice dollar est remonté vers 100,7, ce qui rend mécaniquement l'or plus cher pour les acheteurs qui payent en euro, yen ou yuan. La prime de refuge que l'or aurait dû prendre grâce aux tensions Iran-États-Unis a été neutralisée par ces deux forces monétaires.\n\n**Analyse technique (TradingView) :** le signal quotidien est clairement à la vente, avec des moyennes mobiles en configuration défavorable. Les oscillateurs, en revanche, sont neutres, ce qui est le motif classique d'une fin de mouvement baissier qui hésite à repartir. Le marché s'installe dans une consolidation dont il faut connaître les bornes :\n\n- Résistance immédiate : **4 021 dollars**, zone d'offre à casser pour espérer relancer la machine.\n- Résistance suivante : **4 215 puis 4 320 dollars**, les cibles techniques d'un rebond confirmé.\n- Support immédiat : **3 980 à 4 000 dollars**, la ligne psychologique.\n- Support majeur : **3 942 dollars**, en dessous duquel la porte s'ouvre vers 3 856 puis 3 666.\n\nDeux scénarios pour la semaine. Si les 4 021 sont franchis (peu probable sans un signal dovish de la Fed, or elle est en blackout), les cibles 4 215 puis 4 320 redeviennent atteignables. Si le prix rejette 4 021 et casse 3 942, on prend le chemin de 3 856 puis potentiellement 3 666, la borne basse de la fourchette mensuelle. Le vrai catalyseur ne tombera pas cette semaine, il tombera le 29 juillet avec la décision Fed. D'ici là, l'or restera l'otage des mouvements du dollar et de la lecture que les marchés se font des PMI de vendredi.\n\n## 5. Synthèse stratégique\n\nLes trois marchés racontent la même histoire vue sous trois angles. Le CAC 40 est en compression parce qu'il attend la BCE et les résultats. La crypto est en compression parce qu'elle attend la Fed et la publication Regulation Crypto. L'or est en compression parce qu'il attend un signal monétaire, n'importe lequel, qui l'aidera à trancher. Aucun des trois n'a envie de prendre position tant que la semaine n'aura pas révélé ses vraies mains, et cela dessine un scénario de faible volatilité de surface, avec des accélérations brutales autour de chaque publication majeure.\n\nLe vrai point d'inflexion à surveiller n'est pas lundi, ni mardi, il est jeudi. La conférence de presse de Christine Lagarde à 14h30 (23h30 à Nouméa), suivie du festival de résultats semestriels français avant Bourse, va très probablement déterminer la couleur du CAC 40 pour la semaine et donner une première indication à l'euro-dollar. Ce mouvement de l'euro-dollar est justement l'indicateur croisé le plus intéressant : un euro fort après une Lagarde plus offensive que prévu affaiblirait le dollar et soulagerait mécaniquement l'or et le Bitcoin, alors qu'un euro faible après une Lagarde apaisée ferait l'inverse. C'est le levier qui relie discrètement les trois marchés couverts par cette veille.\n\n## 6. Calendrier de la semaine — 20 au 24 juillet 2026\n\n**Lundi 20 juillet.** Rentrée en douceur, l'agenda macro est presque vide. Un seul rendez-vous vraiment lisible en fin de journée européenne : à 16h00 Paris (01h00 mardi à Nouméa), les États-Unis publient les Leading Indicators du Conference Board pour juin, indicateur avancé de l'activité, impact moyen, consensus autour de -0,2 % sur un mois. Rien du côté du CAC 40 ce jour. C'est une journée où les flux techniques feront le prix, avec des opérateurs qui prennent leurs marques avant la BCE.\n\n**Mardi 21 juillet.** Réveil du calendrier des résultats américains. Avant l'ouverture de Wall Street, publient **General Motors, Coca-Cola, Halliburton, 3M, Lockheed Martin, Capital One et EQT**. Impact **fort** sur les secteurs consommation, industrie, énergie et défense. GM sera particulièrement scruté, avec une volatilité implicite de plus ou moins 5,7 %, sur les tarifs Trump et la profitabilité des véhicules électriques. Rien du côté du CAC 40. Côté macro, la journée est vide de statistiques de premier plan : les résultats micro donneront le ton sur la santé de la demande américaine.\n\n**Mercredi 22 juillet.** La journée bascule en mode tech. AT&T publie ses résultats T2 avant l'ouverture US. Une adjudication américaine de la dette à 20 ans se déroule à 19h00 Paris, test important de l'appétit pour la partie longue de la courbe. Mais surtout, **après clôture de Wall Street (soit 22h00 Paris, 07h00 jeudi à Nouméa)**, deux mastodontes publient : **Tesla** (consensus 26,4 milliards de dollars de chiffre d'affaires, focus sur le déploiement du Robotaxi dans cinq marchés) et **Alphabet** (consensus 116,9 milliards de dollars, focus sur le carnet de commandes Google Cloud à 460 milliards). IBM publie également, premier rendez-vous du cycle IA générative pour les entreprises. Impact fort attendu sur les futures Nasdaq dès la nuit européenne.\n\n**Jeudi 23 juillet. La journée à haute intensité.** La matinée démarre avec **sept publications du CAC 40 avant Bourse : TotalEnergies, BNP Paribas, Carrefour, Dassault Systèmes, STMicroelectronics, Thales, Eurofins Scientific**. Sept mastodontes le même matin, ce qui va donner au parisien un profil de tempête intraday. Puis à 13h45 Paris (22h45 Nouméa), **décision de politique monétaire de la BCE**, consensus 88 % de statu quo au taux de dépôt de 2,25 %. À 14h30 (23h30 Nouméa), **conférence de presse de Christine Lagarde**, moment de la semaine où tout se joue : ton dovish ou hawkish, diagnostic sur l'inflation et les tarifs Trump. Touj
